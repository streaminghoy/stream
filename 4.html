<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Radio PRO</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#050505;
color:white;
font-family:Inter,sans-serif;
margin:0;
}
.channel-box{
background:#1e293b;
border:2px solid #334155;
border-radius:12px;
padding:15px;
}
.channel-box.active{
border-color:#22c55e;
}
.channel-box.live{
border-color:#ef4444;
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef}=React;

const PEER_CONFIG={
config:{
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
}
};

const MQTT_BROKER="wss://broker.emqx.io:8084/mqtt";function ChannelBox({
channelNum,
roomCode,
peerRef,
onTallyChange,
tallyState,
reporterStreams,
baseUrl
}){

const [status,setStatus]=useState("offline");
const videoRef=useRef(null);
const audioRef=useRef(null);

const obsUrl=
baseUrl+
"?mode=obs&room="+
roomCode+
"&ch="+
channelNum+
"&producer="+
(peerRef.current?peerRef.current.id:"");

const reporterUrl=
baseUrl+
"?mode=tx&room="+
roomCode+
"&ch="+
channelNum+
"&producer="+
(peerRef.current?peerRef.current.id:"");useEffect(()=>{
const stream=reporterStreams[channelNum];

if(stream && videoRef.current){
videoRef.current.srcObject=stream;
videoRef.current.play();

audioRef.current.srcObject=stream;
audioRef.current.volume=1;
audioRef.current.play();

setStatus("preview");
}
},[reporterStreams]);function toggleOnAir(){

const newState=status==="onair"?"preview":"onair";

setStatus(newState);

onTallyChange(channelNum,newState);

}return(
<div className={`channel-box ${status==="preview"?"active":""} ${status==="onair"?"live":""}`}>

<audio ref={audioRef} autoPlay></audio>

<h2>CANAL {channelNum}</h2>

<div>
OBS URL
<br/>
<small>{obsUrl}</small>
</div>

<div>
REPORTERO URL
<br/>
<small>{reporterUrl}</small>
</div>

<video
ref={videoRef}
autoPlay
playsInline
muted
style={{width:"100%",background:"#000"}}
/>

<button onClick={toggleOnAir}>
{status==="onair"?"AL AIRE":"PREVIO"}
</button>

</div>
);
}function App(){

const [roomCode,setRoomCode]=useState("");
const [producerName,setProducerName]=useState("");
const [inRoom,setInRoom]=useState(false);

const [reporterStreams,setReporterStreams]=useState({});
const [tallyStates,setTallyStates]=useState({1:"offline",2:"offline",3:"offline",4:"offline"});

const peerRef=useRef(null);
const mqttClientRef=useRef(null);

const [baseUrl,setBaseUrl]=useState("");

useEffect(()=>{
setBaseUrl(window.location.href.split("?")[0]);
},[]);function joinAsProducer(){

const myId="prod_"+roomCode+"_"+Math.random().toString(16).slice(2,8);

const peer=new Peer(myId,PEER_CONFIG);

peerRef.current=peer;

peer.on("open",id=>{

initMQTT(roomCode,id,true);

setInRoom(true);

});

peer.on("call",call=>{

const channel=call.metadata?.channel;

call.answer();

call.on("stream",remoteStream=>{

setReporterStreams(prev=>({
...prev,
[channel]:remoteStream
}));

});

});

}function initMQTT(room,peerId,isProd){

const client=mqtt.connect(MQTT_BROKER,{
clientId:"radio_"+peerId
});

client.on("connect",()=>{

client.subscribe("sc_radio_v1/"+room+"/tally");

});

client.on("message",(topic,msg)=>{

const data=JSON.parse(msg.toString());

setTallyStates(prev=>({
...prev,
[data.channel]:data.state
}));

});

mqttClientRef.current=client;

}function handleTallyChange(channel,state){

setTallyStates(prev=>({
...prev,
[channel]:state
}));

mqttClientRef.current.publish(
"sc_radio_v1/"+roomCode+"/tally",
JSON.stringify({
channel:channel,
state:state
})
);

}if(!inRoom){

return(

<div style={{padding:40}}>

<h1>STREAM RADIO PRO</h1>

<input
placeholder="ROOM"
value={roomCode}
onChange={e=>setRoomCode(e.target.value)}
/>

<input
placeholder="PRODUCER"
value={producerName}
onChange={e=>setProducerName(e.target.value)}
/>

<button onClick={joinAsProducer}>
INICIAR
</button>

</div>

);

}

return(

<div>

<h1>SALA {roomCode}</h1>

{[1,2,3,4].map(ch=>(

<ChannelBox
key={ch}
channelNum={ch}
roomCode={roomCode}
peerRef={peerRef}
onTallyChange={handleTallyChange}
tallyState={tallyStates}
reporterStreams={reporterStreams}
baseUrl={baseUrl}
/>

))}

</div>

);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
