<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V13 PRO (Audio Fix)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        body.obs-mode { background-color: transparent !important; }

        /* --- LOBBY --- */
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; width: 100%; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; text-transform: uppercase; }
        
        .quality-select { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; cursor: pointer; }

        .btn { width: 100%; padding: 10px; font-weight: 900; font-size: 0.8rem; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: #3b82f6; color: white; margin-bottom: 5px; }
        .btn-green { background: #10b981; color: black; margin-bottom: 5px; }
        .btn-red { background: #ef4444; color: white; margin-bottom: 5px; }
        .btn-gray { background: #334155; color: white; margin-bottom: 5px; border: 1px solid #475569; }

        /* --- OBS --- */
        .obs-layout { width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .obs-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .obs-status { position: relative; z-index: 9999; background: rgba(0,0,0,0.85); color: #facc15; padding: 20px 30px; border-radius: 12px; font-family: monospace; font-size: 16px; border: 2px solid #facc15; text-align: center; }
        
        .interaction-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(220, 38, 38, 0.95); color: white; z-index: 99999; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; cursor: pointer; text-align: center; padding: 20px; text-transform: uppercase; }

        /* --- DIRECTOR MULTI-CAM --- */
        .director-layout { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .director-header { background: #0f172a; border-bottom: 1px solid #334155; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; padding: 10px; overflow: hidden; }
        
        .slot-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .slot-video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 2px solid #334155; }
        .slot-video { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 10; }
        .slot-status { position: absolute; text-transform: uppercase; font-weight: bold; color: #64748b; font-size: 1.2rem; z-index: 1; }
        
        .slot-controls-area { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #0f172a; gap: 10px; }
        .slot-info { display: flex; flex-direction: column; width: 120px; }
        .slot-title { font-weight: 900; color: #fff; font-size: 1.1rem; }
        
        select { background: #000 !important; border: 1px solid #334155 !important; color: #fff !important; padding: 8px; border-radius: 6px; font-size: 0.85rem; outline: none; appearance: auto; }

        .tally-group { display: flex; gap: 5px; flex: 1; }
        .t-btn { flex: 1; padding: 10px 0; font-size: 0.8rem; font-weight: bold; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background: #1e293b; color: #94a3b8; text-align: center; }
        .t-btn.active-idle { border-color: #64748b; color: white; }
        .t-btn.active-prev { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #22c55e; }
        .t-btn.active-live { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; animation: pulseRed 2s infinite; }
        
        .link-group { display: flex; flex-direction: column; gap: 5px; width: 130px; }

        /* --- GUEST UI --- */
        .guest-layout { width: 100vw; height: 100vh; position: relative; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .guest-video { width: 100%; height: 100%; object-fit: cover; }
        .guest-tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 15px solid transparent; pointer-events: none; transition: border-color 0.3s; z-index: 50; box-sizing: border-box; }
        .guest-layout.tally-live .guest-tally-border { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.8); }
        .guest-layout.tally-prev .guest-tally-border { border-color: #22c55e; box-shadow: inset 0 0 50px rgba(34,197,94,0.8); }
        
        .return-pip { position: absolute; top: 20px; left: 20px; width: 200px; aspect-ratio: 16/9; background: #000; border: 2px solid #475569; border-radius: 12px; overflow: hidden; z-index: 80; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .return-pip.active { opacity: 1; pointer-events: auto; }
        .return-pip video { width: 100%; height: 100%; object-fit: cover; }
        .pip-label { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.8); color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        .guest-overlay { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 15px; z-index: 100; border: 1px solid #333; }
        .mic-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: 0.2s; background: #334155; color: white; }
        .mic-btn.off { background: #ef4444; }

        .big-tally-text { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 1.5rem; font-weight: 900; padding: 5px 20px; border-radius: 10px; z-index: 100; text-transform: uppercase; display: none; }
        .guest-layout.tally-live .big-tally-text { display: block; background: #ef4444; color: white; }
        .guest-layout.tally-prev .big-tally-text { display: block; background: #22c55e; color: black; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const PEER_CONFIG = { 
            config: { 
                'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }]
            } 
        };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        // COMPONENTE ESTABLE DE VIDEO CON DETECCIÓN DE AUTOPLAY
        const VideoPlayer = ({ stream, muted, className, onPlayError }) => {
            const videoRef = useRef(null);
            useEffect(() => {
                if (videoRef.current && stream) {
                    videoRef.current.srcObject = stream;
                    let playPromise = videoRef.current.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.warn("Autoplay bloqueado por el navegador:", error);
                            if (onPlayError) onPlayError();
                        });
                    }
                }
            }, [stream, onPlayError]);
            return <video ref={videoRef} className={className} autoPlay playsInline muted={muted}></video>;
        };

        // --- DIRECTOR MULTI-CAM ---
        const DirectorView = ({ roomName }) => {
            const [slots, setSlots] = useState({
                1: { connected: false, tally: 'idle', stream: null },
                2: { connected: false, tally: 'idle', stream: null },
                3: { connected: false, tally: 'idle', stream: null },
                4: { connected: false, tally: 'idle', stream: null },
            });
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [talkbackActive, setTalkbackActive] = useState(false);

            const peer = useRef(null);
            const mqttClient = useRef(null);
            const returnStreamRef = useRef(null);

            useEffect(() => {
                mqttClient.current = mqtt.connect(MQTT_BROKER);
                
                navigator.mediaDevices.enumerateDevices().then(devs => {
                    const audios = devs.filter(d => d.kind === 'audioinput');
                    setAudioDevices(audios);
                    if (audios.length > 0) setSelectedAudio(audios[0].deviceId);
                });

                const myId = `sc_dir_${roomName.toUpperCase()}`;
                peer.current = new Peer(myId, PEER_CONFIG);

                peer.current.on('call', (call) => {
                    const match = call.peer.match(/_(\d+)$/);
                    if (match) {
                        const slotId = parseInt(match[1]);
                        call.answer(); 
                        call.on('stream', (stream) => {
                            setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], connected: true, stream: stream } }));
                        });
                        call.on('close', () => {
                            setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], connected: false, stream: null } }));
                        });
                        call.on('error', () => {
                            setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], connected: false, stream: null } }));
                        });
                    }
                });

                return () => { peer.current?.destroy(); mqttClient.current?.end(); };
            }, [roomName]);

            const handleTally = (slotId, state) => {
                setSlots(prev => ({ ...prev, [slotId]: { ...prev[slotId], tally: state } }));
                mqttClient.current?.publish(`sc_tally/${roomName.toUpperCase()}/${slotId}`, JSON.stringify({ state: state }), { retain: true });
            };

            const toggleReturnAll = async () => {
                if (talkbackActive) {
                    returnStreamRef.current?.getTracks().forEach(t => t.stop());
                    setTalkbackActive(false);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: selectedAudio }, video: true });
                        returnStreamRef.current = s;
                        let delay = 0;
                        [1, 2, 3, 4].forEach(slotId => {
                            if (slots[slotId].connected) {
                                setTimeout(() => { peer.current.call(`sc_guest_${roomName.toUpperCase()}_${slotId}`, s); }, delay);
                                delay += 300;
                            }
                        });
                        setTalkbackActive(true);
                    } catch (e) { alert("Error al iniciar retorno general"); }
                }
            };

            const copyLink = (mode, slotId) => {
                const url = `${window.location.href.split('?')[0]}?mode=${mode}&room=${roomName}&slot=${slotId}`;
                navigator.clipboard.writeText(url); 
                alert(`Enlace de ${mode.toUpperCase()} (Móvil ${slotId}) copiado.`);
            };

            return (
                <div className="director-layout">
                    <div className="director-header">
                        <div>
                            <h2 className="text-xl font-black text-blue-400 uppercase tracking-tighter">StreamCall PRO MULTI-CAM</h2>
                            <span className="text-gray-400 text-sm font-bold">SALA: {roomName.toUpperCase()}</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <select value={selectedAudio} onChange={e => setSelectedAudio(e.target.value)} className="w-48">
                                {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Mic'}</option>)}
                            </select>
                            <button className={`btn ${talkbackActive ? 'btn-red' : 'btn-blue'} !mb-0 !w-auto !px-6`} onClick={toggleReturnAll}>
                                {talkbackActive ? '🔴 CORTAR IFB GLOBAL' : '▶️ IFB GLOBAL'}
                            </button>
                        </div>
                    </div>

                    <div className="grid-container">
                        {[1, 2, 3, 4].map(slotId => (
                            <div key={slotId} className={`slot-card ${slots[slotId].tally === 'live' ? 'border-red-500' : slots[slotId].tally === 'prev' ? 'border-green-500' : ''}`}>
                                <div className="slot-video-area">
                                    {slots[slotId].stream && <VideoPlayer stream={slots[slotId].stream} muted={true} className="slot-video" />}
                                    {!slots[slotId].connected && <div className="slot-status">ESPERANDO MÓVIL {slotId}...</div>}
                                </div>
                                <div className="slot-controls-area">
                                    <div className="slot-info">
                                        <span className="slot-title">MÓVIL {slotId}</span>
                                        <span className={`text-xs font-bold ${slots[slotId].connected ? 'text-green-400' : 'text-red-400'}`}>
                                            {slots[slotId].connected ? 'ONLINE' : 'OFFLINE'}
                                        </span>
                                    </div>
                                    <div className="tally-group">
                                        <button className={`t-btn ${slots[slotId].tally==='idle'?'active-idle':''}`} onClick={()=>handleTally(slotId, 'idle')}>OFF</button>
                                        <button className={`t-btn ${slots[slotId].tally==='prev'?'active-prev':''}`} onClick={()=>handleTally(slotId, 'prev')}>PREV</button>
                                        <button className={`t-btn ${slots[slotId].tally==='live'?'active-live':''}`} onClick={()=>handleTally(slotId, 'live')}>AIRE</button>
                                    </div>
                                    <div className="link-group">
                                        <button className="btn btn-green !py-1" onClick={()=>copyLink('obs', slotId)}>COPY OBS</button>
                                        <button className="btn btn-blue !py-1" onClick={()=>copyLink('guest', slotId)}>COPY MÓVIL</button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- OBS RENDERER ---
        const ObsView = ({ roomName, slotId }) => {
            const [status, setStatus] = useState(`ESPERANDO SEÑAL (MÓVIL ${slotId})`);
            const [stream, setStream] = useState(null);
            const [needsInteraction, setNeedsInteraction] = useState(false);
            const peer = useRef(null);

            useEffect(() => {
                const baseId = roomName.toUpperCase();
                const myId = `sc_obs_${baseId}_${slotId}`;
                peer.current = new Peer(myId, PEER_CONFIG);

                peer.current.on('call', (call) => {
                    call.answer(); 
                    call.on('stream', (s) => {
                        setStream(s);
                        setStatus('ONLINE');
                    });
                    call.on('close', () => setStream(null));
                });
                return () => peer.current?.destroy();
            }, [roomName, slotId]);

            const handleInteract = () => {
                setNeedsInteraction(false);
                const videos = document.querySelectorAll('video');
                videos.forEach(v => v.play().catch(e => console.log(e)));
            };

            return (
                <div className="obs-layout">
                    {needsInteraction && (
                        <div className="interaction-overlay" onClick={handleInteract}>
                            🎵 HAZ CLIC AQUÍ PARA HABILITAR EL AUDIO<br/><span style={{fontSize:'1rem', marginTop:'10px', display:'block'}}>Si ves esto en OBS, marca "Controlar audio mediante OBS" en las propiedades de la fuente.</span>
                        </div>
                    )}
                    {stream && <VideoPlayer stream={stream} muted={false} className="obs-video" onPlayError={() => setNeedsInteraction(true)} />}
                    {!stream && <div className="obs-status">{status}</div>}
                </div>
            );
        };

        // --- INVITADO (GUEST) ---
        const GuestView = ({ roomName, slotId }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState('720');
            const [tally, setTally] = useState('idle');
            const [micMuted, setMicMuted] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [returnStream, setReturnStream] = useState(null);
            const [facingMode, setFacingMode] = useState('user');
            
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const localStream = useRef(null);
            const [myStreamState, setMyStreamState] = useState(null);

            const switchCamera = async () => {
                const nextMode = facingMode === 'user' ? 'environment' : 'user';
                setFacingMode(nextMode);
                if (localStream.current) {
                    const videoTrack = localStream.current.getVideoTracks()[0];
                    if (videoTrack) videoTrack.stop();
                    const res = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };
                    try {
                        const newVideoState = await navigator.mediaDevices.getUserMedia({ 
                            video: { width: res[quality][0], height: res[quality][1], facingMode: nextMode }
                        });
                        const newVideoTrack = newVideoState.getVideoTracks()[0];
                        localStream.current.removeTrack(videoTrack);
                        localStream.current.addTrack(newVideoTrack);
                        setMyStreamState({...localStream.current});
                        
                        Object.values(peer.current.connections).forEach(connArray => {
                            connArray.forEach(connection => {
                                if (connection.peerConnection) {
                                    const videoSender = connection.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                                    if (videoSender) videoSender.replaceTrack(newVideoTrack);
                                }
                            });
                        });
                    } catch (e) { alert("Error al girar cámara"); }
                }
            };

            useEffect(() => {
                if (!joined) return;
                
                const mq = mqtt.connect(MQTT_BROKER);
                mqttClient.current = mq;
                mq.on('connect', () => { mq.subscribe(`sc_tally/${roomName.toUpperCase()}/${slotId}`); });
                mq.on('message', (t, msg) => {
                    const data = JSON.parse(msg.toString());
                    setTally(data.state);
                });
                
                const init = async () => {
                    try {
                        const res = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };
                        const s = await navigator.mediaDevices.getUserMedia({ 
                            video: { width: res[quality][0], height: res[quality][1], facingMode: facingMode }, 
                            audio: { echoCancellation: true, noiseSuppression: true } 
                        });
                        localStream.current = s;
                        setMyStreamState(s);
                        
                        const baseId = roomName.toUpperCase();
                        peer.current = new Peer(`sc_guest_${baseId}_${slotId}`, PEER_CONFIG);
                        
                        peer.current.on('open', () => {
                            setTimeout(() => { peer.current.call(`sc_dir_${baseId}`, localStream.current); }, 200);
                            setTimeout(() => { peer.current.call(`sc_obs_${baseId}_${slotId}`, localStream.current); }, 600);
                        });

                        peer.current.on('call', (c) => {
                            c.answer(localStream.current); 
                            c.on('stream', (rem) => { setReturnStream(rem); });
                        });
                    } catch (e) { alert("Error cámara/micrófono"); }
                };
                init();
                return () => { peer.current?.destroy(); mq.end(); };
            }, [joined]);

            const toggleMic = () => { if (localStream.current) { const t = localStream.current.getAudioTracks()[0]; t.enabled = !t.enabled; setMicMuted(!t.enabled); } };
            const toggleCam = () => { if (localStream.current) { const t = localStream.current.getVideoTracks()[0]; t.enabled = !t.enabled; setCamOff(!t.enabled); } };

            if (!joined) return (
                <div className="lobby-container"><div className="glass-box">
                    <h2 className="text-xl font-black mb-2 text-white uppercase tracking-widest">SALA: {roomName}</h2>
                    <h3 className="text-2xl font-black mb-4 text-blue-400 uppercase tracking-widest">MÓVIL {slotId}</h3>
                    <select className="quality-select" value={quality} onChange={e => setQuality(e.target.value)}>
                        <option value="360">360p (BAJA)</option>
                        <option value="720">720p (MEDIA)</option>
                        <option value="1080">1080p (ALTA)</option>
                    </select>
                    <button className="btn btn-blue w-full mt-2" onClick={() => setJoined(true)}>ENTRAR AL VIVO</button>
                </div></div>
            );

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border"></div>
                    <div className="big-tally-text">{tally === 'live' ? 'AL AIRE' : tally === 'prev' ? 'PREVENIDO' : ''}</div>
                    
                    <div className={`return-pip ${returnStream ? 'active' : ''}`}>
                        {returnStream && <VideoPlayer stream={returnStream} muted={false} />}
                        <div className="pip-label">RETORNO DIRECTOR</div>
                    </div>
                    
                    {myStreamState && (
                        <VideoPlayer 
                            stream={myStreamState} 
                            muted={true} 
                            className="guest-video" 
                            style={{ transform: facingMode === 'user' ? 'scaleX(-1)' : 'none', objectFit: 'cover' }} 
                        />
                    )}
                    
                    <div className="guest-overlay">
                        <div className="text-[10px] font-bold text-gray-400 uppercase mr-2">CH {slotId}</div>
                        <div className={`mic-btn ${micMuted?'off':'on'}`} onClick={toggleMic}>{micMuted ? '🔇' : '🎤'}</div>
                        <div className={`mic-btn ${camOff?'off':'on'}`} onClick={toggleCam}>{camOff ? '🚫' : '📷'}</div>
                        <div className="mic-btn" style={{ background: '#3b82f6' }} onClick={switchCamera}>🔄</div>
                    </div>
                </div>
            );
        };

        // --- APP ROUTER ---
        const App = () => {
            const [mode, setMode] = useState(null); 
            const [roomName, setRoomName] = useState('');
            const [slotId, setSlotId] = useState('1');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let m = params.get('mode'); 
                let r = params.get('room');
                let s = params.get('slot') || '1';
                
                if (m && r) { 
                    setRoomName(r); setMode(m); setSlotId(s);
                    if (m === 'obs') document.body.classList.add('obs-mode'); 
                } else {
                    setRoomName(Math.random().toString(36).substring(2, 6).toUpperCase());
                }
            }, []);

            if (mode === 'director') return <DirectorView roomName={roomName} />;
            if (mode === 'obs') return <ObsView roomName={roomName} slotId={slotId} />;
            if (mode === 'guest') return <GuestView roomName={roomName} slotId={slotId} />;
            
            return (
                <div className="lobby-container"><div className="glass-box">
                    <h1 className="text-3xl font-black mb-6 uppercase text-blue-500 tracking-tighter">StreamCall PRO MULTI</h1>
                    <input value={roomName} onChange={(e) => setRoomName(e.target.value.toUpperCase())} placeholder="NOMBRE SALA" />
                    <button className="btn btn-blue w-full py-4 text-lg" onClick={() => window.location.href=`?mode=director&room=${roomName}`}>ABRIR DASHBOARD DIRECTOR</button>
                </div></div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
