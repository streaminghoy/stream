<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDI Delay Calculator - Frames to MS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .fps-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .fps-btn {
            padding: 10px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 6px;
            color: #94a3b8;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            transition: all 0.2s;
        }

        .fps-btn:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .fps-btn.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }

        .direction-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .dir-btn {
            flex: 1;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dir-btn.active {
            background: rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .result-box {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border: 2px solid #38bdf8;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
            position: relative;
            overflow: hidden;
        }

        .result-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #38bdf8, transparent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .result-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #38bdf8;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            line-height: 1;
        }

        .result-unit {
            font-size: 1.2rem;
            color: #64748b;
            margin-top: 8px;
        }

        .result-detail {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
        }

        .formula {
            margin-top: 20px;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .preset-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .preset {
            padding: 6px 12px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 20px;
            color: #38bdf8;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset:hover {
            background: rgba(56, 189, 248, 0.2);
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px;
            }
            .result-value {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NDI Delay Calculator</h1>
        <div class="subtitle">Frames → Milisegundos</div>

        <div class="input-group">
            <label>FPS del video grabado</label>
            <div class="fps-grid">
                <button class="fps-btn" onclick="setFps(120)">120</button>
                <button class="fps-btn" onclick="setFps(60)">60</button>
                <button class="fps-btn active" onclick="setFps(30)">30</button>
                <button class="fps-btn" onclick="setFps(25)">25</button>
                <button class="fps-btn" onclick="setFps(50)">50</button>
                <button class="fps-btn" onclick="setFps(24)">24</button>
            </div>
            <input type="number" id="fpsInput" value="30" style="margin-top: 10px; display: none;" onchange="calculate()">
        </div>

        <div class="input-group">
            <label>Frames de desfase</label>
            <input type="number" id="framesInput" value="1" min="0" step="0.5" placeholder="Ej: 2.5" oninput="calculate()">
            <div class="preset-buttons">
                <span class="preset" onclick="setFrames(0.5)">½ frame</span>
                <span class="preset" onclick="setFrames(1)">1 frame</span>
                <span class="preset" onclick="setFrames(2)">2 frames</span>
                <span class="preset" onclick="setFrames(3)">3 frames</span>
            </div>
        </div>

        <div class="direction-toggle">
            <button class="dir-btn active" id="btnLate" onclick="setDirection('late')">
                <span>🔊</span> Audio va ATRASADO
            </button>
            <button class="dir-btn" id="btnEarly" onclick="setDirection('early')">
                <span>🔊</span> Audio va ADELANTADO
            </button>
        </div>

        <div class="result-box">
            <div class="result-value" id="result">33.33</div>
            <div class="result-unit">milisegundos</div>
            <div class="result-detail" id="detail">Configura delay: +33.33 ms</div>
        </div>

        <div class="formula">
            Fórmula: (frames ÷ fps) × 1000 = ms<br>
            <span id="formulaDetail">(1 ÷ 30) × 1000 = 33.33 ms</span>
        </div>
    </div>

    <script>
        let currentFps = 30;
        let direction = 'late'; // 'late' = audio atrasa (positivo), 'early' = audio adelanta (negativo)

        function setFps(fps) {
            currentFps = fps;
            document.querySelectorAll('.fps-btn').forEach(btn => {
                btn.classList.remove('active');
                if(parseInt(btn.textContent) === fps) btn.classList.add('active');
            });
            document.getElementById('fpsInput').value = fps;
            calculate();
        }

        function setFrames(frames) {
            document.getElementById('framesInput').value = frames;
            calculate();
        }

        function setDirection(dir) {
            direction = dir;
            document.getElementById('btnLate').classList.toggle('active', dir === 'late');
            document.getElementById('btnEarly').classList.toggle('active', dir === 'early');
            calculate();
        }

        function calculate() {
            const frames = parseFloat(document.getElementById('framesInput').value) || 0;
            const fps = currentFps;
            
            if (fps === 0) return;
            
            const ms = (frames / fps) * 1000;
            const sign = direction === 'late' ? '+' : '-';
            const configText = direction === 'late' 
                ? `Configura delay: ${sign}${ms.toFixed(2)} ms (retrasar audio)`
                : `Configura delay: ${sign}${ms.toFixed(2)} ms (adelantar audio)`;
            
            document.getElementById('result').textContent = ms.toFixed(2);
            document.getElementById('detail').textContent = configText;
            document.getElementById('formulaDetail').textContent = 
                `(${frames} ÷ ${fps}) × 1000 = ${ms.toFixed(2)} ms`;
        }

        // Inicializar
        calculate();
    </script>
</body>
</html>
