<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Radio PRO - 4 Canales By streaminghoy.com.ar</title>
   
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
       
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }

        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .glass-box { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 400px; width: 100%; text-align: center; }

        .channels-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .channels-grid { grid-template-columns: repeat(2, 1fr); } }

        .channel-box { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 20px; position: relative; transition: all 0.3s; }
        .channel-box.active { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .channel-box.live { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }
        
        .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .channel-id { font-size: 1.5rem; font-weight: 900; color: white; }
        
        .tally-indicator { display: flex; gap: 8px; align-items: center; }
        
        .tally-badge {
            padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 900;
            text-transform: uppercase; background: #334155; color: #64748b; transition: all 0.3s;
        }
        .tally-badge.preview { background: #f59e0b; color: #000; animation: pulsePreview 2s infinite; }
        .tally-badge.onair { background: #ef4444; color: #fff; animation: pulseOnAir 0.5s infinite; }
        
        @keyframes pulsePreview { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes pulseOnAir { 0%, 100% { opacity: 1; box-shadow: 0 0 10px #ef4444; } 50% { opacity: 0.8; box-shadow: 0 0 20px #ef4444, 0 0 30px #ef4444; } }

        .tally-light { width: 20px; height: 20px; border-radius: 50%; background: #333; transition: all 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .tally-light.on { background: #ef4444; box-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444; animation: pulseTally 1s infinite; }
        
        @keyframes pulseTally { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } }

        .url-container-obs { background: #000; border: 2px solid #3b82f6; border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; cursor: pointer; transition: all 0.2s; }
        .url-container-obs:hover { border-color: #60a5fa; background: #0a1a2a; }

        .url-container-reporter:hover { border-color: #fbbf24; background: #1a1a0a; }
        .url-container-reporter.copied { border-color: #22c55e; }
        
        .url-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .url-text { font-family: 'Courier New', monospace; font-size: 0.7rem; word-break: break-all; line-height: 1.4; }
        .url-obs { color: #3b82f6; }
        .url-reporter { color: #f59e0b; }
        
        .copy-btn { position: absolute; top: 8px; right: 8px; background: #334155; border: none; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; opacity: 0; transition: opacity 0.2s; font-weight: bold; }
        .url-container-obs:hover .copy-btn, .url-container-reporter:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #3b82f6; }

        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .status-badge.offline { background: #334155; color: #94a3b8; }
        .status-badge.connecting { background: #713f12; color: #facc15; }
        .status-badge.live { background: #14532d; color: #4ade80; }
        .status-badge.preview { background: #713f12; color: #facc15; }

        @keyframes pulseBlue { 0%, 100% { box-shadow: 0 0 20px #3b82f6; } 50% { box-shadow: 0 0 40px #3b82f6, 0 0 60px #3b82f6; } }

        .control-group { margin-bottom: 15px; }

        .tx-btn { width: 100%; padding: 15px; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tx-btn.idle { background: #3b82f6; color: white; }
        .tx-btn.idle:hover { background: #2563eb; }
        .tx-btn.active { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .chat-container { flex: 1; display: flex; flex-direction: column; margin-top: 20px; min-height: 0; }
        .chat-header { font-size: 0.75rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; overflow-y: auto; background: #000; border: 1px solid #334155; border-radius: 8px; padding: 10px; min-height: 150px; }
        .chat-msg { background: #1e293b; padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 0.8rem; }

        .chat-input-area { display: flex; gap: 8px; margin-top: 8px; }

        .chat-input-area input:focus { border-color: #3b82f6; }
        .chat-input-area button { background: #3b82f6; color: white; border: none; padding: 0 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #22c55e; color: black; padding: 12px 24px; border-radius: 8px; font-weight: 900; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

        .instructions { background: #1e293b; border-left: 3px solid #3b82f6; padding: 10px 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
        .instructions h3 { margin: 0 0 5px 0; font-size: 0.8rem; color: #3b82f6; text-transform: uppercase; }
        .instructions p { margin: 0; font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }

        /* VISTA DE TRANSMITTER (REPORTERO CON CELULAR) */
        .transmitter-view { min-height: 100vh; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; font-family: 'Inter', sans-serif; }
        .transmitter-box { background: #111; border: 2px solid #333; border-radius: 16px; padding: 20px; max-width: 500px; width: 100%; text-align: center; }
        .transmitter-tally { width: 120px; height: 120px; border-radius: 50%; background: #222; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: all 0.3s; border: 4px solid #444; position: relative; }
        .transmitter-tally.preview { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 40px #f59e0b; animation: tallyPreview 1s infinite; }
        .transmitter-tally.onair { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 60px #ef4444, 0 0 100px #ef4444; animation: tallyOnAir 0.5s infinite; }
        
        @keyframes tallyPreview { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        @keyframes tallyOnAir { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .tally-label { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; white-space: nowrap; }
        .transmitter-status { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }

        .transmitter-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .transmitter-item { background: #1a1a1a; padding: 10px; border-radius: 6px; }
        .transmitter-item-label { color: #64748b; font-size: 0.65rem; text-transform: uppercase; margin-bottom: 3px; }
        .transmitter-item-value { color: white; font-weight: 900; font-size: 0.9rem; }
        
        .transmitter-video { width: 100%; max-width: 100%; height: 250px; background: #000; border-radius: 8px; margin: 15px 0; object-fit: cover; border: 2px solid #333; }
        .transmitter-video.active { border-color: #ef4444; }
        .transmitter-video.preview { border-color: #f59e0b; }

        .transmitter-controls { display: flex; gap: 10px; margin-top: 15px; }
        .transmitter-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; }
        .transmitter-btn.start { background: #22c55e; color: black; }
        .transmitter-btn.stop { background: #ef4444; color: white; }
        .transmitter-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .transmitter-vu { margin-top: 15px; padding: 10px; background: #1a1a1a; border-radius: 6px; }
        .transmitter-vu-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        .transmitter-vu-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #facc15, #ef4444); transition: width 0.1s; }

        .transmitter-footer { margin-top: 15px; font-size: 0.7rem; color: #64748b; }
        
        .return-video-box { margin-top: 15px; padding: 10px; background: #0a1a2a; border: 2px solid #3b82f6; border-radius: 8px; }
        .return-video-label { font-size: 0.7rem; color: #3b82f6; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .return-video { width: 100%; height: 150px; background: #000; border-radius: 6px; object-fit: cover; }

        /* Selector de dispositivos */
        .device-selector { margin: 15px 0; text-align: left; }
        .device-selector label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        .device-selector select { width: 100%; background: #1a1a1a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; }

        /* VISTA DE OBS - SIMPLE, SOLO VIDEO */
        .obs-view { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .obs-video { width: 100%; height: 100%; object-fit: contain; }
        .obs-overlay { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px 15px; border-radius: 6px; font-size: 0.8rem; color: white; }
        .obs-tally { position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; border-radius: 50%; background: #333; border: 2px solid #555; }
        .obs-tally.preview { background: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 20px #f59e0b; }
        .obs-tally.onair { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 30px #ef4444; animation: obsTallyPulse 0.5s infinite; }
        
        @keyframes obsTallyPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PEER_CONFIG = { 
            config: { 
                'iceServers': [
                    { url: 'stun:stun.l.google.com:19302' },
                    { url: 'stun:stun1.l.google.com:19302' }
                ] 
            } 
        };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        // Componente de Canal en Dashboard
        const ChannelBox = ({ channelNum, roomCode, peerRef, onTallyChange, returnStream, isReturnActive, baseUrl, tallyState, reporterStreams, onStreamUpdate }) => {
            const [status, setStatus] = useState('offline');
            const [reporterInfo, setReporterInfo] = useState({ name: '', kbps: '128' });
            const [vuLevel, setVuLevel] = useState(0);
            const [volume, setVolume] = useState(1);
            const [copiedObs, setCopiedObs] = useState(false);
            const [copiedReporter, setCopiedReporter] = useState(false);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [hasStream, setHasStream] = useState(false);
            
            const audioElRef = useRef(null);
            const videoElRef = useRef(null);
            const analyserRef = useRef(null);
            const animRef = useRef(null);
            const obsCallRef = useRef(null);
            
            // URLs
            const obsUrl = peerRef.current?.id 
                ? `${baseUrl}?mode=obs&room=${roomCode}&ch=${channelNum}&producer=${peerRef.current.id}`
                : 'Conectando...';
            
            const reporterUrl = peerRef.current?.id
                ? `${baseUrl}?mode=tx&room=${roomCode}&ch=${channelNum}&producer=${peerRef.current.id}`
                : 'Conectando...';

            // Verificar si hay stream disponible (DENTRO DE CHANNELBOX)
            useEffect(() => {
                const stream = reporterStreams[channelNum];
                
                if (stream && stream.active) {
                    setHasStream(true);
                    
                    // Manejo de Video
                    if (videoElRef.current) {
                        if (videoElRef.current.srcObject !== stream) {
                            videoElRef.current.srcObject = stream;
                        }
                        videoElRef.current.play().catch(e => console.warn('Video Play Blocked:', e));
                    }
                    
                    // Manejo de Audio (Dashboard Monitoring)
                    if (audioElRef.current) {
                        if (audioElRef.current.srcObject !== stream) {
                            audioElRef.current.srcObject = stream;
                        }
                        
                        audioElRef.current.volume = volume;
                        
                        // IMPORTANTE: Solo escuchamos en el dashboard si el canal está ON AIR
                        // O si quieres monitorear todo, podrías ponerlo en false, 
                        // pero para esta consola PRO, muteamos según el Tally.
                        const shouldBeMuted = (tallyState[channelNum] !== 'onair');
                        audioElRef.current.muted = shouldBeMuted;
                        
                        audioElRef.current.play().catch(e => console.warn('Audio Play Blocked:', e));
                    }
                    
                    // El VU Meter siempre corre si hay stream, para ver modulación
                    setupVUMeter(stream);
                    
                    // Actualizar estado visual
                    if (tallyState[channelNum] === 'onair') {
                        setStatus('onair');
                    } else if (tallyState[channelNum] === 'preview' || status === 'offline') {
                        setStatus('preview');
                    }
                    
                } else {
                    // Limpieza si no hay stream
                    setHasStream(false);
                    setStatus('offline');
                    setVuLevel(0);
                    if (videoElRef.current) videoElRef.current.srcObject = null;
                    if (audioElRef.current) audioElRef.current.srcObject = null;
                    if (animRef.current) cancelAnimationFrame(animRef.current);
                }
            }, [reporterStreams[channelNum], tallyState[channelNum], volume]); // Agregamos tallyState a la dependencia

            // Control de tally y audio
            useEffect(() => {
                const currentState = tallyState[channelNum];
                
                if (currentState === 'onair' && hasStream) {
                    setStatus('onair');
                    setAudioEnabled(true);
                    if (audioElRef.current) {
                        audioElRef.current.muted = false;
                    }
                } else if (currentState === 'preview' && hasStream) {
                    setStatus('preview');
                    setAudioEnabled(false);
                    if (audioElRef.current) {
                        audioElRef.current.muted = true;
                    }
                } else if (currentState === 'offline') {
                    setStatus('offline');
                    setAudioEnabled(false);
                    if (audioElRef.current) {
                        audioElRef.current.muted = true;
                    }
                }
            }, [tallyState, hasStream]);

            const setupVUMeter = (stream) => {
                try {
                    if (animRef.current) cancelAnimationFrame(animRef.current);
                    
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    const source = ctx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyserRef.current = analyser;
                    
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    const update = () => {
                        if (!analyserRef.current) return;
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        const level = (sum / dataArray.length) * 2;
                        setVuLevel(Math.min(level, 100));
                        animRef.current = requestAnimationFrame(update);
                    };
                    update();
                } catch(e) {
                    console.error('VU Meter error:', e);
                }
            };

            const copyObsUrl = () => {
                if (obsUrl.includes('Conectando')) return;
                navigator.clipboard.writeText(obsUrl);
                setCopiedObs(true);
                setTimeout(() => setCopiedObs(false), 2000);
            };

            const copyReporterUrl = () => {
                if (reporterUrl.includes('Conectando')) return;
                navigator.clipboard.writeText(reporterUrl);
                setCopiedReporter(true);
                setTimeout(() => setCopiedReporter(false), 2000);
            };

            const toggleOnAir = () => {
                const newState = status === 'onair' ? 'preview' : 'onair';
                onTallyChange(channelNum, newState);
            };

            return (
                <div className={`channel-box ${status === 'preview' ? 'active' : ''} ${status === 'onair' ? 'live' : ''}`}>
                    <audio ref={audioElRef} autoPlay playsInline style={{display: 'none'}} />
                    
                    <div className="channel-header">
                        <div className="channel-id">CANAL {channelNum}</div>
                        <div className="tally-indicator">
                            {status === 'preview' && <span className="tally-badge preview">PREVIO</span>}
                            {status === 'onair' && <span className="tally-badge onair">AL AIRE</span>}
                            <div className={`tally-light ${status === 'onair' ? 'on' : ''}`}></div>
                        </div>
                    </div>

                    <div className={`url-container-obs ${copiedObs ? 'copied' : ''}`} onClick={copyObsUrl}>
                        <div className="url-label">
                            <span>📺 PARA OBS/VMIX</span>
                            {copiedObs && <span style={{color: '#22c55e'}}>✓ COPIADO</span>}
                        </div>
                        <div className="url-text url-obs">{obsUrl}</div>
                        <button className="copy-btn" onClick={(e) => { e.stopPropagation(); copyObsUrl(); }}>
                            {copiedObs ? '✓' : 'COPY'}
                        </button>
                    </div>

                    <div className={`url-container-reporter ${copiedReporter ? 'copied' : ''}`} onClick={copyReporterUrl}>
                        <div className="url-label">
                            <span>📱 PARA REPORTERO (CELULAR)</span>
                            {copiedReporter && <span style={{color: '#22c55e'}}>✓ COPIADO</span>}
                        </div>
                        <div className="url-text url-reporter">{reporterUrl}</div>
                        <button className="copy-btn" onClick={(e) => { e.stopPropagation(); copyReporterUrl(); }}>
                            {copiedReporter ? '✓' : 'COPY'}
                        </button>
                    </div>

                    <video 
                        ref={videoElRef}
                        autoPlay 
                        playsInline 
                        muted
                        style={{width: '100%', height: '120px', background: '#000', borderRadius: '6px', marginBottom: '10px', objectFit: 'cover', display: hasStream ? 'block' : 'none'}}
                    />

                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px'}}>
                        <span className={`status-badge ${status}`}>
                            <span className={`status-dot ${status}`}></span>
                            {status === 'offline' && 'SIN CONEXIÓN'}
                            {status === 'preview' && '● PREVIO (MUTEADO)'}
                            {status === 'onair' && '🔴 AL AIRE (AUDIO ON)'}
                        </span>
                        {hasStream && (
                            <span style={{fontSize: '0.7rem', color: '#64748b'}}>128 kbps</span>
                        )}
                    </div>

                    {hasStream && (
                        <>
                            <div className="vu-container">
                                <div className="vu-bar" style={{width: `${vuLevel}%`, opacity: audioEnabled ? 1 : 0.3}}></div>
                            </div>
                            
                            <div className="volume-row">
                                <span className="volume-label">VOL</span>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="1" 
                                    step="0.05" 
                                    value={volume}
                                    onChange={(e) => {
                                        const v = parseFloat(e.target.value);
                                        setVolume(v);
                                        if (audioElRef.current) audioElRef.current.volume = v;
                                    }}
                                />
                            </div>

                            <div style={{display: 'flex', gap: '8px', marginTop: '10px'}}>
                                <button 
                                    onClick={toggleOnAir}
                                    disabled={!hasStream}
                                    style={{
                                        flex: 1,
                                        padding: '8px',
                                        border: 'none',
                                        borderRadius: '4px',
                                        background: status === 'onair' ? '#ef4444' : '#22c55e',
                                        color: status === 'onair' ? 'white' : 'black',
                                        fontWeight: 'bold',
                                        fontSize: '0.75rem',
                                        cursor: hasStream ? 'pointer' : 'not-allowed',
                                        opacity: hasStream ? 1 : 0.5
                                    }}
                                >
                                    {status === 'onair' ? '🔴 AL AIRE' : '● PREVIO'}
                                </button>
                            </div>

                            <div style={{marginTop: '8px', fontSize: '0.65rem', color: isReturnActive ? '#3b82f6' : '#64748b'}}>
                                {isReturnActive ? '🔊 Retorno activo' : '🔇 Sin retorno'}
                            </div>
                        </>
                    )}

                    {!hasStream && (
                        <div style={{fontSize: '0.75rem', color: '#64748b', textAlign: 'center', padding: '20px'}}>
                            Esperando conexión del reportero...<br/>
                            <span style={{fontSize: '0.65rem'}}>Comparte la URL amarilla</span>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [inRoom, setInRoom] = useState(false);
            const [roomCode, setRoomCode] = useState('');
            const [producerName, setProducerName] = useState('');
            const [isProducer, setIsProducer] = useState(true);
            const [userMode, setUserMode] = useState('');
            
            const [connectionStatus, setConnectionStatus] = useState('OFFLINE');
            const [tallyStates, setTallyStates] = useState({1: 'offline', 2: 'offline', 3: 'offline', 4: 'offline'});
            
            const [isReturnActive, setIsReturnActive] = useState(false);
            const [returnDevices, setReturnDevices] = useState([]);
            const [selectedReturnDevice, setSelectedReturnDevice] = useState('');
            const [returnStream, setReturnStream] = useState(null);
            const [returnLevel, setReturnLevel] = useState(0);
            
            const [messages, setMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            
            const [reporterStreams, setReporterStreams] = useState({});
            const [obsConnections, setObsConnections] = useState({});
            
            const [reporterChannel, setReporterChannel] = useState('');
            const [producerId, setProducerId] = useState('');
            
            // Para modo transmitter
            const [isTransmitting, setIsTransmitting] = useState(false);
            const [localStream, setLocalStream] = useState(null);
            const [txLevel, setTxLevel] = useState(0);
            const [tallyMode, setTallyMode] = useState('offline');
            
            // Dispositivos del transmitter
            const [videoDevices, setVideoDevices] = useState([]);
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedVideoDevice, setSelectedVideoDevice] = useState('');
            const [selectedAudioDevice, setSelectedAudioDevice] = useState('');
            const [showDeviceSelector, setShowDeviceSelector] = useState(true);
            
            const videoRef = useRef(null);
            const returnVideoRef = useRef(null);
            const peerRef = useRef(null);
            const mqttClientRef = useRef(null);
            const returnAudioCtxRef = useRef(null);
            const returnAnimRef = useRef(null);
            const messagesEndRef = useRef(null);
            const txAnimRef = useRef(null);
            const returnVideoStreamRef = useRef(null);
            const producerCallRef = useRef(null);

            const [baseUrl, setBaseUrl] = useState('');

            useEffect(() => {
                const url = window.location.href.split('?')[0];
                setBaseUrl(url);
                
                const params = new URLSearchParams(window.location.search);
                const mode = params.get('mode');
                const room = params.get('room');
                const ch = params.get('ch');
                const prodId = params.get('producer');

                if (mode === 'tx' && room && ch && prodId) {
                    setIsProducer(false);
                    setUserMode('tx');
                    setRoomCode(room);
                    setReporterChannel(ch);
                    setProducerId(prodId);
                    loadTransmitterDevices();
                } else if (mode === 'obs' && room && ch && prodId) {
                    setIsProducer(false);
                    setUserMode('obs');
                    setRoomCode(room);
                    setReporterChannel(ch);
                    setProducerId(prodId);
                    setInRoom(true);
                } else {
                    setRoomCode(Math.random().toString(36).substring(2, 6).toUpperCase());
                    loadAudioDevices();
                }
            }, []);

            const loadTransmitterDevices = async () => {
                try {
                    // Primero pedir permiso
                    await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                    
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    
                    const videos = devices.filter(d => d.kind === 'videoinput');
                    const audios = devices.filter(d => d.kind === 'audioinput');
                    
                    setVideoDevices(videos);
                    setAudioDevices(audios);
                    
                    // Seleccionar defaults
                    const backCamera = videos.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('trasera'));
                    const frontCamera = videos.find(d => d.label.toLowerCase().includes('front') || d.label.toLowerCase().includes('delantera'));
                    
                    if (backCamera) {
                        setSelectedVideoDevice(backCamera.deviceId);
                    } else if (videos.length > 0) {
                        setSelectedVideoDevice(videos[0].deviceId);
                    }
                    
                    if (audios.length > 0) {
                        setSelectedAudioDevice(audios[0].deviceId);
                    }
                    
                    setInRoom(true);
                } catch(e) {
                    alert('Error al acceder a dispositivos: ' + e.message);
                }
            };

            const loadAudioDevices = async () => {
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    tempStream.getTracks().forEach(t => t.stop());
                    const devs = await navigator.mediaDevices.enumerateDevices();
                    const audios = devs.filter(d => d.kind === 'audioinput');
                    setReturnDevices(audios);
                    if (audios.length > 0) setSelectedReturnDevice(audios[0].deviceId);
                } catch(e) {}
            };

            const initMQTT = (room, peerId, isProd) => {
                const client = mqtt.connect(MQTT_BROKER, {
                    clientId: `mqtt_${isProd ? 'prod' : 'rep'}_${peerId}_${Date.now()}`
                });
                
                client.on('connect', () => {
                    client.subscribe(`sc_radio_v1/${room}/tally`);
                    if (isProd) client.subscribe(`sc_radio_v1/${room}/chat`);
                });

                client.on('message', (topic, msg) => {
                    try {
                        const data = JSON.parse(msg.toString());
                        
                        if (topic.includes('/tally')) {
                            if (userMode === 'tx' && data.channel == reporterChannel) {
                                setTallyMode(data.state);
                            } else if (isProd) {
                                setTallyStates(prev => ({
                                    ...prev,
                                    [data.channel]: data.state
                                }));
                            }
                        } else if (topic.includes('/chat') && isProd) {
                            setMessages(prev => [...prev, data].slice(-50));
                        }
                    } catch(e) {}
                });

                mqttClientRef.current = client;
                return client;
            };

            // Modo OBS - Se conecta directamente al productor
            useEffect(() => {
                if (userMode !== 'obs' || !inRoom || !producerId) return;

                const initObs = async () => {
                    try {
                        setConnectionStatus('CONECTANDO...');
                        
                        const myId = `obs_${roomCode}_CH${reporterChannel}_${Math.random().toString(16).slice(2, 8)}`;
                        const peer = new Peer(myId, PEER_CONFIG);
                        peerRef.current = peer;

                        peer.on('open', (id) => {
                            console.log('OBS: Peer abierto con ID:', id);
                            initMQTT(roomCode, id, false);
                            
                            // Llamar al productor para recibir el stream
                            console.log('OBS: Llamando al productor:', producerId);
                            const call = peer.call(producerId, new MediaStream());
                            
                            call.on('stream', (remoteStream) => {
                                console.log('OBS: Stream recibido del productor');
                                setConnectionStatus('SEÑAL RECIBIDA');
                                
                                if (videoRef.current) {
                                    videoRef.current.srcObject = remoteStream;
                                    videoRef.current.play().catch(e => {});
                                }
                            });
                            
                            call.on('error', (err) => {
                                console.error('OBS: Error en llamada:', err);
                                setConnectionStatus('ERROR LLAMADA');
                            });
                            
                            call.on('close', () => {
                                console.log('OBS: Llamada cerrada');
                                setConnectionStatus('DESCONECTADO');
                            });
                        });

                        peer.on('error', (err) => {
                            console.error('OBS Peer Error:', err);
                            setConnectionStatus('ERROR: ' + err.type);
                        });

                    } catch(e) {
                        console.error('OBS Init Error:', e);
                        setConnectionStatus('ERROR');
                    }
                };

                initObs();
            }, [userMode, inRoom, producerId, roomCode, reporterChannel]);

            // Modo Transmitter (Reportero)
            const startTransmission = async () => {
                try {
                    setConnectionStatus('INICIANDO...');
                    
                    const constraints = {
                        audio: {
                            deviceId: selectedAudioDevice ? { exact: selectedAudioDevice } : undefined,
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false,
                            channelCount: 2
                        },
                        video: {
                            deviceId: selectedVideoDevice ? { exact: selectedVideoDevice } : undefined,
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: selectedVideoDevice ? undefined : "environment"
                        }
                    };

                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    setLocalStream(stream);
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }

                    const myId = `tx_${roomCode}_CH${reporterChannel}_${Math.random().toString(16).slice(2, 8)}`;
                    const peer = new Peer(myId, PEER_CONFIG);
                    peerRef.current = peer;

                    peer.on('open', (id) => {
                        console.log('TX: Peer abierto, llamando al productor:', producerId);
                        initMQTT(roomCode, id, false);

                        // Llamar al productor con el stream
                        const call = peer.call(producerId, stream, {
                            metadata: {
                                name: `Móvil CH${reporterChannel}`,
                                channel: parseInt(reporterChannel),
                                kbps: 128
                            }
                        });
                        
                        producerCallRef.current = call;

                        call.on('error', (err) => {
                            console.error('TX: Error en llamada al productor:', err);
                            setConnectionStatus('ERROR CONEXIÓN');
                        });

                        setIsTransmitting(true);
                        setConnectionStatus('CONECTADO');
                        setShowDeviceSelector(false);

                        // Recibir retorno del productor
                        peer.on('call', (incomingCall) => {
                            console.log('TX: Recibiendo retorno del productor');
                            incomingCall.answer();
                            incomingCall.on('stream', (returnStream) => {
                                console.log('TX: Retorno recibido');
                                if (returnVideoRef.current) {
                                    returnVideoRef.current.srcObject = returnStream;
                                    returnVideoRef.current.play().catch(e => {});
                                }
                            });
                        });
                    });

                    // VU Meter
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const analyser = ctx.createAnalyser();
                    const source = ctx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    const update = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        setTxLevel(Math.min((sum / dataArray.length) * 2, 100));
                        txAnimRef.current = requestAnimationFrame(update);
                    };
                    update();

                } catch(e) {
                    console.error('Error iniciando transmisión:', e);
                    setConnectionStatus('ERROR CÁMARA/MIC');
                    alert('Error al acceder a cámara/micrófono: ' + e.message);
                }
            };

            const stopTransmission = () => {
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                if (txAnimRef.current) cancelAnimationFrame(txAnimRef.current);
                if (peerRef.current) peerRef.current.destroy();
                setLocalStream(null);
                setIsTransmitting(false);
                setTxLevel(0);
                setConnectionStatus('DETENIDO');
                setTallyMode('offline');
                setShowDeviceSelector(true);
            };

            const switchCamera = async () => {
                if (!isTransmitting || !localStream) return;
                
                // Detener tracks actuales
                localStream.getVideoTracks().forEach(t => t.stop());
                
                // Encontrar otra cámara
                const currentDevice = videoDevices.find(d => d.deviceId === selectedVideoDevice);
                const otherCamera = videoDevices.find(d => d.deviceId !== selectedVideoDevice);
                
                if (otherCamera) {
                    try {
                        const newStream = await navigator.mediaDevices.getUserMedia({
                            video: { deviceId: { exact: otherCamera.deviceId } },
                            audio: false // Mantener audio actual
                        });
                        
                        const newVideoTrack = newStream.getVideoTracks()[0];
                        const sender = producerCallRef.current?.peerConnection?.getSenders().find(s => s.track?.kind === 'video');
                        
                        if (sender) {
                            await sender.replaceTrack(newVideoTrack);
                            setSelectedVideoDevice(otherCamera.deviceId);
                        }
                    } catch(e) {
                        console.error('Error cambiando cámara:', e);
                    }
                }
            };

            // Modo Productor
            const joinAsProducer = () => {
                if (!roomCode || !producerName) return alert("Completa todos los campos");

                setConnectionStatus('CONECTANDO...');
                
                const myId = `prod_${roomCode}_${Math.random().toString(16).slice(2, 8)}`;
                const peer = new Peer(myId, PEER_CONFIG);
                peerRef.current = peer;

                peer.on('open', (id) => {
                    console.log('Productor: Peer abierto con ID:', id);
                    initMQTT(roomCode, id, true);
                    setConnectionStatus('ONLINE');
                    setInRoom(true);
                });

                // Recibir llamadas de reporteros (DASHBOARD)
                peer.on('call', (call) => {
                    const channel = call.metadata?.channel;
                    console.log(`Productor: Llamada entrante del canal ${channel}`, call.metadata);
                    
                    if (!channel) return;

                    // Respondemos la llamada. 
                    // Si el retorno está activo, podríamos enviar returnStream aquí, 
                    // pero lo manejaremos con tu lógica de toggle para mayor control.
                    call.answer(); 

                    call.on('stream', (remoteStream) => {
                        console.log(`Productor: Stream recibido del canal ${channel}`);
                        
                        // Validamos y activamos tracks de audio
                        if (remoteStream.getAudioTracks().length > 0) {
                            remoteStream.getAudioTracks().forEach(track => {
                                track.enabled = true;
                                console.log(`Audio track activo en Canal ${channel}:`, track.label);
                            });
                        } else {
                            console.warn(`OJO: El Canal ${channel} no está enviando audio.`);
                        }

                        // Guardar stream en el estado del Productor
                        setReporterStreams(prev => ({
                            ...prev,
                            [channel]: remoteStream
                        }));

                        // Reenviar a OBS
                        // IMPORTANTE: El ID de OBS debe ser predecible. 
                        // Quitamos el random del final en el modo OBS para que sea estático:
                        const obsId = `obs_${roomCode}_CH${channel}`; 
                        console.log(`Productor: Reenviando señal a OBS -> ${obsId}`);
                        
                        setTimeout(() => {
                            // Llamamos a OBS enviando el remoteStream que tiene el audio del reportero
                            const obsCall = peer.call(obsId, remoteStream, {
                                metadata: { 
                                    type: 'feed', 
                                    channel: channel,
                                    hasAudio: true 
                                }
                            });

                            if (obsCall) {
                                console.log(`Productor: Conexión con OBS Canal ${channel} establecida`);
                                setObsConnections(prev => ({...prev, [channel]: obsCall}));
                            }
                        }, 1500);
                    });
                    
                    call.on('close', () => {
                        console.log(`Productor: Reportero desconectado del canal ${channel}`);
                        setReporterStreams(prev => {
                            const newStreams = {...prev};
                            delete newStreams[channel];
                            return newStreams;
                        });
                    });
                    
                    call.on('error', (err) => {
                        console.error(`Productor: Error en canal ${channel}:`, err);
                    });
                });

                peer.on('error', (err) => {
                    console.error('Productor PeerJS Error:', err);
                    setConnectionStatus('ERROR');
                });
                
                // También escuchar conexiones entrantes de OBS
                peer.on('connection', (conn) => {
                    console.log('Productor: Conexión de datos recibida:', conn.peer);
                });
            };

            const handleTallyChange = (channel, state) => {
                const newStates = {...tallyStates};
                
                if (state === 'onair') {
                    Object.keys(newStates).forEach(ch => {
                        if (parseInt(ch) !== channel && newStates[ch] === 'onair') {
                            newStates[ch] = 'preview';
                        }
                    });
                    newStates[channel] = 'onair';
                } else {
                    newStates[channel] = state;
                }
                
                setTallyStates(newStates);

                if (mqttClientRef.current?.connected) {
                    Object.keys(newStates).forEach(ch => {
                        mqttClientRef.current.publish(
                            `sc_radio_v1/${roomCode}/tally`,
                            JSON.stringify({ channel: parseInt(ch), state: newStates[ch], time: Date.now() })
                        );
                    });
                }
            };

            const toggleReturn = async () => {
                if (isReturnActive) {
                    if (returnStream) returnStream.getTracks().forEach(t => t.stop());
                    if (returnAnimRef.current) cancelAnimationFrame(returnAnimRef.current);
                    if (returnVideoStreamRef.current) {
                        returnVideoStreamRef.current.getTracks().forEach(t => t.stop());
                    }
                    setReturnStream(null);
                    setIsReturnActive(false);
                    setReturnLevel(0);
                } else {
                    try {
                        const audioStream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                deviceId: selectedReturnDevice ? { exact: selectedReturnDevice } : undefined,
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                channelCount: 2
                            }
                        });
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = 640;
                        canvas.height = 480;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#000000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        
                        ctx.fillStyle = '#3b82f6';
                        ctx.font = 'bold 30px Inter';
                        ctx.textAlign = 'center';
                        ctx.fillText('RETORNO DEL ESTUDIO', canvas.width/2, canvas.height/2);
                        ctx.font = '20px Inter';
                        ctx.fillStyle = '#ffffff';
                        ctx.fillText(`Sala: ${roomCode}`, canvas.width/2, canvas.height/2 + 40);
                        
                        const videoStream = canvas.captureStream(30);
                        returnVideoStreamRef.current = videoStream;
                        
                        const combinedStream = new MediaStream([
                            ...audioStream.getAudioTracks(),
                            ...videoStream.getVideoTracks()
                        ]);
                        
                        setReturnStream(audioStream);
                        
                        // Enviar a todos los reporteros conectados (DASHBOARD - RETORNO)
                        Object.keys(reporterStreams).forEach(ch => {
                            if (peerRef.current) {
                                // IMPORTANTE: Para que el txId funcione, el reportero 
                                // DEBE haber abierto su peer con el ID exacto tx_SALA_CH#
                                // o debemos usar el patrón que definimos antes.
                                const txId = `tx_${roomCode}_CH${ch}`; 
                                console.log(`Enviando señal de retorno (IFB) al Canal ${ch}: ${txId}`);
                                
                                // Llamamos al reportero enviando el audio del estudio (Mic del productor)
                                // Usamos metadata para que el celular del reportero sepa que es el RETORNO
                                peerRef.current.call(txId, combinedStream, {
                                    metadata: { type: 'return', from: 'producer' }
                                });
                            }
                        });
                        
                        setIsReturnActive(true);

                        // Visualización del nivel de retorno (VU Meter del Mic del Productor)
                        const AudioCtx = window.AudioContext || window.webkitAudioContext;
                        // Evitamos duplicar el contexto si ya existe
                        if (!returnAudioCtxRef.current) {
                            returnAudioCtxRef.current = new AudioCtx();
                        }
                        
                        const analyser = returnAudioCtxRef.current.createAnalyser();
                        const source = returnAudioCtxRef.current.createMediaStreamSource(audioStream);
                        source.connect(analyser);
                        
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        const update = () => {
                            if (!isReturnActive) return; // Detener si se apaga el retorno
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            setReturnLevel(Math.min((sum / dataArray.length) * 2, 100));
                            returnAnimRef.current = requestAnimationFrame(update);
                        };
                        update();
                        
                    } catch(e) {
                        console.error("Error al iniciar retorno:", e);
                        alert("Error al iniciar retorno. Verifica permisos de micrófono.");
                    }
                }
            };

            const sendChat = (e) => {
                e.preventDefault();
                if (!chatInput.trim() || !mqttClientRef.current?.connected) return;
                
                const payload = {
                    id: Date.now(),
                    sender: `PRODUCER (${producerName})`,
                    text: chatInput.trim(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                mqttClientRef.current.publish(`sc_radio_v1/${roomCode}/chat`, JSON.stringify(payload));
                setChatInput('');
            };

            // Auto-scroll del chat
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            // Limpieza total al desmontar o cerrar la pestaña
            useEffect(() => {
                return () => {
                    if (returnStream) returnStream.getTracks().forEach(t => t.stop());
                    if (localStream) localStream.getTracks().forEach(t => t.stop());
                    if (returnVideoStreamRef.current) returnVideoStreamRef.current.getTracks().forEach(t => t.stop());
                    if (peerRef.current) {
                        peerRef.current.disconnect();
                        peerRef.current.destroy();
                    }
                    if (mqttClientRef.current) mqttClientRef.current.end();
                    if (returnAnimRef.current) cancelAnimationFrame(returnAnimRef.current);
                };
            }, []);

            // --- VISTA DE OBS ---
            if (userMode === 'obs' && inRoom) {
                return (
                    <div className="obs-view">
                        <video 
                            ref={videoRef}
                            autoPlay 
                            playsInline
                            className="obs-video"
                        />
                        <div className="obs-overlay">
                            CANAL {reporterChannel} • {connectionStatus}
                        </div>
                        <div className={`obs-tally ${tallyMode}`}></div>
                    </div>
                );
            }

            // --- VISTA DE TRANSMITTER ---
            if (userMode === 'tx' && inRoom) {
                return (
                    <div className="transmitter-view">
                        <div className="transmitter-box">
                            <div className={`transmitter-tally ${tallyMode}`}>
                                {tallyMode === 'onair' ? '🔴' : tallyMode === 'preview' ? '🟡' : '⚫'}
                                <span className="tally-label">
                                    {tallyMode === 'onair' ? 'AL AIRE' : tallyMode === 'preview' ? 'PREVIO' : 'STANDBY'}
                                </span>
                            </div>
                            
                            <div className="transmitter-status" style={{
                                color: tallyMode === 'onair' ? '#ef4444' : 
                                       tallyMode === 'preview' ? '#f59e0b' : '#64748b'
                            }}>
                                {tallyMode === 'onair' ? '● ESTÁS AL AIRE' : 
                                 tallyMode === 'preview' ? '● EN PREVIO (MUTEADO)' : 
                                 isTransmitting ? 'CONECTADO' : 'STANDBY'}
                            </div>

                            {/* Selector de dispositivos */}
                            {showDeviceSelector && !isTransmitting && (
                                <div style={{background: '#1a1a1a', padding: '15px', borderRadius: '8px', margin: '15px 0'}}>
                                    <div className="device-selector">
                                        <label>📹 Cámara</label>
                                        <select 
                                            value={selectedVideoDevice} 
                                            onChange={(e) => setSelectedVideoDevice(e.target.value)}
                                        >
                                            {videoDevices.map((d, i) => (
                                                <option key={d.deviceId} value={d.deviceId}>
                                                    {d.label || `Cámara ${i+1}`}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <div className="device-selector" style={{marginTop: '10px'}}>
                                        <label>🎤 Micrófono</label>
                                        <select 
                                            value={selectedAudioDevice} 
                                            onChange={(e) => setSelectedAudioDevice(e.target.value)}
                                        >
                                            {audioDevices.map((d, i) => (
                                                <option key={d.deviceId} value={d.deviceId}>
                                                    {d.label || `Micrófono ${i+1}`}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    
                                    <button 
                                        className="btn btn-secondary"
                                        onClick={async () => {
                                            // Preview de cámara seleccionada
                                            try {
                                                const stream = await navigator.mediaDevices.getUserMedia({
                                                    video: { deviceId: selectedVideoDevice ? { exact: selectedVideoDevice } : undefined },
                                                    audio: false
                                                });
                                                if (videoRef.current) {
                                                    videoRef.current.srcObject = stream;
                                                }
                                            } catch(e) {
                                                console.error('Error en preview:', e);
                                            }
                                        }}
                                    >
                                        👁️ Vista Previa
                                    </button>
                                </div>
                            )}

                            <video 
                                ref={videoRef}
                                autoPlay 
                                playsInline 
                                muted
                                className={`transmitter-video ${tallyMode}`}
                            />

                            {isTransmitting && (
                                <div className="return-video-box">
                                    <div className="return-video-label">📺 RETORNO DEL ESTUDIO</div>
                                    <video 
                                        ref={returnVideoRef}
                                        autoPlay 
                                        playsInline
                                        className="return-video"
                                    />
                                </div>
                            )}

                            <div className="transmitter-controls">
                                {!isTransmitting ? (
                                    <button className="transmitter-btn start" onClick={startTransmission}>
                                        ▶ INICIAR TRANSMISIÓN
                                    </button>
                                ) : (
                                    <>
                                        <button className="transmitter-btn stop" onClick={stopTransmission}>
                                            ⏹ DETENER
                                        </button>
                                        <button 
                                            className="transmitter-btn start" 
                                            onClick={switchCamera}
                                            style={{background: '#3b82f6', color: 'white'}}
                                        >
                                            🔄 CAMBIAR CÁMARA
                                        </button>
                                    </>
                                )}
                            </div>

                            <div className="transmitter-info">
                                <div className="transmitter-item">
                                    <div className="transmitter-item-label">Sala</div>
                                    <div className="transmitter-item-value">{roomCode}</div>
                                </div>
                                <div className="transmitter-item">
                                    <div className="transmitter-item-label">Canal</div>
                                    <div className="transmitter-item-value">#{reporterChannel}</div>
                                </div>
                                <div className="transmitter-item">
                                    <div className="transmitter-item-label">Audio</div>
                                    <div className="transmitter-item-value" style={{color: txLevel > 5 ? '#22c55e' : '#64748b'}}>
                                        {txLevel > 5 ? 'ON' : 'OFF'}
                                    </div>
                                </div>
                                <div className="transmitter-item">
                                    <div className="transmitter-item-label">Estado</div>
                                    <div className="transmitter-item-value" style={{color: isTransmitting ? '#22c55e' : '#64748b'}}>
                                        {isTransmitting ? 'ON' : 'OFF'}
                                    </div>
                                </div>
                            </div>

                            {isTransmitting && (
                                <div className="transmitter-vu">
                                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: '#64748b', marginBottom: '5px'}}>
                                        <span>NIVEL DE AUDIO</span>
                                        <span>{Math.round(txLevel)}%</span>
                                    </div>
                                    <div className="transmitter-vu-bar">
                                        <div className="transmitter-vu-fill" style={{width: `${Math.min(txLevel, 100)}%`}}></div>
                                    </div>
                                </div>
                            )}

                            <div className="transmitter-footer">
                                Stream Radio PRO v4.0 • Reportero Móvil
                            </div>
                        </div>
                    </div>
                );
            }

            // --- LOBBY PRODUCTOR ---
            if (!inRoom) {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <h1 className="text-3xl font-black mb-1 text-white">
                                STREAM<span className="text-blue-500">RADIO</span> <span className="text-yellow-500">PRO</span>
                            </h1>
                            <p className="text-gray-400 text-sm mb-2 font-bold">CONSOLA 4 CANALES + VIDEO + TALLY</p>
                            <p className="text-gray-500 text-xs mb-6">v4.0 - Flujo: Reportero → Productor → OBS</p>

                            <input 
                                className="auth-input" 
                                placeholder="CÓDIGO DE SALA" 
                                value={roomCode} 
                                onChange={e => setRoomCode(e.target.value.toUpperCase())} 
                            />
                            <input 
                                className="auth-input" 
                                placeholder="NOMBRE DEL PRODUCTOR" 
                                value={producerName} 
                                onChange={e => setProducerName(e.target.value)} 
                            />
                           
                            <button className="btn btn-main" onClick={joinAsProducer}>
                                INICIAR CONSOLA
                            </button>
                        </div>
                    </div>
                );
            }

            // --- DASHBOARD PRODUCTOR ---
            return (
                <div className="dashboard-layout">
                    <div className="top-bar">
                        <div className="font-black text-xl text-white">
                            STREAM<span className="text-blue-500">RADIO</span> 
                            <span className="text-yellow-500 ml-2">PRO</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-xs font-bold text-gray-400">SALA: {roomCode}</span>
                            <div className="flex gap-1">
                                {[1,2,3,4].map(ch => (
                                    <div 
                                        key={ch} 
                                        className={`w-3 h-3 rounded-full ${
                                            tallyStates[ch] === 'onair' ? 'bg-red-500 shadow-[0_0_10px_#ef4444]' : 
                                            tallyStates[ch] === 'preview' ? 'bg-yellow-500' : 
                                            'bg-gray-700'
                                        }`}
                                    />
                                ))}
                            </div>
                            <span className={`text-xs px-3 py-1 rounded font-bold ${connectionStatus === 'ONLINE' ? 'text-green-400' : 'text-red-400'}`}>
                                {connectionStatus}
                            </span>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="channels-panel">
                            <div className="instructions">
                                <h3>📋 Instrucciones v4.0</h3>
                                <p><strong>1.</strong> Comparte URL amarilla con el reportero<br/>
                                <strong>2.</strong> Reportero selecciona cámara frontal/trasera y micrófono<br/>
                                <strong>3.</strong> Usa URL azul en OBS Browser Source<br/>
                                <strong>4.</strong> Solo el canal en "AL AIRE" tiene audio activo<br/>
                                <strong>5.</strong> Los demás canales permanecen en previo muteados</p>
                            </div>
                            
                            <div className="channels-grid">
                                {[1, 2, 3, 4].map(ch => (
                                    <ChannelBox
                                        key={ch}
                                        channelNum={ch}
                                        roomCode={roomCode}
                                        peerRef={peerRef}
                                        onTallyChange={handleTallyChange}
                                        returnStream={returnStream}
                                        isReturnActive={isReturnActive}
                                        baseUrl={baseUrl}
                                        tallyState={tallyStates}
                                        reporterStreams={reporterStreams}
                                        onStreamUpdate={(stream) => {
                                            setReporterStreams(prev => ({...prev, [ch]: stream}));
                                        }}
                                    />
                                ))}
                            </div>
                        </div>

                        <div className="return-panel">
                            <div className="return-title">🎧 Retorno a Campo</div>
                            
                            <div className={`return-status-box ${isReturnActive ? 'active' : ''}`}>
                                <div className={`return-led ${isReturnActive ? 'on' : ''}`}></div>
                                <div className="text-sm font-bold text-white mb-1">
                                    {isReturnActive ? 'RETORNO ACTIVO' : 'RETORNO STANDBY'}
                                </div>
                                {isReturnActive && (
                                    <div className="vu-container">
                                        <div className="vu-bar" style={{width: `${Math.min(returnLevel, 100)}%`}}></div>
                                    </div>
                                )}
                            </div>

                            <div className="control-group">
                                <label className="control-label">Fuente de Retorno</label>
                                <select 
                                    value={selectedReturnDevice} 
                                    onChange={e => setSelectedReturnDevice(e.target.value)}
                                    disabled={isReturnActive}
                                >
                                    {returnDevices.map((d, i) => (
                                        <option key={d.deviceId} value={d.deviceId}>
                                            {d.label || `Entrada ${i+1}`}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <button 
                                className={`tx-btn ${isReturnActive ? 'active' : 'idle'}`}
                                onClick={toggleReturn}
                            >
                                {isReturnActive ? '⏹ CORTAR RETORNO' : '▶ INICIAR RETORNO (AUDIO+VIDEO)'}
                            </button>

                            <div className="chat-container">
                                <div className="chat-header">
                                    <span>Chat de Producción</span>
                                    <span style={{color: '#64748b'}}>{messages.length}</span>
                                </div>
                                <div className="chat-messages">
                                    {messages.length === 0 && (
                                        <div style={{textAlign: 'center', color: '#475569', padding: '20px', fontSize: '0.8rem'}}>
                                            Sin mensajes
                                        </div>
                                    )}
                                    {messages.map(m => (
                                        <div key={m.id} className="chat-msg">
                                            <span className="sender">{m.sender}</span>
                                            <span className="time">{m.time}</span>
                                            <div className="text">{m.text}</div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form className="chat-input-area" onSubmit={sendChat}>
                                    <input 
                                        value={chatInput}
                                        onChange={e => setChatInput(e.target.value)}
                                        placeholder="Mensaje al equipo..."
                                    />
                                    <button type="submit" disabled={!chatInput.trim()}>➤</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
