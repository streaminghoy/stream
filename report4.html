<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Radio PRO - 4 Canales (Producer Console) By streaminghoy.com.ar</title>
   
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
       
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }

        /* --- LOBBY --- */
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .glass-box { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 400px; width: 100%; text-align: center; }
        input.auth-input { width: 100%; background: #000; border: 2px solid #333; color: white; padding: 15px; border-radius: 6px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; text-transform: uppercase; }
        input.auth-input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 15px; font-weight: 900; font-size: 1rem; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: #3b82f6; color: white; }
        .btn-main:hover { background: #2563eb; }

        /* --- DASHBOARD UI --- */
        .dashboard-layout { display: flex; flex-direction: column; height: 100vh; background: #0f172a; }
        .top-bar { padding: 15px 30px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
       
        .main-content { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media(min-width: 1024px) { .main-content { flex-direction: row; } }

        /* PANEL DE 4 CANALES (IZQUIERDA) */
        .channels-panel { flex: 1; padding: 20px; background: #0b0f19; overflow-y: auto; }
        
        .channels-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .channels-grid { grid-template-columns: repeat(2, 1fr); } }

        /* CADA CANAL */
        .channel-box { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 20px; position: relative; transition: all 0.3s; }
        .channel-box.active { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .channel-box.tally-on { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); background: #2a1515; }
        
        .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .channel-id { font-size: 1.5rem; font-weight: 900; color: white; }
        
        /* TALLY LIGHT */
        .tally-light { 
            width: 20px; height: 20px; border-radius: 50%; background: #333; 
            transition: all 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .tally-light.on { 
            background: #ef4444; 
            box-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444; 
            animation: pulseTally 1s infinite;
        }
        
        @keyframes pulseTally {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* URL PARA OBS/VMIX */
        .url-box { 
            background: #000; border: 1px solid #444; border-radius: 6px; 
            padding: 10px; font-family: monospace; font-size: 0.75rem; 
            color: #22c55e; word-break: break-all; margin-bottom: 15px;
            cursor: pointer; position: relative;
        }
        .url-box:hover { border-color: #22c55e; }
        .url-label { font-size: 0.6rem; color: #64748b; text-transform: uppercase; margin-bottom: 4px; }

        /* CONTROLES DE CANAL */
        .channel-controls { display: flex; flex-direction: column; gap: 10px; }
        
        .rx-btn { padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem; text-transform: uppercase; transition: 0.2s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .rx-btn.play { background: #22c55e; color: black; }
        .rx-btn.play:hover { background: #16a34a; }
        .rx-btn.stop { background: #ef4444; color: white; }
        .rx-btn.stop:hover { background: #dc2626; }
        .rx-btn.disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        /* VU METER */
        .vu-container { width: 100%; height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin-top: 10px; border: 1px solid #334155; }
        .vu-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #22c55e, #facc15, #ef4444); transition: width 0.05s; }

        /* PANEL DE RETORNO (DERECHA) */
        .return-panel { 
            width: 100%; background: #0f172a; border-left: 1px solid #334155; 
            display: flex; flex-direction: column; padding: 20px;
        }
        @media(min-width: 1024px) { .return-panel { width: 350px; flex-shrink: 0; } }

        .return-title { font-size: 1.2rem; font-weight: 900; color: white; margin-bottom: 20px; text-align: center; }
        
        .return-status { 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px; 
            padding: 20px; text-align: center; margin-bottom: 20px;
        }
        .return-status.streaming { border-color: #3b82f6; background: #1a2332; }
        
        .return-led { width: 15px; height: 15px; border-radius: 50%; background: #333; margin: 0 auto 10px; }
        .return-led.on { background: #3b82f6; box-shadow: 0 0 15px #3b82f6; }

        /* TX DEL RETORNO */
        .tx-controls { margin-top: 20px; }
        .tx-btn { width: 100%; padding: 15px; font-size: 1rem; font-weight: 900; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .tx-btn.idle { background: #3b82f6; color: white; }
        .tx-btn.idle:hover { background: #2563eb; }
        .tx-btn.active { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none; margin-bottom: 15px; cursor: pointer; }
        select:focus { border-color: #3b82f6; }

        /* VOLUMEN GLOBAL */
        .volume-control { margin-top: 20px; }
        .volume-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: white; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }

        /* INFO DE CONEXIÓN */
        .connection-info { 
            background: #000; border: 1px solid #333; border-radius: 6px; 
            padding: 10px; font-size: 0.7rem; color: #64748b; margin-top: 20px;
        }

        /* CHAT */
        .chat-panel { margin-top: 20px; flex: 1; display: flex; flex-direction: column; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; background: #000; border-radius: 6px; max-height: 200px; }
        .chat-msg { background: #1e293b; padding: 8px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 5px; }
        .chat-msg .sender { font-weight: 900; color: #3b82f6; }
        .chat-msg .time { color: #64748b; font-size: 0.6rem; float: right; }
        .chat-input { display: flex; gap: 5px; margin-top: 10px; }
        .chat-input input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; font-size: 0.8rem; }
        .chat-input button { background: #3b82f6; color: white; border: none; padding: 0 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* COPY TOAST */
        .toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #22c55e; color: black; padding: 10px 20px; 
            border-radius: 6px; font-weight: bold; z-index: 1000;
            animation: fadeInOut 2s;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            10%, 90% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PEER_CONFIG = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        // Componente para un Canal Individual
        const ChannelBox = ({ 
            channelNum, 
            roomCode, 
            peerRef, 
            onTallyChange,
            returnStream, // El stream de retorno para enviar a este reportero
            isReturnActive 
        }) => {
            const [status, setStatus] = useState('OFFLINE'); // OFFLINE, CONNECTING, LIVE, ERROR
            const [isListening, setIsListening] = useState(false);
            const [vuLevel, setVuLevel] = useState(0);
            const [volume, setVolume] = useState(1);
            const [reporterName, setReporterName] = useState('');
            const [kbps, setKbps] = useState('128');
            
            const audioElRef = useRef(null);
            const analyserRef = useRef(null);
            const animRef = useRef(null);
            const callRef = useRef(null);
            const returnCallRef = useRef(null);
            
            // PeerID único para este canal (el reportero se conectará a este ID)
            const myPeerId = `rad_${roomCode}_CH${channelNum}_${Math.random().toString(16).slice(2, 8)}`;
            const fullUrl = `${window.location.origin}${window.location.pathname}?room=${roomCode}&ch=${channelNum}&id=${myPeerId}`;

            // Escuchar llamadas entrantes (del reportero)
            useEffect(() => {
                if (!peerRef.current) return;

                const handleCall = (call) => {
                    // Solo aceptar llamadas para este canal específico
                    if (call.peer.includes(`_CH${channelNum}_`)) {
                        call.answer(); // Answer without stream (solo recibir)
                        callRef.current = call;
                        
                        call.on('stream', (remoteStream) => {
                            setStatus('LIVE');
                            setReporterName(call.metadata?.name || `Reportero ${channelNum}`);
                            setKbps(call.metadata?.kbps || '128');
                            onTallyChange(channelNum, true);
                            
                            // Reproducir audio
                            if (audioElRef.current) {
                                audioElRef.current.srcObject = remoteStream;
                                audioElRef.current.volume = volume;
                                audioElRef.current.play().catch(e => console.log('Autoplay blocked'));
                            }
                            
                            // VU Meter
                            setupVUMeter(remoteStream);
                        });

                        call.on('close', () => {
                            cleanup();
                        });

                        call.on('error', () => {
                            setStatus('ERROR');
                            cleanup();
                        });
                    }
                };

                peerRef.current.on('call', handleCall);
                
                return () => {
                    cleanup();
                };
            }, [peerRef.current]);

            // Enviar retorno cuando esté disponible
            useEffect(() => {
                if (returnStream && isReturnActive && callRef.current && !returnCallRef.current) {
                    // Crear una llamada de vuelta para el retorno
                    // Usamos el mismo peer pero llamamos al reportero
                    const reporterPeerId = callRef.current.peer;
                    const returnCall = peerRef.current.call(reporterPeerId, returnStream, {
                        metadata: { type: 'return', channel: channelNum }
                    });
                    returnCallRef.current = returnCall;
                } else if ((!isReturnActive || !returnStream) && returnCallRef.current) {
                    returnCallRef.current.close();
                    returnCallRef.current = null;
                }
            }, [returnStream, isReturnActive]);

            const setupVUMeter = (stream) => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const analyser = ctx.createAnalyser();
                    const source = ctx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyserRef.current = analyser;
                    
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    const update = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        setVuLevel(sum / dataArray.length);
                        animRef.current = requestAnimationFrame(update);
                    };
                    update();
                } catch(e) {
                    console.error('VU Meter error:', e);
                }
            };

            const cleanup = () => {
                if (animRef.current) cancelAnimationFrame(animRef.current);
                if (callRef.current) callRef.current.close();
                if (returnCallRef.current) returnCallRef.current.close();
                if (audioElRef.current) audioElRef.current.srcObject = null;
                callRef.current = null;
                returnCallRef.current = null;
                setStatus('OFFLINE');
                setVuLevel(0);
                onTallyChange(channelNum, false);
            };

            const copyUrl = () => {
                navigator.clipboard.writeText(myPeerId);
                // Mostrar toast
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = 'ID copiado al portapapeles';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            };

            const getStatusColor = () => {
                switch(status) {
                    case 'LIVE': return 'text-green-400';
                    case 'CONNECTING': return 'text-yellow-400';
                    case 'ERROR': return 'text-red-400';
                    default: return 'text-gray-500';
                }
            };

            return (
                <div className={`channel-box ${status === 'LIVE' ? 'active' : ''}`}>
                    <audio ref={audioElRef} autoPlay playsInline style={{display: 'none'}} />
                    
                    <div className="channel-header">
                        <div className="channel-id">CANAL {channelNum}</div>
                        <div className={`tally-light ${status === 'LIVE' ? 'on' : ''}`} title="TALLY ON AIR"></div>
                    </div>

                    <div className="url-box" onClick={copyUrl} title="Click para copiar ID del canal">
                        <div className="url-label">ID PARA OBS/VMIX (Click para copiar)</div>
                        {myPeerId}
                    </div>

                    <div className="flex justify-between items-center mb-2">
                        <span className={`text-xs font-bold ${getStatusColor()}`}>
                            {status === 'OFFLINE' ? 'ESPERANDO CONEXIÓN' : 
                             status === 'LIVE' ? '● EN VIVO' : status}
                        </span>
                        {status === 'LIVE' && (
                            <span className="text-xs text-gray-400">{kbps} kbps</span>
                        )}
                    </div>

                    {status === 'LIVE' && reporterName && (
                        <div className="text-sm font-bold text-white mb-2">
                            {reporterName}
                        </div>
                    )}

                    {status === 'LIVE' && (
                        <>
                            <div className="vu-container">
                                <div className="vu-bar" style={{width: `${Math.min(vuLevel * 2, 100)}%`}}></div>
                            </div>
                            
                            <div className="flex items-center gap-2 mt-3">
                                <span className="text-[10px] text-gray-400">VOL</span>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="1" 
                                    step="0.05" 
                                    value={volume}
                                    onChange={(e) => {
                                        const v = parseFloat(e.target.value);
                                        setVolume(v);
                                        if (audioElRef.current) audioElRef.current.volume = v;
                                    }}
                                />
                            </div>
                        </>
                    )}

                    {status === 'LIVE' && (
                        <div className="mt-3 flex items-center gap-2">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-xs text-green-400">Retorno: {isReturnActive ? 'ACTIVO' : 'STANDBY'}</span>
                        </div>
                    )}
                </div>
            );
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [inRoom, setInRoom] = useState(false);
            const [roomCode, setRoomCode] = useState('');
            const [producerName, setProducerName] = useState('');
            
            // Estados del sistema
            const [status, setStatus] = useState('OFFLINE');
            const [tallyStates, setTallyStates] = useState({1: false, 2: false, 3: false, 4: false});
            
            // Retorno (TX del estudio a los reporteros)
            const [isReturnActive, setIsReturnActive] = useState(false);
            const [returnDevices, setReturnDevices] = useState([]);
            const [selectedReturnDevice, setSelectedReturnDevice] = useState('');
            const [returnStream, setReturnStream] = useState(null);
            const [returnLevel, setReturnLevel] = useState(0);
            
            // Chat
            const [messages, setMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            
            // Refs
            const peerRef = useRef(null);
            const mqttClientRef = useRef(null);
            const returnAudioCtxRef = useRef(null);
            const returnAnimRef = useRef(null);
            const messagesEndRef = useRef(null);

            // Generar código de sala al inicio
            useEffect(() => {
                setRoomCode(Math.random().toString(36).substring(2, 6).toUpperCase());
                loadAudioDevices();
            }, []);

            const loadAudioDevices = async () => {
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    tempStream.getTracks().forEach(t => t.stop());
                    
                    const devs = await navigator.mediaDevices.enumerateDevices();
                    const audios = devs.filter(d => d.kind === 'audioinput');
                    setReturnDevices(audios);
                    if (audios.length > 0) setSelectedReturnDevice(audios[0].deviceId);
                } catch(e) {
                    console.error("Error cargando dispositivos:", e);
                }
            };

            const joinRoom = () => {
                if (!roomCode || !producerName) return alert("Completa todos los campos");

                setStatus('CONECTANDO...');
                
                const myPeerId = `prod_${roomCode}_${Math.random().toString(16).slice(2)}`;
                peerRef.current = new Peer(myPeerId, PEER_CONFIG);

                peerRef.current.on('open', (id) => {
                    setStatus('ONLINE');
                    setInRoom(true);
                    initMQTT(id);
                });

                peerRef.current.on('error', (err) => {
                    console.error(err);
                    setStatus('ERROR');
                });
            };

            const initMQTT = (peerId) => {
                const topicChat = `sc_radio_v1/${roomCode}/chat`;
                const topicTally = `sc_radio_v1/${roomCode}/tally`;
                
                mqttClientRef.current = mqtt.connect(MQTT_BROKER, { 
                    clientId: `mqtt_prod_${peerId}` 
                });

                mqttClientRef.current.on('connect', () => {
                    mqttClientRef.current.subscribe(topicChat);
                    mqttClientRef.current.subscribe(topicTally);
                });

                mqttClientRef.current.on('message', (t, msg) => {
                    try {
                        if (t === topicChat) {
                            const payload = JSON.parse(msg.toString());
                            setMessages(prev => [...prev, payload].slice(-50));
                        }
                    } catch(e) {}
                });
            };

            const handleTallyChange = (channel, isLive) => {
                setTallyStates(prev => ({ ...prev, [channel]: isLive }));
                
                // Publicar estado de tally por MQTT para sincronización
                if (mqttClientRef.current?.connected) {
                    mqttClientRef.current.publish(
                        `sc_radio_v1/${roomCode}/tally`, 
                        JSON.stringify({ channel, isLive, time: Date.now() })
                    );
                }
            };

            const toggleReturn = async () => {
                if (isReturnActive) {
                    // Detener retorno
                    if (returnStream) {
                        returnStream.getTracks().forEach(t => t.stop());
                    }
                    if (returnAnimRef.current) cancelAnimationFrame(returnAnimRef.current);
                    setReturnStream(null);
                    setIsReturnActive(false);
                    setReturnLevel(0);
                } else {
                    // Iniciar retorno
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                deviceId: selectedReturnDevice ? { exact: selectedReturnDevice } : undefined,
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                channelCount: 2
                            }
                        });
                        
                        setReturnStream(stream);
                        setIsReturnActive(true);
                        
                        // VU Meter para retorno
                        const AudioCtx = window.AudioContext || window.webkitAudioContext;
                        returnAudioCtxRef.current = new AudioCtx();
                        const analyser = returnAudioCtxRef.current.createAnalyser();
                        const source = returnAudioCtxRef.current.createMediaStreamSource(stream);
                        source.connect(analyser);
                        
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        const update = () => {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            setReturnLevel(sum / dataArray.length);
                            returnAnimRef.current = requestAnimationFrame(update);
                        };
                        update();
                        
                    } catch(e) {
                        alert("Error al iniciar retorno. Verifica permisos de micrófono.");
                    }
                }
            };

            const sendChat = (e) => {
                e.preventDefault();
                if (!chatInput.trim() || !mqttClientRef.current?.connected) return;
                
                const payload = {
                    id: Date.now(),
                    sender: `PRODUCER (${producerName})`,
                    text: chatInput.trim(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                mqttClientRef.current.publish(`sc_radio_v1/${roomCode}/chat`, JSON.stringify(payload));
                setChatInput('');
            };

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            // Cleanup
            useEffect(() => {
                return () => {
                    if (returnStream) returnStream.getTracks().forEach(t => t.stop());
                    if (peerRef.current) peerRef.current.destroy();
                    if (mqttClientRef.current) mqttClientRef.current.end();
                };
            }, []);

            if (!inRoom) {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <h1 className="text-3xl font-black mb-1 text-white">STREAM<span className="text-blue-500">RADIO</span> <span className="text-yellow-500">PRO</span></h1>
                            <p className="text-gray-400 text-sm mb-2 font-bold">CONSOLA 4 CANALES + TALLY</p>
                            <p className="text-gray-500 text-xs mb-6">v3.0 - Producer Console</p>

                            <input 
                                className="auth-input" 
                                placeholder="CÓDIGO DE SALA" 
                                value={roomCode} 
                                onChange={e => setRoomCode(e.target.value.toUpperCase())} 
                            />
                            <input 
                                className="auth-input" 
                                placeholder="NOMBRE DEL PRODUCTOR" 
                                value={producerName} 
                                onChange={e => setProducerName(e.target.value)} 
                            />
                           
                            <button className="btn btn-main" onClick={joinRoom}>
                                INICIAR CONSOLA
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="dashboard-layout">
                    {/* BARRA SUPERIOR */}
                    <div className="top-bar">
                        <div className="font-black text-xl text-white">
                            STREAM<span className="text-blue-500">RADIO</span> 
                            <span className="text-yellow-500 ml-2">PRO</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-xs font-bold text-gray-400">SALA: {roomCode}</span>
                            <div className="flex gap-2">
                                {[1,2,3,4].map(ch => (
                                    <div 
                                        key={ch} 
                                        className={`w-3 h-3 rounded-full ${tallyStates[ch] ? 'bg-red-500 shadow-[0_0_10px_#ef4444]' : 'bg-gray-700'}`}
                                        title={`Canal ${ch} ${tallyStates[ch] ? 'EN VIVO' : 'OFFLINE'}`}
                                    />
                                ))}
                            </div>
                            <span className={`text-xs px-3 py-1 rounded font-bold ${status === 'ONLINE' ? 'text-green-400 bg-slate-700' : 'text-red-400'}`}>
                                {status}
                            </span>
                        </div>
                    </div>

                    <div className="main-content">
                        {/* PANEL DE 4 CANALES */}
                        <div className="channels-panel">
                            <h2 className="text-lg font-black text-white mb-4 flex items-center gap-2">
                                <span className="w-2 h-2 bg-blue-500 rounded-full"></span>
                                ENTRADAS DE REPORTEROS (4 CANALES)
                            </h2>
                            
                            <div className="channels-grid">
                                {[1, 2, 3, 4].map(ch => (
                                    <ChannelBox
                                        key={ch}
                                        channelNum={ch}
                                        roomCode={roomCode}
                                        peerRef={peerRef}
                                        onTallyChange={handleTallyChange}
                                        returnStream={returnStream}
                                        isReturnActive={isReturnActive}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* PANEL DE RETORNO Y CHAT */}
                        <div className="return-panel">
                            <div className="return-title">🎧 RETORNO A CAMPO</div>
                            
                            <div className={`return-status ${isReturnActive ? 'streaming' : ''}`}>
                                <div className={`return-led ${isReturnActive ? 'on' : ''}`}></div>
                                <div className="text-sm font-bold text-white mb-1">
                                    {isReturnActive ? 'RETORNO ACTIVO' : 'RETORNO STANDBY'}
                                </div>
                                <div className="text-xs text-gray-400">
                                    {isReturnActive ? 'Todos los reporteros escuchan esta señal' : 'El retorno está silenciado'}
                                </div>
                                
                                {isReturnActive && (
                                    <div className="mt-3">
                                        <div className="text-[10px] text-blue-400 text-center mb-1">NIVEL DE RETORNO</div>
                                        <div className="vu-container">
                                            <div className="vu-bar" style={{width: `${Math.min(returnLevel * 2, 100)}%`}}></div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="tx-controls">
                                <label className="text-xs font-bold text-gray-400 uppercase mb-2 block">Fuente de Retorno</label>
                                <select 
                                    value={selectedReturnDevice} 
                                    onChange={e => setSelectedReturnDevice(e.target.value)}
                                    disabled={isReturnActive}
                                >
                                    {returnDevices.map((d, i) => (
                                        <option key={d.deviceId} value={d.deviceId}>
                                            {d.label || `Entrada ${i+1}`}
                                        </option>
                                    ))}
                                </select>

                                <button 
                                    className={`tx-btn ${isReturnActive ? 'active' : 'idle'}`}
                                    onClick={toggleReturn}
                                >
                                    {isReturnActive ? '⏹ CORTAR RETORNO' : '▶ INICIAR RETORNO'}
                                </button>
                            </div>

                            <div className="volume-control">
                                <label className="volume-label">Volumen General de Monitoreo</label>
                                <input type="range" min="0" max="1" step="0.05" defaultValue="1" />
                            </div>

                            {/* CHAT DE PRODUCCIÓN */}
                            <div className="chat-panel">
                                <div className="text-xs font-bold text-gray-400 uppercase mb-2">Chat de Producción</div>
                                <div className="chat-messages">
                                    {messages.length === 0 && (
                                        <div className="text-gray-600 text-xs text-center">Sin mensajes</div>
                                    )}
                                    {messages.map(m => (
                                        <div key={m.id} className="chat-msg">
                                            <span className="sender">{m.sender}</span>
                                            <span className="time">{m.time}</span>
                                            <div className="mt-1 text-gray-300">{m.text}</div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form className="chat-input" onSubmit={sendChat}>
                                    <input 
                                        value={chatInput}
                                        onChange={e => setChatInput(e.target.value)}
                                        placeholder="Mensaje al equipo..."
                                    />
                                    <button type="submit">➤</button>
                                </form>
                            </div>

                            <div className="connection-info">
                                <div>Peer ID: {peerRef.current?.id || '...'}</div>
                                <div>Canales activos: {Object.values(tallyStates).filter(Boolean).length}/4</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
