<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stream Radio PRO - 4 Canales By streaminghoy.com.ar</title>
   
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
       
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }

        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .glass-box { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 400px; width: 100%; text-align: center; }
        input.auth-input { width: 100%; background: #000; border: 2px solid #333; color: white; padding: 15px; border-radius: 6px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; text-transform: uppercase; }
        input.auth-input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 15px; font-weight: 900; font-size: 1rem; border-radius: 6px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: #3b82f6; color: white; }
        .btn-main:hover { background: #2563eb; }

        .dashboard-layout { display: flex; flex-direction: column; height: 100vh; background: #0f172a; }
        .top-bar { padding: 15px 30px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
       
        .main-content { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        @media(min-width: 1024px) { .main-content { flex-direction: row; } }

        .channels-panel { flex: 1; padding: 20px; background: #0b0f19; overflow-y: auto; }
        
        .channels-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .channels-grid { grid-template-columns: repeat(2, 1fr); } }

        .channel-box { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 20px; position: relative; transition: all 0.3s; }
        .channel-box.active { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        
        .channel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .channel-id { font-size: 1.5rem; font-weight: 900; color: white; }
        
        .tally-light { 
            width: 20px; height: 20px; border-radius: 50%; background: #333; 
            transition: all 0.3s; box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .tally-light.on { 
            background: #ef4444; 
            box-shadow: 0 0 20px #ef4444, 0 0 40px #ef4444; 
            animation: pulseTally 1s infinite;
        }
        
        @keyframes pulseTally {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* URL PARA OBS */
        .url-container-obs { 
            background: #000; 
            border: 2px solid #3b82f6; 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .url-container-obs:hover { border-color: #60a5fa; background: #0a1a2a; }
        .url-container-obs.copied { border-color: #22c55e; }
        
        /* URL PARA REPORTERO */
        .url-container-reporter { 
            background: #000; 
            border: 2px solid #f59e0b; 
            border-radius: 8px; 
            padding: 12px; 
            margin-bottom: 15px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        .url-container-reporter:hover { border-color: #fbbf24; background: #1a1a0a; }
        .url-container-reporter.copied { border-color: #22c55e; }
        
        .url-label { 
            font-size: 0.65rem; 
            color: #64748b; 
            text-transform: uppercase; 
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        
        .url-text { 
            font-family: 'Courier New', monospace; 
            font-size: 0.7rem; 
            word-break: break-all;
            line-height: 1.4;
        }
        
        .url-obs { color: #3b82f6; }
        .url-reporter { color: #f59e0b; }
        
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #334155;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.65rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-weight: bold;
        }
        .url-container-obs:hover .copy-btn,
        .url-container-reporter:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #3b82f6; }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-badge.offline { background: #334155; color: #94a3b8; }
        .status-badge.connecting { background: #713f12; color: #facc15; }
        .status-badge.live { background: #14532d; color: #4ade80; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.live { background: #4ade80; animation: blink 1s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .vu-container { width: 100%; height: 8px; background: #000; border-radius: 4px; overflow: hidden; margin-top: 10px; border: 1px solid #334155; }
        .vu-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #22c55e, #facc15, #ef4444); transition: width 0.05s; }

        .volume-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .volume-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; min-width: 30px; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: white; cursor: pointer; margin-top: -5px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }

        .return-panel { 
            width: 100%; background: #0f172a; border-left: 1px solid #334155; 
            display: flex; flex-direction: column; padding: 20px;
        }
        @media(min-width: 1024px) { .return-panel { width: 380px; flex-shrink: 0; } }

        .return-title { font-size: 1.1rem; font-weight: 900; color: white; margin-bottom: 20px; text-align: center; text-transform: uppercase; }
        
        .return-status-box { 
            background: #1e293b; border: 2px solid #334155; border-radius: 12px; 
            padding: 20px; text-align: center; margin-bottom: 20px;
        }
        .return-status-box.active { border-color: #3b82f6; background: #1e293b; }
        
        .return-led { width: 20px; height: 20px; border-radius: 50%; background: #333; margin: 0 auto 10px; transition: all 0.3s; }
        .return-led.on { background: #3b82f6; box-shadow: 0 0 20px #3b82f6; animation: pulseBlue 1.5s infinite; }
        
        @keyframes pulseBlue {
            0%, 100% { box-shadow: 0 0 20px #3b82f6; }
            50% { box-shadow: 0 0 40px #3b82f6, 0 0 60px #3b82f6; }
        }

        .control-group { margin-bottom: 15px; }
        .control-label { font-size: 0.7rem; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        select { 
            width: 100%; background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none; cursor: pointer; 
        }
        select:focus { border-color: #3b82f6; }
        select:disabled { opacity: 0.5; cursor: not-allowed; }

        .tx-btn { 
            width: 100%; padding: 15px; font-size: 0.9rem; font-weight: 900; 
            text-transform: uppercase; border: none; border-radius: 8px; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tx-btn.idle { background: #3b82f6; color: white; }
        .tx-btn.idle:hover { background: #2563eb; }
        .tx-btn.active { background: #ef4444; color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .chat-container { flex: 1; display: flex; flex-direction: column; margin-top: 20px; min-height: 0; }
        .chat-header { 
            font-size: 0.75rem; font-weight: bold; color: #94a3b8; 
            text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; 
        }
        .chat-messages { 
            flex: 1; overflow-y: auto; background: #000; border: 1px solid #334155; 
            border-radius: 8px; padding: 10px; min-height: 150px;
        }
        .chat-msg { background: #1e293b; padding: 8px 10px; border-radius: 6px; margin-bottom: 6px; font-size: 0.8rem; }
        .chat-msg .sender { font-weight: 900; color: #3b82f6; font-size: 0.7rem; text-transform: uppercase; }
        .chat-msg .time { color: #64748b; font-size: 0.6rem; float: right; }
        .chat-msg .text { margin-top: 3px; color: #e2e8f0; line-height: 1.3; }
        
        .chat-input-area { display: flex; gap: 8px; margin-top: 8px; }
        .chat-input-area input { 
            flex: 1; background: #0f172a; border: 1px solid #334155; color: white; 
            padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; outline: none;
        }
        .chat-input-area input:focus { border-color: #3b82f6; }
        .chat-input-area button { 
            background: #3b82f6; color: white; border: none; padding: 0 16px; 
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }
        .chat-input-area button:hover { background: #2563eb; }
        .chat-input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #22c55e; color: black; padding: 12px 24px; 
            border-radius: 8px; font-weight: 900; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .instructions {
            background: #1e293b; border-left: 3px solid #3b82f6; padding: 10px 15px;
            margin-bottom: 20px; border-radius: 0 8px 8px 0;
        }
        .instructions h3 { margin: 0 0 5px 0; font-size: 0.8rem; color: #3b82f6; text-transform: uppercase; }
        .instructions p { margin: 0; font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }

        /* VISTA DE REPORTERO - SOLO PARA ABRIR EN CELULAR */
        .reporter-view {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        
        .reporter-box {
            background: #111;
            border: 2px solid #333;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        .reporter-tally {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #222;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s;
            border: 4px solid #444;
        }
        
        .reporter-tally.on {
            background: #ef4444;
            border-color: #ef4444;
            box-shadow: 0 0 50px #ef4444;
            animation: tallyPulse 1s infinite;
        }
        
        @keyframes tallyPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .reporter-status {
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .reporter-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .reporter-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
        }
        
        .reporter-item-label {
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .reporter-item-value {
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
        }
        
        .reporter-vu {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 8px;
        }
        
        .reporter-vu-bar {
            height: 12px;
            background: #222;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #444;
        }
        
        .reporter-vu-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #facc15, #ef4444);
            transition: width 0.1s;
        }

        .reporter-video {
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: #000;
            border-radius: 8px;
            margin: 20px auto;
            object-fit: cover;
            border: 2px solid #333;
        }
        
        .reporter-video.active {
            border-color: #ef4444;
        }

        .reporter-controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .reporter-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        
        .reporter-btn.start {
            background: #22c55e;
            color: black;
        }
        
        .reporter-btn.stop {
            background: #ef4444;
            color: white;
        }
        
        .reporter-btn:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        .reporter-footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PEER_CONFIG = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        const ChannelBox = ({ channelNum, roomCode, peerRef, onTallyChange, returnStream, isReturnActive, baseUrl }) => {
            const [status, setStatus] = useState('offline');
            const [reporterInfo, setReporterInfo] = useState({ name: '', kbps: '128' });
            const [vuLevel, setVuLevel] = useState(0);
            const [volume, setVolume] = useState(1);
            const [copiedObs, setCopiedObs] = useState(false);
            const [copiedReporter, setCopiedReporter] = useState(false);
            
            const audioElRef = useRef(null);
            const analyserRef = useRef(null);
            const animRef = useRef(null);
            const callRef = useRef(null);
            const returnCallRef = useRef(null);
            
            // URL para OBS (modo reporter con producer ID)
            const obsUrl = peerRef.current?.id 
                ? `${baseUrl}?mode=reporter&room=${roomCode}&ch=${channelNum}&producer=${peerRef.current.id}`
                : 'Conectando...';
            
            // URL para reportero (modo transmitter - él se conecta como emisor)
            const reporterUrl = peerRef.current?.id
                ? `${baseUrl}?mode=transmitter&room=${roomCode}&ch=${channelNum}&call=${peerRef.current.id}`
                : 'Conectando...';

            useEffect(() => {
                if (!peerRef.current) return;

                const handleCall = (call) => {
                    const isForThisChannel = call.metadata?.channel === channelNum || 
                                           call.peer.includes(`_CH${channelNum}_`);
                    
                    if (!isForThisChannel) return;

                    callRef.current = call;
                    setStatus('connecting');

                    call.on('stream', (remoteStream) => {
                        setStatus('live');
                        setReporterInfo({
                            name: call.metadata?.name || `Reportero ${channelNum}`,
                            kbps: call.metadata?.kbps || '128'
                        });
                        onTallyChange(channelNum, true);

                        if (audioElRef.current) {
                            audioElRef.current.srcObject = remoteStream;
                            audioElRef.current.volume = volume;
                            audioElRef.current.play().catch(e => {});
                        }

                        setupVUMeter(remoteStream);
                    });

                    call.on('close', () => cleanup());
                    call.on('error', () => {
                        setStatus('error');
                        cleanup();
                    });
                };

                peerRef.current.on('call', handleCall);
                return () => cleanup();
            }, [peerRef.current]);

            useEffect(() => {
                if (returnStream && isReturnActive && callRef.current && !returnCallRef.current) {
                    const returnCall = peerRef.current.call(callRef.current.peer, returnStream, {
                        metadata: { type: 'return', channel: channelNum }
                    });
                    returnCallRef.current = returnCall;
                } else if ((!isReturnActive || !returnStream) && returnCallRef.current) {
                    returnCallRef.current.close();
                    returnCallRef.current = null;
                }
            }, [returnStream, isReturnActive]);

            const setupVUMeter = (stream) => {
                try {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioCtx();
                    const analyser = ctx.createAnalyser();
                    analyser.fftSize = 256;
                    const source = ctx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    analyserRef.current = analyser;
                    
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    
                    const update = () => {
                        analyser.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                        const level = (sum / dataArray.length) * 1.5;
                        setVuLevel(Math.min(level, 100));
                        animRef.current = requestAnimationFrame(update);
                    };
                    update();
                } catch(e) {}
            };

            const cleanup = () => {
                if (animRef.current) cancelAnimationFrame(animRef.current);
                if (callRef.current) callRef.current.close();
                if (returnCallRef.current) returnCallRef.current.close();
                if (audioElRef.current) audioElRef.current.srcObject = null;
                callRef.current = null;
                returnCallRef.current = null;
                setStatus('offline');
                setVuLevel(0);
                onTallyChange(channelNum, false);
            };

            const copyObsUrl = () => {
                if (obsUrl.includes('Conectando')) return;
                navigator.clipboard.writeText(obsUrl);
                setCopiedObs(true);
                setTimeout(() => setCopiedObs(false), 2000);
            };

            const copyReporterUrl = () => {
                if (reporterUrl.includes('Conectando')) return;
                navigator.clipboard.writeText(reporterUrl);
                setCopiedReporter(true);
                setTimeout(() => setCopiedReporter(false), 2000);
            };

            return (
                <div className={`channel-box ${status === 'live' ? 'active' : ''}`}>
                    <audio ref={audioElRef} autoPlay playsInline style={{display: 'none'}} />
                    
                    <div className="channel-header">
                        <div className="channel-id">CANAL {channelNum}</div>
                        <div className={`tally-light ${status === 'live' ? 'on' : ''}`}></div>
                    </div>

                    {/* URL PARA OBS (AZUL) */}
                    <div className={`url-container-obs ${copiedObs ? 'copied' : ''}`} onClick={copyObsUrl}>
                        <div className="url-label">
                            <span>📺 URL PARA OBS/VMIX</span>
                            {copiedObs && <span style={{color: '#22c55e'}}>✓ COPIADO</span>}
                        </div>
                        <div className="url-text url-obs">{obsUrl}</div>
                        <button className="copy-btn" onClick={(e) => { e.stopPropagation(); copyObsUrl(); }}>
                            {copiedObs ? '✓' : 'COPY'}
                        </button>
                    </div>

                    {/* URL PARA REPORTERO (AMARILLA) */}
                    <div className={`url-container-reporter ${copiedReporter ? 'copied' : ''}`} onClick={copyReporterUrl}>
                        <div className="url-label">
                            <span>📱 URL PARA REPORTERO (CELULAR)</span>
                            {copiedReporter && <span style={{color: '#22c55e'}}>✓ COPIADO</span>}
                        </div>
                        <div className="url-text url-reporter">{reporterUrl}</div>
                        <button className="copy-btn" onClick={(e) => { e.stopPropagation(); copyReporterUrl(); }}>
                            {copiedReporter ? '✓' : 'COPY'}
                        </button>
                    </div>

                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px'}}>
                        <span className={`status-badge ${status}`}>
                            <span className={`status-dot ${status}`}></span>
                            {status === 'offline' && 'ESPERANDO REPORTERO'}
                            {status === 'connecting' && 'CONECTANDO...'}
                            {status === 'live' && '● EN VIVO'}
                            {status === 'error' && 'ERROR'}
                        </span>
                        {status === 'live' && (
                            <span style={{fontSize: '0.7rem', color: '#64748b'}}>{reporterInfo.kbps} kbps</span>
                        )}
                    </div>

                    {status === 'live' && (
                        <>
                            <div style={{fontSize: '0.85rem', fontWeight: 'bold', color: 'white', marginBottom: '8px'}}>
                                {reporterInfo.name}
                            </div>
                            
                            <div className="vu-container">
                                <div className="vu-bar" style={{width: `${vuLevel}%`}}></div>
                            </div>
                            
                            <div className="volume-row">
                                <span className="volume-label">VOL</span>
                                <input 
                                    type="range" 
                                    min="0" 
                                    max="1" 
                                    step="0.05" 
                                    value={volume}
                                    onChange={(e) => {
                                        const v = parseFloat(e.target.value);
                                        setVolume(v);
                                        if (audioElRef.current) audioElRef.current.volume = v;
                                    }}
                                />
                            </div>

                            <div style={{marginTop: '8px', fontSize: '0.65rem', color: isReturnActive ? '#3b82f6' : '#64748b'}}>
                                {isReturnActive ? '🔊 Retorno activo' : '🔇 Sin retorno'}
                            </div>
                        </>
                    )}

                    {status === 'offline' && (
                        <div style={{fontSize: '0.75rem', color: '#64748b', textAlign: 'center', padding: '10px'}}>
                            <strong>Azul:</strong> Para OBS/vMix<br/>
                            <strong>Amarilla:</strong> Enviar al reportero para su celular
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [inRoom, setInRoom] = useState(false);
            const [roomCode, setRoomCode] = useState('');
            const [producerName, setProducerName] = useState('');
            const [isProducer, setIsProducer] = useState(true);
            const [userMode, setUserMode] = useState(''); // 'producer', 'reporter', 'transmitter'
            
            const [connectionStatus, setConnectionStatus] = useState('OFFLINE');
            const [tallyStates, setTallyStates] = useState({1: false, 2: false, 3: false, 4: false});
            
            const [isReturnActive, setIsReturnActive] = useState(false);
            const [returnDevices, setReturnDevices] = useState([]);
            const [selectedReturnDevice, setSelectedReturnDevice] = useState('');
            const [returnStream, setReturnStream] = useState(null);
            const [returnLevel, setReturnLevel] = useState(0);
            
            const [messages, setMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            
            const [reporterChannel, setReporterChannel] = useState('');
            const [producerId, setProducerId] = useState('');
            
            // Para modo transmitter (reportero con celular)
            const [isTransmitting, setIsTransmitting] = useState(false);
            const [localStream, setLocalStream] = useState(null);
            const [txLevel, setTxLevel] = useState(0);
            const videoRef = useRef(null);
            const peerRef = useRef(null);
            const mqttClientRef = useRef(null);
            const returnAudioCtxRef = useRef(null);
            const returnAnimRef = useRef(null);
            const messagesEndRef = useRef(null);
            const txAnimRef = useRef(null);

            const [baseUrl, setBaseUrl] = useState('');

            useEffect(() => {
                const url = window.location.href.split('?')[0];
                setBaseUrl(url);
                
                const params = new URLSearchParams(window.location.search);
                const mode = params.get('mode');
                const room = params.get('room');
                const ch = params.get('ch');
                const prodId = params.get('producer') || params.get('call');

                if (mode === 'reporter' && room && ch && prodId) {
                    // Modo reportero para OBS (recibe audio)
                    setIsProducer(false);
                    setUserMode('reporter');
                    setRoomCode(room);
                    setReporterChannel(ch);
                    setProducerId(prodId);
                    setInRoom(true);
                    setTimeout(() => initAsReporter(room, ch, prodId), 500);
                    
                } else if (mode === 'transmitter' && room && ch && prodId) {
                    // Modo transmitter (reportero con celular - envía audio/video)
                    setIsProducer(false);
                    setUserMode('transmitter');
                    setRoomCode(room);
                    setReporterChannel(ch);
                    setProducerId(prodId);
                    setInRoom(true);
                    
                } else {
                    // Modo productor (dashboard)
                    setRoomCode(Math.random().toString(36).substring(2, 6).toUpperCase());
                    loadAudioDevices();
                }
            }, []);

            const loadAudioDevices = async () => {
                try {
                    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    tempStream.getTracks().forEach(t => t.stop());
                    const devs = await navigator.mediaDevices.enumerateDevices();
                    const audios = devs.filter(d => d.kind === 'audioinput');
                    setReturnDevices(audios);
                    if (audios.length > 0) setSelectedReturnDevice(audios[0].deviceId);
                } catch(e) {}
            };

            // Iniciar como Reportero (recibe audio - para OBS)
            const initAsReporter = async (room, channel, producerPeerId) => {
                try {
                    setConnectionStatus('CONECTANDO...');
                    
                    const myId = `reporter_${room}_CH${channel}_${Math.random().toString(16).slice(2, 8)}`;
                    const peer = new Peer(myId, PEER_CONFIG);
                    peerRef.current = peer;

                    peer.on('open', async (id) => {
                        // Solo recibir, no enviar (para OBS)
                        const call = peer.call(producerPeerId, null, {
                            metadata: {
                                name: `Canal ${channel}`,
                                channel: parseInt(channel),
                                kbps: 128
                            }
                        });

                        // El reportero en OBS recibe retorno del productor
                        peer.on('call', (incomingCall) => {
                            incomingCall.answer();
                            incomingCall.on('stream', (returnStream) => {
                                const audio = new Audio();
                                audio.srcObject = returnStream;
                                audio.play().catch(e => {});
                                setConnectionStatus('EN VIVO CON RETORNO');
                            });
                        });
                    });

                    peer.on('error', (err) => {
                        setConnectionStatus('ERROR');
                    });

                } catch(e) {
                    setConnectionStatus('ERROR DE CONEXIÓN');
                }
            };

            // Iniciar como Transmitter (envía audio/video - para celular del reportero)
            const startTransmission = async () => {
                try {
                    setConnectionStatus('INICIANDO...');
                    
                    const stream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: false,
                            noiseSuppression: false,
                            autoGainControl: false,
                            channelCount: 2
                        },
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: "environment" // Cámara trasera por defecto
                        }
                    });

                    setLocalStream(stream);
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                    }

                    // Conectar al productor
                    const myId = `tx_${roomCode}_CH${reporterChannel}_${Math.random().toString(16).slice(2, 8)}`;
                    const peer = new Peer(myId, PEER_CONFIG);
                    peerRef.current = peer;

                    peer.on('open', (id) => {
                        const call = peer.call(producerId, stream, {
                            metadata: {
                                name: `Reportero Móvil CH${reporterChannel}`,
                                channel: parseInt(reporterChannel),
                                kbps: 128
                            }
                        });

                        setIsTransmitting(true);
                        setConnectionStatus('● AL AIRE');

                        // Recibir retorno
                        peer.on('call', (incomingCall) => {
                            incomingCall.answer();
                            incomingCall.on('stream', (returnStream) => {
                                const audio = new Audio();
                                audio.srcObject = returnStream;
                                audio.play().catch(e => {});
                            });
                        });

                        // VU Meter
                        const AudioCtx = window.AudioContext || window.webkitAudioContext;
                        const ctx = new AudioCtx();
                        const analyser = ctx.createAnalyser();
                        const source = ctx.createMediaStreamSource(stream);
                        source.connect(analyser);
                        
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        const update = () => {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            setTxLevel(Math.min((sum / dataArray.length) * 2, 100));
                            txAnimRef.current = requestAnimationFrame(update);
                        };
                        update();
                    });

                } catch(e) {
                    setConnectionStatus('ERROR DE CÁMARA/MIC');
                    alert('Error al acceder a cámara/micrófono. Verifica permisos.');
                }
            };

            const stopTransmission = () => {
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                }
                if (txAnimRef.current) cancelAnimationFrame(txAnimRef.current);
                if (peerRef.current) peerRef.current.destroy();
                setLocalStream(null);
                setIsTransmitting(false);
                setTxLevel(0);
                setConnectionStatus('DETENIDO');
            };

            const joinAsProducer = () => {
                if (!roomCode || !producerName) return alert("Completa todos los campos");

                setConnectionStatus('CONECTANDO...');
                
                const myId = `prod_${roomCode}_${Math.random().toString(16).slice(2, 8)}`;
                const peer = new Peer(myId, PEER_CONFIG);
                peerRef.current = peer;

                peer.on('open', (id) => {
                    setConnectionStatus('ONLINE');
                    setInRoom(true);
                });

                peer.on('error', (err) => {
                    setConnectionStatus('ERROR');
                });
            };

            const handleTallyChange = (channel, isLive) => {
                setTallyStates(prev => ({ ...prev, [channel]: isLive }));
            };

            const toggleReturn = async () => {
                if (isReturnActive) {
                    if (returnStream) returnStream.getTracks().forEach(t => t.stop());
                    if (returnAnimRef.current) cancelAnimationFrame(returnAnimRef.current);
                    setReturnStream(null);
                    setIsReturnActive(false);
                    setReturnLevel(0);
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({
                            audio: {
                                deviceId: selectedReturnDevice ? { exact: selectedReturnDevice } : undefined,
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                channelCount: 2
                            }
                        });
                        
                        setReturnStream(stream);
                        setIsReturnActive(true);

                        const AudioCtx = window.AudioContext || window.webkitAudioContext;
                        returnAudioCtxRef.current = new AudioCtx();
                        const analyser = returnAudioCtxRef.current.createAnalyser();
                        const source = returnAudioCtxRef.current.createMediaStreamSource(stream);
                        source.connect(analyser);
                        
                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        const update = () => {
                            analyser.getByteFrequencyData(dataArray);
                            let sum = 0;
                            for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                            setReturnLevel(Math.min((sum / dataArray.length) * 2, 100));
                            returnAnimRef.current = requestAnimationFrame(update);
                        };
                        update();
                        
                    } catch(e) {
                        alert("Error al iniciar retorno");
                    }
                }
            };

            const sendChat = (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                
                const payload = {
                    id: Date.now(),
                    sender: `PRODUCER (${producerName})`,
                    text: chatInput.trim(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                
                setMessages(prev => [...prev, payload].slice(-50));
                setChatInput('');
            };

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            useEffect(() => {
                return () => {
                    if (returnStream) returnStream.getTracks().forEach(t => t.stop());
                    if (localStream) localStream.getTracks().forEach(t => t.stop());
                    if (peerRef.current) peerRef.current.destroy();
                };
            }, []);

            // --- VISTA DE TRANSMITTER (REPORTERO CON CELULAR) ---
            if (userMode === 'transmitter' && inRoom) {
                return (
                    <div className="reporter-view">
                        <div className="reporter-box">
                            <div className={`reporter-tally ${isTransmitting ? 'on' : ''}`}>
                                {isTransmitting ? '🔴' : '⚫'}
                            </div>
                            
                            <div className="reporter-status" style={{
                                color: isTransmitting ? '#ef4444' : '#64748b'
                            }}>
                                {isTransmitting ? '● AL AIRE' : 'STANDBY'}
                            </div>
                            
                            <div style={{fontSize: '0.9rem', color: '#64748b', marginBottom: '10px'}}>
                                Canal {reporterChannel} • Sala {roomCode}
                            </div>

                            {/* VIDEO PREVIEW */}
                            <video 
                                ref={videoRef}
                                autoPlay 
                                playsInline 
                                muted
                                className={`reporter-video ${isTransmitting ? 'active' : ''}`}
                            />

                            {/* CONTROLES */}
                            <div className="reporter-controls">
                                {!isTransmitting ? (
                                    <button className="reporter-btn start" onClick={startTransmission}>
                                        ▶ INICIAR
                                    </button>
                                ) : (
                                    <button className="reporter-btn stop" onClick={stopTransmission}>
                                        ⏹ DETENER
                                    </button>
                                )}
                            </div>

                            {/* INFO */}
                            <div className="reporter-info">
                                <div className="reporter-item">
                                    <div className="reporter-item-label">Audio</div>
                                    <div className="reporter-item-value" style={{color: txLevel > 5 ? '#22c55e' : '#64748b'}}>
                                        {txLevel > 5 ? 'ON' : 'OFF'}
                                    </div>
                                </div>
                                <div className="reporter-item">
                                    <div className="reporter-item-label">Video</div>
                                    <div className="reporter-item-value" style={{color: isTransmitting ? '#22c55e' : '#64748b'}}>
                                        {isTransmitting ? 'ON' : 'OFF'}
                                    </div>
                                </div>
                            </div>

                            {/* VU METER */}
                            {isTransmitting && (
                                <div className="reporter-vu">
                                    <div style={{display: 'flex', justifyContent: 'space-between', fontSize: '0.8rem', color: '#64748b', marginBottom: '8px'}}>
                                        <span>NIVEL DE AUDIO</span>
                                        <span>{Math.round(txLevel)}%</span>
                                    </div>
                                    <div className="reporter-vu-bar">
                                        <div className="reporter-vu-fill" style={{width: `${Math.min(txLevel, 100)}%`}}></div>
                                    </div>
                                </div>
                            )}

                            <div className="reporter-footer">
                                Stream Radio PRO • Reportero Móvil v3.4
                            </div>
                        </div>
                    </div>
                );
            }

            // --- VISTA DE REPORTERO PARA OBS ---
            if (userMode === 'reporter' && inRoom) {
                return (
                    <div className="reporter-view">
                        <div className="reporter-box">
                            <div className={`reporter-tally ${connectionStatus.includes('VIVO') ? 'on' : ''}`}>
                                {connectionStatus.includes('VIVO') ? '🔴' : '⚫'}
                            </div>
                            
                            <div className="reporter-status" style={{
                                color: connectionStatus.includes('VIVO') ? '#ef4444' : '#64748b'
                            }}>
                                {connectionStatus}
                            </div>
                            
                            <div style={{fontSize: '0.9rem', color: '#64748b'}}>
                                Canal {reporterChannel} • Sala {roomCode}
                            </div>

                            <div className="reporter-footer" style={{marginTop: '30px'}}>
                                Modo Receptor OBS • Stream Radio PRO
                            </div>
                        </div>
                    </div>
                );
            }

            // --- LOBBY PRODUCTOR ---
            if (!inRoom) {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <h1 className="text-3xl font-black mb-1 text-white">
                                STREAM<span className="text-blue-500">RADIO</span> <span className="text-yellow-500">PRO</span>
                            </h1>
                            <p className="text-gray-400 text-sm mb-2 font-bold">CONSOLA 4 CANALES + VIDEO</p>
                            <p className="text-gray-500 text-xs mb-6">v3.4 - URLs separadas para OBS y Reporteros</p>

                            <input 
                                className="auth-input" 
                                placeholder="CÓDIGO DE SALA" 
                                value={roomCode} 
                                onChange={e => setRoomCode(e.target.value.toUpperCase())} 
                            />
                            <input 
                                className="auth-input" 
                                placeholder="NOMBRE DEL PRODUCTOR" 
                                value={producerName} 
                                onChange={e => setProducerName(e.target.value)} 
                            />
                           
                            <button className="btn btn-main" onClick={joinAsProducer}>
                                INICIAR CONSOLA
                            </button>
                        </div>
                    </div>
                );
            }

            // --- DASHBOARD PRODUCTOR ---
            return (
                <div className="dashboard-layout">
                    <div className="top-bar">
                        <div className="font-black text-xl text-white">
                            STREAM<span className="text-blue-500">RADIO</span> 
                            <span className="text-yellow-500 ml-2">PRO</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-xs font-bold text-gray-400">SALA: {roomCode}</span>
                            <div className="flex gap-1">
                                {[1,2,3,4].map(ch => (
                                    <div 
                                        key={ch} 
                                        className={`w-3 h-3 rounded-full ${tallyStates[ch] ? 'bg-red-500 shadow-[0_0_10px_#ef4444]' : 'bg-gray-700'}`}
                                    />
                                ))}
                            </div>
                            <span className={`text-xs px-3 py-1 rounded font-bold ${connectionStatus === 'ONLINE' ? 'text-green-400' : 'text-red-400'}`}>
                                {connectionStatus}
                            </span>
                        </div>
                    </div>

                    <div className="main-content">
                        <div className="channels-panel">
                            <div className="instructions">
                                <h3>📋 Dos URLs por Canal</h3>
                                <p><strong style={{color: '#3b82f6'}}>Azul:</strong> Para OBS/vMix (recibe audio/video)<br/>
                                <strong style={{color: '#f59e0b'}}>Amarilla:</strong> Enviar al reportero para su celular (envía audio/video)<br/>
                                El reportero abre la URL amarilla, presiona INICIAR y transmite.</p>
                            </div>
                            
                            <div className="channels-grid">
                                {[1, 2, 3, 4].map(ch => (
                                    <ChannelBox
                                        key={ch}
                                        channelNum={ch}
                                        roomCode={roomCode}
                                        peerRef={peerRef}
                                        onTallyChange={handleTallyChange}
                                        returnStream={returnStream}
                                        isReturnActive={isReturnActive}
                                        baseUrl={baseUrl}
                                    />
                                ))}
                            </div>
                        </div>

                        <div className="return-panel">
                            <div className="return-title">🎧 Retorno a Campo</div>
                            
                            <div className={`return-status-box ${isReturnActive ? 'active' : ''}`}>
                                <div className={`return-led ${isReturnActive ? 'on' : ''}`}></div>
                                <div className="text-sm font-bold text-white mb-1">
                                    {isReturnActive ? 'RETORNO ACTIVO' : 'RETORNO STANDBY'}
                                </div>
                                {isReturnActive && (
                                    <div className="vu-container">
                                        <div className="vu-bar" style={{width: `${Math.min(returnLevel, 100)}%`}}></div>
                                    </div>
                                )}
                            </div>

                            <div className="control-group">
                                <label className="control-label">Fuente de Retorno</label>
                                <select 
                                    value={selectedReturnDevice} 
                                    onChange={e => setSelectedReturnDevice(e.target.value)}
                                    disabled={isReturnActive}
                                >
                                    {returnDevices.map((d, i) => (
                                        <option key={d.deviceId} value={d.deviceId}>
                                            {d.label || `Entrada ${i+1}`}
                                        </option>
                                    ))}
                                </select>
                            </div>

                            <button 
                                className={`tx-btn ${isReturnActive ? 'active' : 'idle'}`}
                                onClick={toggleReturn}
                            >
                                {isReturnActive ? '⏹ CORTAR RETORNO' : '▶ INICIAR RETORNO'}
                            </button>

                            <div className="chat-container">
                                <div className="chat-header">
                                    <span>Chat de Producción</span>
                                    <span style={{color: '#64748b'}}>{messages.length}</span>
                                </div>
                                <div className="chat-messages">
                                    {messages.length === 0 && (
                                        <div style={{textAlign: 'center', color: '#475569', padding: '20px', fontSize: '0.8rem'}}>
                                            Sin mensajes
                                        </div>
                                    )}
                                    {messages.map(m => (
                                        <div key={m.id} className="chat-msg">
                                            <span className="sender">{m.sender}</span>
                                            <span className="time">{m.time}</span>
                                            <div className="text">{m.text}</div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form className="chat-input-area" onSubmit={sendChat}>
                                    <input 
                                        value={chatInput}
                                        onChange={e => setChatInput(e.target.value)}
                                        placeholder="Mensaje al equipo..."
                                    />
                                    <button type="submit" disabled={!chatInput.trim()}>➤</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
