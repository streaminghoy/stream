<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall Power PRO v10 - Robust Edition</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        /* MANTENEMOS TODO TU DISEÑO ORIGINAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; }
        header { background: linear-gradient(90deg, #1a1a1a, #2d2d2d); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff6b00; }
        .brand h1 { color: #ff6b00; font-size: 24px; letter-spacing: 2px; }
        .room-badge { background: #ff6b00; color: #000; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .role-badge { background: #00ff00; color: #000; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 10px; }
        .role-badge.guest { background: #0088ff; }
        
        .main-container { display: grid; height: calc(100vh - 70px); }
        .main-container.operator { grid-template-columns: 1fr 350px; grid-template-rows: 180px 1fr; }
        .main-container.guest { grid-template-columns: 1fr; grid-template-rows: 1fr 200px; }
        
        .preview-bar { grid-column: 1; grid-row: 1; display: flex; gap: 10px; padding: 10px; background: #1a1a1a; border-bottom: 2px solid #333; overflow-x: auto; align-items: center; }
        .video-grid { grid-column: 1; grid-row: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; padding: 10px; background: #000; }
        .dashboard { grid-column: 2; grid-row: 1 / 3; background: #1a1a1a; border-left: 2px solid #333; padding: 20px; overflow-y: auto; }
        
        .operator-view { grid-row: 1; display: flex; justify-content: center; align-items: center; background: #000; padding: 20px; position: relative; }
        .guest-preview-bar { grid-row: 2; display: flex; gap: 15px; padding: 15px; background: #1a1a1a; border-top: 3px solid #ff6b00; justify-content: center; align-items: center; }
        
        .video-container { position: relative; background: #1a1a1a; border-radius: 8px; overflow: hidden; border: 3px solid #333; aspect-ratio: 16/9; }
        .video-container.live { border-color: #ff0000; box-shadow: 0 0 30px rgba(255,0,0,0.6); }
        .video-container.standby { border-color: #ffff00; }
        .video-container.preview { min-width: 160px; max-width: 280px; height: 100%; }
        .video-container.operator-large { max-width: 900px; width: 100%; max-height: 70vh; }
        .video-container.guest-self { min-width: 240px; max-width: 360px; border: 2px solid #0088ff; }
        
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        
        .retorno-label { position: absolute; top: 10px; right: 10px; background: #ff6b00; color: #000; padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; z-index: 20; }
        .tally-label-main { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 32px; font-weight: bold; z-index: 100; padding: 5px 20px; border-radius: 8px; display: none; }
        .tally-label-main.active { display: block; }
        .tally-label-main.live { background: #ff0000; color: #fff; animation: pulse 1s infinite; }
        .tally-label-main.standby { background: #ffff00; color: #000; }

        /* DASHBOARD ELEMENTS */
        .id-display { background: #0f0f0f; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 24px; font-weight: bold; color: #00ff00; text-align: center; border: 1px solid #ff6b00; margin: 10px 0; }
        .slot-card { background: #2d2d2d; border-radius: 8px; padding: 12px; border: 2px solid #444; margin-bottom: 10px; }
        .slot-card.empty { border: 2px dashed #444; opacity: 0.5; text-align: center; padding: 20px; }
        .tally-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-top: 8px; }
        .t-btn { padding: 8px 4px; border: none; border-radius: 4px; cursor: pointer; font-size: 9px; font-weight: bold; background: #444; color: #999; }
        .t-btn.active { border: 1px solid #fff; box-shadow: 0 0 8px currentColor; }
        
        .obs-btn { width: 100%; padding: 6px; background: #0055ff; color: white; border: none; border-radius: 4px; font-size: 10px; margin-top: 8px; cursor: pointer; font-weight: bold; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 30px; border-radius: 12px; width: 400px; border: 2px solid #ff6b00; }
        .device-select { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; color: #fff; border: 1px solid #444; border-radius: 4px; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div id="obsRoot" style="display:none; width:100vw; height:100vh;"><video id="obsVid" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video></div>

<div id="appRoot">
    <header>
        <div class="brand"><h1>STREAMCALL POWER</h1><span class="room-badge" id="roomBadge">SALA -</span><span class="role-badge" id="roleBadge">-</span></div>
        <div style="text-align: right; font-size: 12px; color: #ff6b00; font-weight: bold;" id="connStatus">SISTEMA INICIALIZANDO...</div>
    </header>

    <div class="main-container" id="mainContainer">
        <div class="preview-bar" id="previewBar" style="display:none;">
            <div class="video-container preview"><video id="localVideo" autoplay muted playsinline></video><div class="retorno-label">ESTUDIO</div></div>
        </div>
        <div class="video-grid" id="videoGrid" style="display:none;"></div>

        <div class="operator-view" id="guestView" style="display:none;">
            <div class="video-container operator-large">
                <div class="retorno-label">📡 RETORNO PROGRAMA</div>
                <div id="mainTally" class="tally-label-main">AL AIRE</div>
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="guest-preview-bar" id="guestPreview" style="display:none;">
            <div class="video-container guest-self"><video id="guestLocalVideo" autoplay muted playsinline></video></div>
            <div style="color: #999; font-size: 13px;"><strong id="guestStatus" style="color:#ff6b00;">CONECTANDO...</strong><br>Audio HD / No-Gate activo.</div>
        </div>

        <div class="dashboard" id="dashboard" style="display:none;">
            <h2>CONTROL PANEL</h2>
            <div class="id-display" id="opIdDisplay">----</div>
            <div id="slot-0" class="slot-card empty">CANAL 1: LIBRE</div>
            <div id="slot-1" class="slot-card empty">CANAL 2: LIBRE</div>
            <div id="slot-2" class="slot-card empty">CANAL 3: LIBRE</div>
        </div>
    </div>
</div>

<div class="modal active" id="initModal">
    <div class="modal-content">
        <h2 style="color:#ff6b00; text-align:center;">Configuración</h2>
        <select id="roleSelect" class="device-select" onchange="toggleRoleFields()">
            <option value="operator">OPERADOR</option>
            <option value="guest">INVITADO</option>
        </select>
        <div id="guestField" style="display:none;"><input type="text" id="joinId" class="device-select" placeholder="ID DEL OPERADOR" maxlength="6" style="text-align:center; font-size:20px;"></div>
        <input type="text" id="userName" class="device-select" placeholder="NOMBRE">
        <select id="vSource" class="device-select"></select>
        <select id="aSource" class="device-select"></select>
        <button class="join-btn" style="width:100%; padding:15px; background:#ff6b00; color:white; border:none; cursor:pointer;" onclick="startBroadcast()">CONECTAR</button>
    </div>
</div>

<script>
let peer, localStream, myRole, myId;
let connections = new Map();
let availableSlots = [0, 1, 2];

// MOTOR 4G REFORZADO
const PEER_CONFIG = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ],
    iceTransportPolicy: 'all'
};

const setSdpFix = (sdp) => {
    return sdp.replace(/a=fmtp:(\d+) .*max-br=(\d+).*/g, 'a=fmtp:$1 x-google-max-bitrate=1500;x-google-min-bitrate=500;x-google-start-bitrate=1000');
};

navigator.mediaDevices.enumerateDevices().then(devices => {
    const v = document.getElementById('vSource'), a = document.getElementById('aSource');
    devices.forEach(d => {
        const o = document.createElement('option'); o.value = d.deviceId; o.text = d.label || d.kind;
        if (d.kind === 'videoinput') v.appendChild(o); else if (d.kind === 'audioinput') a.appendChild(o);
    });
});

function toggleRoleFields() {
    document.getElementById('guestField').style.display = document.getElementById('roleSelect').value === 'guest' ? 'block' : 'none';
}

function startBroadcast() {
    myRole = document.getElementById('roleSelect').value;
    const vId = document.getElementById('vSource').value, aId = document.getElementById('aSource').value;
    
    // AUDIO HD: Desactivamos procesamiento que arruina música
    navigator.mediaDevices.getUserMedia({
        video: { deviceId: vId ? { exact: vId } : undefined, width: 640, height: 360 },
        audio: { deviceId: aId ? { exact: aId } : undefined, echoCancellation: true, noiseSuppression: false, autoGainControl: false }
    }).then(stream => {
        localStream = stream;
        document.getElementById('initModal').classList.remove('active');
        
        if (myRole === 'operator') {
            document.getElementById('mainContainer').className = 'main-container operator';
            document.getElementById('previewBar').style.display = 'flex';
            document.getElementById('videoGrid').style.display = 'grid';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('localVideo').srcObject = stream;
            initPeer('OP' + Math.random().toString(36).substr(2, 4).toUpperCase());
        } else {
            document.getElementById('mainContainer').className = 'main-container guest';
            document.getElementById('guestView').style.display = 'flex';
            document.getElementById('guestPreview').style.display = 'flex';
            document.getElementById('guestLocalVideo').srcObject = stream;
            initPeer('G' + Math.random().toString(36).substr(2, 4).toUpperCase());
        }
    });
}

function initPeer(id) {
    myId = id;
    peer = new Peer(id, { config: PEER_CONFIG, debug: 1 });
    
    peer.on('open', () => {
        document.getElementById('connStatus').textContent = "ONLINE: " + id;
        if (myRole === 'operator') {
            document.getElementById('opIdDisplay').textContent = id;
            document.getElementById('roomBadge').textContent = "ID: " + id;
        } else {
            const opTarget = document.getElementById('joinId').value.toUpperCase();
            connectToOperator(opTarget);
        }
    });

    peer.on('connection', conn => { if (myRole === 'operator') handleData(conn); });

    peer.on('call', call => {
        // EL RETORNO: El operador responde con su stream
        call.answer(localStream, { sdpTransform: setSdpFix });
        
        if (myRole === 'operator') {
            handleIncomingCall(call);
        } else {
            call.on('stream', s => { 
                const rv = document.getElementById('remoteVideo');
                rv.srcObject = s;
                rv.play().catch(e => console.log("Play block"));
            });
        }
    });
}

function connectToOperator(opTarget) {
    // 1. Canal de datos para Tally
    const data = peer.connect(opTarget, { metadata: { name: document.getElementById('userName').value } });
    data.on('open', () => {
        // 2. Llamada de video
        peer.call(opTarget, localStream, { sdpTransform: setSdpFix });
        document.getElementById('guestStatus').textContent = "CONECTADO AL ESTUDIO";
    });
    data.on('data', d => { if (d.type === 'tally') updateGuestTally(d.state); });
}

function handleData(conn) {
    conn.on('open', () => {
        if (!connections.has(conn.peer)) connections.set(conn.peer, { name: conn.metadata.name });
        connections.get(conn.peer).data = conn;
    });
}

function handleIncomingCall(call) {
    const peerId = call.peer;
    
    // ANTI-DUPLICADOS: Si ya existe el contenedor de video, solo actualizamos el stream
    const existingVid = document.getElementById('vid-' + peerId);
    if (existingVid) {
        call.on('stream', s => { existingVid.srcObject = s; });
        return;
    }

    if (availableSlots.length === 0) return;
    const slot = availableSlots.shift();

    call.on('stream', s => {
        if (!connections.has(peerId)) connections.set(peerId, { name: "Invitado" });
        const c = connections.get(peerId);
        c.slot = slot; c.stream = s;

        let cont = document.createElement('div');
        cont.className = 'video-container'; cont.id = 'vcont-' + peerId;
        cont.innerHTML = `<video id="vid-${peerId}" autoplay playsinline></video>
                         <div style="position:absolute; bottom:5px; left:10px; font-size:12px; background:rgba(0,0,0,0.7); padding:2px 10px;">CH${slot+1}: ${c.name}</div>`;
        document.getElementById('videoGrid').appendChild(cont);
        document.getElementById('vid-' + peerId).srcObject = s;
        
        updateSlotUI(slot, peerId, c.name, true);
    });
}

function updateSlotUI(slot, peerId, name, online) {
    const el = document.getElementById('slot-' + slot);
    if (online) {
        el.className = 'slot-card';
        el.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:12px;"><b>${name.toUpperCase()}</b><span style="color:#0f0">●</span></div>
                        <div class="tally-controls">
                            <button class="t-btn" id="off-${peerId}" onclick="sendTally('${peerId}', 'off')">OFF</button>
                            <button class="t-btn" id="pvw-${peerId}" style="color:#ffff00" onclick="sendTally('${peerId}', 'standby')">PVW</button>
                            <button class="t-btn" id="live-${peerId}" style="color:#ff0000" onclick="sendTally('${peerId}', 'live')">LIVE</button>
                        </div>
                        <button class="obs-btn" onclick="copyObs(${slot})">COPIAR LINK OBS</button>`;
        sendTally(peerId, 'off');
    } else {
        el.className = 'slot-card empty'; el.textContent = `CANAL ${slot+1}: LIBRE`;
    }
}

function sendTally(peerId, state) {
    const c = connections.get(peerId);
    if (c && c.data) c.data.send({ type: 'tally', state });
    
    const cont = document.getElementById('vcont-' + peerId);
    if (cont) cont.className = 'video-container ' + (state === 'live' ? 'live' : state === 'standby' ? 'standby' : '');
    
    document.querySelectorAll(`#slot-${c.slot} .t-btn`).forEach(b => b.classList.remove('active'));
    const bId = (state === 'live' ? 'live-' : state === 'standby' ? 'pvw-' : 'off-') + peerId;
    document.getElementById(bId).classList.add('active');
}

function updateGuestTally(state) {
    const t = document.getElementById('mainTally');
    t.className = 'tally-label-main active ' + state;
    t.textContent = state === 'live' ? '🔴 AL AIRE' : '⏺ ATENTO';
    if (state === 'off') t.classList.remove('active');
}

function copyObs(slot) {
    const url = `${window.location.href.split('?')[0]}?mode=obs&room=${myId}&slot=${slot+1}`;
    navigator.clipboard.writeText(url); alert("Link OBS Copiado!");
}

// LÓGICA OBS
const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'obs') {
    const room = params.get('room'), slotId = params.get('slot');
    document.getElementById('appRoot').style.display = "none";
    document.getElementById('obsRoot').style.display = "block";
    document.body.style.background = "transparent";
    
    setTimeout(() => {
        const obsPeer = new Peer('OBS' + Math.random().toString(36).substr(2,4), { config: PEER_CONFIG });
        obsPeer.on('open', () => {
            const call = obsPeer.call(room, null);
            call.on('stream', s => document.getElementById('obsVid').srcObject = s);
        });
    }, 1000);
}
</script>
</body>
</html>
