<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall Power PRO v11 - StreamingHoy</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; overflow: hidden; }
        header { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff6b00; height: 60px; }
        .brand h1 { color: #ff6b00; font-size: 20px; font-weight: 900; }
        .room-badge { background: #ff6b00; color: #000; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        
        .main-container { display: grid; height: calc(100vh - 60px); }
        .main-container.operator { grid-template-columns: 1fr 300px; grid-template-rows: 140px 1fr; }
        
        .dashboard { grid-column: 2; grid-row: 1 / 3; background: #111; border-left: 1px solid #333; padding: 15px; overflow-y: auto; }
        .id-display { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 20px; text-align: center; color: #00ff00; border: 1px solid #ff6b00; margin-bottom: 15px; }
        
        .slot-card { background: #1a1a1a; border-radius: 6px; padding: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .slot-card.empty { border: 1px dashed #444; opacity: 0.5; font-size: 11px; text-align: center; padding: 10px; }
        
        .tally-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-top: 5px; }
        .t-btn { padding: 5px 2px; font-size: 9px; border: none; border-radius: 3px; cursor: pointer; background: #333; color: #999; font-weight: bold; }
        .t-btn.active { background: #444; border: 1px solid #fff; box-shadow: 0 0 5px currentColor; }
        
        .preview-bar { grid-column: 1; grid-row: 1; display: flex; gap: 10px; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #333; overflow-x: auto; }
        .video-grid { grid-column: 1; grid-row: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; padding: 10px; background: #000; align-content: start; }
        
        .video-container { position: relative; background: #111; border: 2px solid #333; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; }
        .video-container.live { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .video-container.standby { border-color: #ffff00; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .main-container.guest { grid-template-rows: 1fr 180px; }
        .operator-view { display: flex; justify-content: center; align-items: center; background: #000; padding: 10px; }
        .tally-label-main { position: absolute; top: 20px; font-size: 24px; font-weight: 900; padding: 5px 20px; border-radius: 5px; z-index: 100; display: none; }
        .tally-label-main.active { display: block; }
        .tally-label-main.live { background: #ff0000; color: white; }
        .tally-label-main.standby { background: #ffff00; color: black; }
        
        .guest-preview-bar { display: flex; gap: 15px; padding: 15px; background: #1a1a1a; border-top: 2px solid #ff6b00; justify-content: center; align-items: center; }
        .guest-self { width: 220px; border: 2px solid #0088ff; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 350px; border: 1px solid #ff6b00; }
        .device-select { width: 100%; padding: 8px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        .join-btn { width: 100%; padding: 12px; background: #ff6b00; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div id="obsRoot" style="display:none; width:100vw; height:100vh; background:#000;"><video id="obsVid" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video></div>

<div id="appRoot">
    <header><div class="brand"><h1>STREAMCALL POWER <span class="room-badge" id="headerRoom">SALA -</span></h1></div><div id="headerStatus" style="font-size: 11px; color: #ff6b00; font-weight: bold;">ESPERANDO...</div></header>
    <div class="main-container" id="mainContainer">
        <div class="preview-bar" id="previewBar" style="display:none;"><div class="video-container" style="width:200px;"><video id="localVideo" autoplay muted playsinline></video></div></div>
        <div class="video-grid" id="videoGrid" style="display:none;"></div>
        <div class="operator-view" id="guestOperatorView" style="display:none;"><div class="video-container" style="max-width: 800px; width:100%;"><div id="mainTally" class="tally-label-main">AL AIRE</div><video id="remoteOperatorVideo" autoplay playsinline></video></div></div>
        <div class="guest-preview-bar" id="guestPreviewBar" style="display:none;"><div class="video-container guest-self"><video id="guestLocalVideo" autoplay muted playsinline></video></div><div style="font-size: 12px; color: #999;"><strong id="guestStatusLabel" style="color:#ff6b00;">CONECTADO</strong><br>Audio Musical HD Activo.</div></div>
        <div class="dashboard" id="dashboard" style="display:none;"><h2>DASHBOARD</h2><div class="id-display" id="displayId">----</div><div id="slotsContainer"><div class="slot-card empty" id="slot-0">CH 1: LIBRE</div><div class="slot-card empty" id="slot-1">CH 2: LIBRE</div><div class="slot-card empty" id="slot-2">CH 3: LIBRE</div></div></div>
    </div>
    <div id="appControls" style="position:fixed; bottom:20px; left:20px; display:none; gap:10px; z-index:1000;"><button onclick="toggleMic()" id="micBtn" style="width:50px; height:50px; border-radius:50%; border:none; background:#222; color:white; cursor:pointer; font-size:20px;">🎤</button><button onclick="toggleCam()" id="camBtn" style="width:50px; height:50px; border-radius:50%; border:none; background:#222; color:white; cursor:pointer; font-size:20px;">📹</button><button onclick="location.reload()" style="width:50px; height:50px; border-radius:50%; border:none; background:#cc0000; color:white; cursor:pointer; font-size:20px;">📴</button></div>
    <div class="modal active" id="initModal"><div class="modal-content"><h2 style="color:#ff6b00; text-align:center; margin-bottom:15px;">StreamCall v11</h2><select id="roleSelect" class="device-select" onchange="updateModalFields()"><option value="operator">OPERADOR</option><option value="guest">INVITADO</option></select><div id="guestField" style="display:none;"><input type="text" id="joinId" class="device-select" placeholder="ID OPERADOR" maxlength="6" style="text-align:center;"></div><input type="text" id="userName" class="device-select" placeholder="NOMBRE"><label style="font-size:10px;">CÁMARA:</label><select id="vSource" class="device-select"></select><button class="join-btn" onclick="startApp()">CONECTAR</button></div></div>
</div>

<script>
let myPeer, localStream, myRole, myId;
let connections = new Map();
let availableSlots = [0, 1, 2];

const PEER_CONFIG = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ]
};

const setBitrate = (sdp) => sdp.replace(/a=fmtp:(\d+) .*max-br=(\d+).*/g, 'a=fmtp:$1 x-google-max-bitrate=1500;x-google-min-bitrate=500;x-google-start-bitrate=1000');

// --- LÓGICA MODO OBS ---
const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'obs') {
    const room = params.get('room'), slotId = params.get('slot');
    document.getElementById('appRoot').remove();
    document.getElementById('obsRoot').style.display = "block";
    
    // El OBS usa un ID especial que el operador reconoce
    const obsPeer = new Peer(`OBS_${room}_${slotId}`, { config: PEER_CONFIG });
    obsPeer.on('open', () => {
        // El OBS no llama, el operador le llama a él cuando el invitado llega
        console.log("OBS LISTO EN CANAL " + slotId);
    });
    obsPeer.on('call', call => {
        call.answer();
        call.on('stream', s => { document.getElementById('obsVid').srcObject = s; });
    });
}

navigator.mediaDevices.enumerateDevices().then(devices => {
    const v = document.getElementById('vSource');
    devices.forEach(d => { if (d.kind === 'videoinput') { const o = document.createElement('option'); o.value = d.deviceId; o.text = d.label || "Cam"; v.appendChild(o); } });
});

function updateModalFields() { document.getElementById('guestField').style.display = document.getElementById('roleSelect').value === 'guest' ? 'block' : 'none'; }

function startApp() {
    myRole = document.getElementById('roleSelect').value;
    navigator.mediaDevices.getUserMedia({
        video: { deviceId: document.getElementById('vSource').value ? { exact: document.getElementById('vSource').value } : undefined, width: 640, height: 360 },
        audio: { echoCancellation: true, noiseSuppression: false, autoGainControl: false }
    }).then(stream => {
        localStream = stream;
        document.getElementById('initModal').classList.remove('active');
        document.getElementById('appControls').style.display = 'flex';
        if (myRole === 'operator') {
            document.getElementById('mainContainer').classList.add('operator');
            document.getElementById('previewBar').style.display = 'flex';
            document.getElementById('videoGrid').style.display = 'grid';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('localVideo').srcObject = stream;
            initPeer('OP' + Math.random().toString(36).substr(2, 4).toUpperCase());
        } else {
            document.getElementById('mainContainer').classList.add('guest');
            document.getElementById('guestOperatorView').style.display = 'flex';
            document.getElementById('guestPreviewBar').style.display = 'flex';
            document.getElementById('guestLocalVideo').srcObject = stream;
            initPeer('G' + Math.random().toString(36).substr(2, 4).toUpperCase());
        }
    });
}

function initPeer(id) {
    myId = id;
    myPeer = new Peer(id, { config: PEER_CONFIG });
    myPeer.on('open', () => {
        if (myRole === 'operator') {
            document.getElementById('displayId').textContent = id;
            document.getElementById('headerRoom').textContent = "ID: " + id;
        } else {
            connectToOp(document.getElementById('joinId').value.toUpperCase());
        }
    });

    myPeer.on('connection', conn => { 
        if (myRole === 'operator') {
            handleData(conn);
        }
    });

    myPeer.on('call', call => {
        call.answer(localStream, { sdpTransform: setBitrate });
        if (myRole === 'operator') {
            handleCall(call);
        } else {
            call.on('stream', s => { 
                const rv = document.getElementById('remoteOperatorVideo');
                rv.srcObject = s;
                rv.play().catch(e => console.log("Retorno blocked"));
            });
        }
    });
}

function connectToOp(targetId) {
    const data = myPeer.connect(targetId, { metadata: { name: document.getElementById('userName').value } });
    data.on('open', () => {
        myPeer.call(targetId, localStream, { sdpTransform: setBitrate });
    });
    data.on('data', d => { if (d.type === 'tally') updateGuestTally(d.state); });
}

function handleData(conn) {
    conn.on('open', () => {
        if (!connections.has(conn.peer)) {
            connections.set(conn.peer, { name: conn.metadata.name || "Invitado", data: conn });
        }
    });
}

function handleCall(call) {
    const peerId = call.peer;
    // EVITAR DUPLICADOS POR ID
    if (document.getElementById('vcont-' + peerId)) return;
    if (availableSlots.length === 0) return;

    const slot = availableSlots.shift();

    call.on('stream', (s) => {
        if (!connections.has(peerId)) connections.set(peerId, { name: "Invitado" });
        const c = connections.get(peerId);
        c.slot = slot; c.remoteStream = s;
        
        let cont = document.createElement('div');
        cont.className = 'video-container'; cont.id = 'vcont-' + peerId;
        cont.innerHTML = `<video id="vid-${peerId}" autoplay playsinline></video><div style="position:absolute; bottom:5px; left:5px; font-size:10px; background:rgba(0,0,0,0.7); padding:2px 5px;">CH ${slot+1}: ${c.name}</div>`;
        document.getElementById('videoGrid').appendChild(cont);
        document.getElementById('vid-' + peerId).srcObject = s;
        
        updateSlotUI(slot, peerId, c.name, true);

        // --- ENVIAR AL OBS AUTOMÁTICAMENTE ---
        const obsId = `OBS_${myId}_${slot+1}`;
        myPeer.call(obsId, s, { sdpTransform: setBitrate });
    });
    call.on('close', () => removePeer(peerId));
}

function updateSlotUI(slot, peerId, name, online) {
    const el = document.getElementById('slot-' + slot);
    if (online) {
        el.className = 'slot-card';
        el.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;"><b>${name.toUpperCase()}</b><span style="color:#0f0">●</span></div>
                        <div class="tally-controls">
                            <button class="t-btn active" id="off-${peerId}" onclick="sendTally('${peerId}', 'off')">OFF</button>
                            <button class="t-btn pvw" id="pvw-${peerId}" style="color:#ffff00" onclick="sendTally('${peerId}', 'standby')">PVW</button>
                            <button class="t-btn live" id="live-${peerId}" style="color:#ff0000" onclick="sendTally('${peerId}', 'live')">LIVE</button>
                        </div><button onclick="copyObs(${slot})" style="width:100%; margin-top:5px; font-size:9px; background:#0055ff; color:#fff; border:none; padding:4px; border-radius:3px; cursor:pointer;">LINK OBS CH${slot+1}</button>`;
    } else { el.className = 'slot-card empty'; el.textContent = `CH ${slot+1}: LIBRE`; }
}

function sendTally(peerId, state) {
    const c = connections.get(peerId);
    if (c && c.data) c.data.send({ type: 'tally', state });
    const cont = document.getElementById('vcont-' + peerId);
    if (cont) cont.className = 'video-container ' + (state === 'live' ? 'live' : state === 'standby' ? 'standby' : '');
    document.querySelectorAll(`#slot-${c.slot} .t-btn`).forEach(b => b.classList.remove('active'));
    document.getElementById((state === 'live' ? 'live-' : state === 'standby' ? 'pvw-' : 'off-') + peerId).classList.add('active');
}

function updateGuestTally(state) {
    const t = document.getElementById('mainTally');
    t.className = 'tally-label-main active ' + state;
    t.textContent = state === 'live' ? '🔴 AL AIRE' : '⏺ ATENTO';
    if (state === 'off') t.classList.remove('active');
    document.getElementById('guestStatusLabel').textContent = state === 'live' ? '🔴 AL AIRE' : 'CONECTADO';
}

function copyObs(slot) {
    const url = `${window.location.href.split('?')[0]}?mode=obs&room=${myId}&slot=${slot+1}`;
    navigator.clipboard.writeText(url); alert("Link Copiado!");
}

function removePeer(id) {
    const c = connections.get(id);
    if (c) {
        availableSlots.push(c.slot); availableSlots.sort();
        const vc = document.getElementById('vcont-' + id); if (vc) vc.remove();
        updateSlotUI(c.slot, null, null, false); connections.delete(id);
    }
}
function toggleMic() { const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled; document.getElementById('micBtn').style.background = t.enabled ? '#222' : '#c00'; }
function toggleCam() { const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled; document.getElementById('camBtn').style.background = t.enabled ? '#222' : '#c00'; }
</script>
</body>
</html>
