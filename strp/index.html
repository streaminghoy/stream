<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCall Pro | StreamingHoy</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --panel: #161616; --text: #fff; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ESTILOS DASHBOARD / ADMIN */
        header { background: var(--panel); height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; color: var(--red); font-size: 1.2rem; }
        #video-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 10px; padding: 15px; overflow-y: auto; background: #000; }
        
        .v-cont { background: #111; border-radius: 10px; position: relative; border: 2px solid var(--border); aspect-ratio: 16/9; overflow: hidden; transition: 0.3s; }
        .v-cont.on-air { border: 4px solid var(--red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tally-msg { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 3px; display: none; }
        .on-air .tally-msg { display: block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* CONTROLES FOOTER */
        footer { background: var(--panel); height: 80px; display: flex; align-items: center; justify-content: center; gap: 15px; border-top: 1px solid var(--border); }
        .btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn.active { background: var(--red); }
        select { background: #222; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; }

        /* MODO OBS (OCULTAR TODO) */
        body.view-obs header, body.view-obs footer, body.view-obs .label, body.view-obs #local-cont { display: none !important; }
        body.view-obs main { padding: 0; gap: 0; }
        body.view-obs .v-cont { border: none; border-radius: 0; }

        /* MODAL INICIO */
        #modal-init { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: var(--panel); padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body id="main-body">

    <header id="main-header">
        <div class="logo">STREAM<span>CALL</span> PRO</div>
        <div id="status-tag" style="font-size: 11px; background: #222; padding: 5px 10px; border-radius: 4px; color: #0f8;">CARGANDO...</div>
    </header>

    <main id="video-grid">
        <div class="v-cont" id="local-cont">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">MI CÁMARA</div>
            <div class="tally-msg">AL AIRE</div>
        </div>
    </main>

    <footer id="main-footer">
        <select id="camSelect" onchange="switchCam()"></select>
        <button id="micBtn" class="btn" onclick="toggleMic()">🎤 MIC</button>
        <button id="camBtn" class="btn" onclick="toggleCam()">📷 CAM</button>
        
        <div id="admin-tools" style="display:none; margin-left: 20px; border-left: 1px solid #333; padding-left: 20px; gap: 10px;">
            <button class="btn" onclick="copyLink('guest')">🔗 LINK GUEST</button>
            <button class="btn" onclick="copyLink('obs')" style="color:#0f8">📺 LINK OBS</button>
            <button class="btn" onclick="broadcastTally()" style="background:#600">🔴 TALLY ALL</button>
        </div>
    </footer>

    <div id="modal-init">
        <div class="modal-card">
            <h2 id="modal-title">StreamCall Setup</h2>
            <input type="text" id="roomIn" placeholder="ID de Sala" style="width:90%; padding:12px; background:#000; border:1px solid #444; color:white; margin-bottom:15px; border-radius:6px;">
            <select id="initCamSelect" style="width:100%; margin-bottom:20px;"></select>
            <button class="btn" style="width:100%; background:var(--red);" onclick="startSystem()">ENTRAR A LA SALA</button>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const isAdmin = params.get('role') === 'admin';
    const isObs = params.get('view') === 'obs';
    const roomUrl = params.get('room');

    if(isObs) document.body.classList.add('view-obs');

    let localStream, peer, dataConns = {};

    // 1. DISPOSITIVOS
    async function getDevices() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const selects = [document.getElementById('camSelect'), document.getElementById('initCamSelect')];
        devices.filter(d => d.kind === 'videoinput').forEach(d => {
            selects.forEach(s => {
                const opt = document.createElement('option');
                opt.value = d.deviceId; opt.text = d.label || 'Cámara'; s.add(opt);
            });
        });
        if(roomUrl) document.getElementById('roomIn').value = roomUrl;
        if(isAdmin) document.getElementById('modal-title').innerText = "Dashboard Admin";
    }

    // 2. MOTOR
    async function startSystem() {
        const room = document.getElementById('roomIn').value || 'sala1';
        const camId = document.getElementById('initCamSelect').value;
        document.getElementById('modal-init').style.display = 'none';
        document.getElementById('status-tag').innerText = isAdmin ? "MODO DASHBOARD" : "MODO INVITADO";

        // Captura
        localStream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: camId ? {exact: camId} : undefined, width: 1280, height: 720 },
            audio: true
        });
        document.getElementById('localVideo').srcObject = localStream;

        // Peer (ID fijo para el Admin)
        const myPeerId = isAdmin ? `sh-pro-${room}` : null;
        peer = new Peer(myPeerId, { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } });

        peer.on('open', id => {
            if(isAdmin) document.getElementById('admin-tools').style.display = 'flex';
            if(!isAdmin) {
                const call = peer.call(`sh-pro-${room}`, localStream);
                const conn = peer.connect(`sh-pro-${room}`);
                handleCall(call);
                handleData(conn);
            }
        });

        peer.on('call', call => {
            call.answer(localStream);
            handleCall(call);
        });

        peer.on('connection', conn => handleData(conn));
    }

    function handleCall(call) {
        call.on('stream', stream => {
            if (document.getElementById(`cont-${call.peer}`)) return;
            const div = document.createElement('div');
            div.id = `cont-${call.peer}`;
            div.className = 'v-cont on-air';
            div.innerHTML = `<video autoplay playsinline id="v-${call.peer}"></video><div class="label">REMOTO</div><div class="tally-msg">AL AIRE</div>`;
            document.getElementById('video-grid').appendChild(div);
            document.getElementById(`v-${call.peer}`).srcObject = stream;
        });
        call.on('close', () => document.getElementById(`cont-${call.peer}`)?.remove());
    }

    function handleData(conn) {
        dataConns[conn.peer] = conn;
        conn.on('data', data => {
            if(data.type === 'tally') document.getElementById('local-cont').classList.toggle('on-air', data.val);
        });
    }

    // 3. FUNCIONES
    function copyLink(type) {
        const room = document.getElementById('roomIn').value;
        const base = window.location.href.split('?')[0];
        let link = type === 'guest' ? `${base}?room=${room}&role=guest` : `${base}?room=${room}&role=admin&view=obs`;
        navigator.clipboard.writeText(link);
        alert("Copiado!");
    }

    async function switchCam() {
        const id = document.getElementById('camSelect').value;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: {exact: id} } });
        const track = stream.getVideoTracks()[0];
        localStream.getVideoTracks()[0].stop();
        localStream.removeTrack(localStream.getVideoTracks()[0]);
        localStream.addTrack(track);
        document.getElementById('localVideo').srcObject = localStream;
        Object.values(peer.connections).forEach(conns => {
            conns.forEach(c => c.peerConnection?.getSenders().find(s => s.track.kind === 'video').replaceTrack(track));
        });
    }

    function toggleMic() { localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled; document.getElementById('micBtn').classList.toggle('active'); }
    function toggleCam() { localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled; document.getElementById('camBtn').classList.toggle('active'); }

    function broadcastTally() {
        const state = document.getElementById('local-cont').classList.toggle('on-air');
        Object.values(dataConns).forEach(c => c.send({type: 'tally', val: state}));
        document.querySelectorAll('.v-cont').forEach(el => el.classList.toggle('on-air', state));
    }

    getDevices();
</script>
</body>
</html>
