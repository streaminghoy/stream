<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall Power PRO v4 - StreamingHoy</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; overflow: hidden; }
        header { background: #1a1a1a; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff6b00; height: 60px; }
        .brand h1 { color: #ff6b00; font-size: 20px; letter-spacing: 1px; font-weight: 900; }
        .room-badge { background: #ff6b00; color: #000; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        
        .main-container { display: grid; height: calc(100vh - 60px); }
        .main-container.operator { grid-template-columns: 1fr 300px; grid-template-rows: 140px 1fr; }
        .main-container.obs-mode { background: transparent !important; }

        /* DASHBOARD COMPACTO */
        .dashboard { grid-column: 2; grid-row: 1 / 3; background: #111; border-left: 1px solid #333; padding: 15px; overflow-y: auto; }
        .dashboard h2 { font-size: 14px; color: #ff6b00; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .id-display { background: #000; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 20px; text-align: center; color: #00ff00; border: 1px solid #ff6b00; margin-bottom: 15px; }
        
        .slot-card { background: #1a1a1a; border-radius: 6px; padding: 8px; border: 1px solid #333; margin-bottom: 10px; }
        .slot-card.empty { border: 1px dashed #444; opacity: 0.5; font-size: 11px; text-align: center; padding: 15px; }
        .slot-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: bold; }
        
        .tally-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-bottom: 8px; }
        .t-btn { padding: 5px 2px; font-size: 9px; border: none; border-radius: 3px; cursor: pointer; background: #333; color: #999; font-weight: bold; }
        .t-btn.active { background: #444; border: 1px solid #fff; box-shadow: 0 0 5px currentColor; }
        .t-btn.live { color: #ff0000; }
        .t-btn.pvw { color: #ffff00; }
        
        .obs-link-btn { width: 100%; padding: 4px; font-size: 9px; background: #0055ff; color: white; border: none; border-radius: 3px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        /* GRID VIDEO OPERADOR */
        .preview-bar { grid-column: 1; grid-row: 1; display: flex; gap: 10px; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #333; overflow-x: auto; }
        .video-grid { grid-column: 1; grid-row: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; padding: 10px; background: #000; }

        .video-container { position: relative; background: #111; border: 2px solid #333; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; }
        .video-container.live { border-color: #ff0000; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .video-container.standby { border-color: #ffff00; }
        .video-container.preview { height: 100%; width: 200px; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* VISTA INVITADO */
        .main-container.guest { grid-template-rows: 1fr 180px; }
        .operator-view { display: flex; justify-content: center; align-items: center; background: #000; padding: 10px; }
        .tally-label-main { position: absolute; top: 20px; font-size: 24px; font-weight: 900; padding: 5px 20px; border-radius: 5px; z-index: 100; display: none; }
        .tally-label-main.active { display: block; }
        .tally-label-main.live { background: #ff0000; color: white; animation: pulse 1s infinite; }
        .tally-label-main.standby { background: #ffff00; color: black; }

        .guest-preview-bar { display: flex; gap: 15px; padding: 15px; background: #1a1a1a; border-top: 2px solid #ff6b00; justify-content: center; align-items: center; }
        .guest-self { width: 220px; border: 2px solid #0088ff; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 8px; width: 350px; border: 1px solid #ff6b00; }
        .device-select { width: 100%; padding: 8px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; font-size: 13px; }
        .join-btn { width: 100%; padding: 12px; background: #ff6b00; color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff00; display: inline-block; margin-right: 5px; }
        .status-dot.muted { background: #ff0000; }
    </style>
</head>
<body>

<header id="appHeader">
    <div class="brand"><h1>STREAMCALL POWER <span class="room-badge" id="headerRoom">SALA -</span></h1></div>
    <div id="headerStatus" style="font-size: 11px; color: #ff6b00; font-weight: bold;">ESPERANDO CONEXIÓN</div>
</header>

<div class="main-container" id="mainContainer">
    <div class="preview-bar" id="previewBar" style="display:none;">
        <div class="video-container preview">
            <video id="localVideo" autoplay muted playsinline></video>
            <div style="position:absolute; bottom:5px; left:5px; font-size:10px; background:rgba(0,0,0,0.7); padding:2px 5px;">ESTUDIO (TÚ)</div>
        </div>
    </div>
    <div class="video-grid" id="videoGrid" style="display:none;"></div>

    <div class="operator-view" id="guestOperatorView" style="display:none;">
        <div class="video-container" style="max-width: 800px; width:100%;">
            <div id="mainTally" class="tally-label-main">AL AIRE</div>
            <video id="remoteOperatorVideo" autoplay playsinline></video>
            <div style="position:absolute; top:10px; right:10px; background:#ff6b00; color:#000; font-size:10px; padding:2px 8px; font-weight:bold; border-radius:3px;">RETORNO PROGRAMA</div>
        </div>
    </div>
    <div class="guest-preview-bar" id="guestPreviewBar" style="display:none;">
        <div class="video-container guest-self">
            <video id="guestLocalVideo" autoplay muted playsinline></video>
            <div style="position:absolute; bottom:5px; left:5px; font-size:10px; background:rgba(0,0,0,0.7); padding:2px 5px;">TU CÁMARA</div>
        </div>
        <div style="font-size: 12px; color: #999;">
            <strong id="guestStatusLabel" style="color:#ff6b00;">CONECTADO</strong><br>
            Audio HD activo para música.
        </div>
    </div>

    <div class="dashboard" id="dashboard" style="display:none;">
        <h2>DASHBOARD</h2>
        <div class="id-display" id="displayId">----</div>
        <div id="slotsContainer">
            <div class="slot-card empty" id="slot-0">CANAL 1: ESPERANDO...</div>
            <div class="slot-card empty" id="slot-1">CANAL 2: ESPERANDO...</div>
            <div class="slot-card empty" id="slot-2">CANAL 3: ESPERANDO...</div>
        </div>
    </div>
</div>

<div id="appControls" style="position:fixed; bottom:20px; left:20px; display:none; gap:10px; z-index:1000;">
    <button onclick="toggleMic()" id="micBtn" style="width:50px; height:50px; border-radius:50%; border:none; background:#222; color:white; cursor:pointer; font-size:20px;">🎤</button>
    <button onclick="toggleCam()" id="camBtn" style="width:50px; height:50px; border-radius:50%; border:none; background:#222; color:white; cursor:pointer; font-size:20px;">📹</button>
    <button onclick="location.reload()" style="width:50px; height:50px; border-radius:50%; border:none; background:#cc0000; color:white; cursor:pointer; font-size:20px;">📴</button>
</div>

<div class="modal active" id="initModal">
    <div class="modal-content">
        <h2 style="color:#ff6b00; text-align:center; margin-bottom:15px;">StreamCall v4</h2>
        <select id="roleSelect" class="device-select" onchange="updateModalFields()">
            <option value="operator">SOY OPERADOR (CREAR SALA)</option>
            <option value="guest">SOY INVITADO (UNIRME)</option>
        </select>
        <div id="guestField" style="display:none;">
            <input type="text" id="joinId" class="device-select" placeholder="ID DEL OPERADOR" maxlength="6" style="text-align:center; font-size:18px; color:#ff6b00;">
        </div>
        <input type="text" id="userName" class="device-select" placeholder="TU NOMBRE">
        <label style="font-size:10px; color:#666;">CÁMARA:</label>
        <select id="vSource" class="device-select"></select>
        <label style="font-size:10px; color:#666;">MICRÓFONO:</label>
        <select id="aSource" class="device-select"></select>
        <button class="join-btn" onclick="startApp()">CONECTAR</button>
    </div>
</div>

<script>
let myPeer, localStream, myRole, myId;
let connections = new Map(); // peerId -> {call, data, slot}
let availableSlots = [0, 1, 2];

const PEER_CONFIG = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
    ]
};

// --- AUDIO HD FIX ---
const AUDIO_OPTS = { echoCancellation: true, noiseSuppression: false, autoGainControl: false };

const setBitrate = (sdp) => {
    return sdp.replace(/a=fmtp:(\d+) .*max-br=(\d+).*/g, 'a=fmtp:$1 x-google-max-bitrate=1500;x-google-min-bitrate=500;x-google-start-bitrate=1000');
};

navigator.mediaDevices.enumerateDevices().then(devices => {
    const v = document.getElementById('vSource'), a = document.getElementById('aSource');
    devices.forEach(d => {
        const o = document.createElement('option'); o.value = d.deviceId; o.text = d.label || d.kind;
        if (d.kind === 'videoinput') v.appendChild(o); else if (d.kind === 'audioinput') a.appendChild(o);
    });
});

function updateModalFields() {
    document.getElementById('guestField').style.display = document.getElementById('roleSelect').value === 'guest' ? 'block' : 'none';
}

function startApp() {
    myRole = document.getElementById('roleSelect').value;
    const vId = document.getElementById('vSource').value, aId = document.getElementById('aSource').value;
    const name = document.getElementById('userName').value || "User";

    navigator.mediaDevices.getUserMedia({
        video: { deviceId: vId ? { exact: vId } : undefined, width: 640, height: 360 },
        audio: { deviceId: aId ? { exact: aId } : undefined, ...AUDIO_OPTS }
    }).then(stream => {
        localStream = stream;
        document.getElementById('initModal').classList.remove('active');
        document.getElementById('appControls').style.display = 'flex';
        
        if (myRole === 'operator') {
            document.getElementById('mainContainer').className = 'main-container operator';
            document.getElementById('previewBar').style.display = 'flex';
            document.getElementById('videoGrid').style.display = 'grid';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('localVideo').srcObject = stream;
            initPeer('OP' + Math.random().toString(36).substr(2, 4).toUpperCase());
        } else {
            document.getElementById('mainContainer').className = 'main-container guest';
            document.getElementById('guestOperatorView').style.display = 'flex';
            document.getElementById('guestPreviewBar').style.display = 'flex';
            document.getElementById('guestLocalVideo').srcObject = stream;
            initPeer('G' + Math.random().toString(36).substr(2, 4).toUpperCase());
        }
    });
}

function initPeer(id) {
    myId = id;
    myPeer = new Peer(id, { config: PEER_CONFIG, debug: 1 });
    myPeer.on('open', () => {
        document.getElementById('headerStatus').textContent = "ONLINE: " + id;
        if (myRole === 'operator') {
            document.getElementById('displayId').textContent = id;
            document.getElementById('headerRoom').textContent = "ID: " + id;
        } else {
            const target = document.getElementById('joinId').value.toUpperCase();
            connectToOp(target);
        }
    });

    myPeer.on('connection', (conn) => { if (myRole === 'operator') handleData(conn); });

    myPeer.on('call', (call) => {
        // Al responder, el operador envía su localStream (RETORNO)
        call.answer(localStream, { sdpTransform: setBitrate });
        if (myRole === 'operator') handleCall(call);
        else {
            call.on('stream', s => document.getElementById('remoteOperatorVideo').srcObject = s);
        }
    });
}

function connectToOp(targetId) {
    const data = myPeer.connect(targetId, { metadata: { name: document.getElementById('userName').value } });
    data.on('open', () => {
        myPeer.call(targetId, localStream, { sdpTransform: setBitrate });
        document.getElementById('headerRoom').textContent = "CONECTADO A: " + targetId;
    });
    data.on('data', d => { if (d.type === 'tally') updateGuestTally(d.state); });
}

function handleData(conn) {
    conn.on('open', () => {
        if (!connections.has(conn.peer)) connections.set(conn.peer, { name: conn.metadata.name });
        connections.get(conn.peer).data = conn;
    });
}

function handleCall(call) {
    if (availableSlots.length === 0) return;
    const slot = availableSlots.shift();
    const peerId = call.peer;
    
    call.on('stream', (s) => {
        if (!connections.has(peerId)) connections.set(peerId, { name: "Invitado" });
        const c = connections.get(peerId);
        c.call = call; c.slot = slot;
        
        // UI Video Grid
        let cont = document.createElement('div');
        cont.className = 'video-container';
        cont.id = 'vcont-' + peerId;
        cont.innerHTML = `<video id="vid-${peerId}" autoplay playsinline></video>
                         <div style="position:absolute; bottom:5px; left:5px; font-size:10px; background:rgba(0,0,0,0.7); padding:2px 5px;">${c.name}</div>`;
        document.getElementById('videoGrid').appendChild(cont);
        document.getElementById('vid-' + peerId).srcObject = s;
        
        updateSlotUI(slot, peerId, c.name, true);
    });
    call.on('close', () => removePeer(peerId));
}

function updateSlotUI(slot, peerId, name, online) {
    const el = document.getElementById('slot-' + slot);
    if (online) {
        el.className = 'slot-card';
        el.innerHTML = `<div class="slot-header"><span>${name.toUpperCase()}</span><span style="color:#00ff00;">●</span></div>
                        <div class="tally-controls">
                            <button class="t-btn active" id="off-${peerId}" onclick="sendTally('${peerId}', 'off')">OFF</button>
                            <button class="t-btn pvw" id="pvw-${peerId}" onclick="sendTally('${peerId}', 'standby')">PVW</button>
                            <button class="t-btn live" id="live-${peerId}" onclick="sendTally('${peerId}', 'live')">LIVE</button>
                        </div>
                        <button class="obs-link-btn" onclick="copyObsLink(${slot})">COPIAR LINK OBS</button>`;
    } else {
        el.className = 'slot-card empty'; el.textContent = `CANAL ${slot+1}: ESPERANDO...`;
    }
}

function sendTally(peerId, state) {
    const c = connections.get(peerId);
    if (c && c.data) c.data.send({ type: 'tally', state });
    
    const cont = document.getElementById('vcont-' + peerId);
    cont.className = 'video-container ' + (state === 'live' ? 'live' : state === 'standby' ? 'standby' : '');
    
    document.querySelectorAll(`#slot-${c.slot} .t-btn`).forEach(b => b.classList.remove('active'));
    const bId = (state === 'live' ? 'live-' : state === 'standby' ? 'pvw-' : 'off-') + peerId;
    document.getElementById(bId).classList.add('active');
}

function updateGuestTally(state) {
    const t = document.getElementById('mainTally');
    t.className = 'tally-label-main active ' + state;
    t.textContent = state === 'live' ? '🔴 AL AIRE' : '⏺ ATENTO';
    if (state === 'off') t.classList.remove('active');
    document.getElementById('guestStatusLabel').textContent = state === 'live' ? '🔴 ESTÁS AL AIRE' : 'CONECTADO';
}

function copyObsLink(slot) {
    const room = myId;
    const url = `${window.location.href.split('?')[0]}?mode=obs&room=${room}&slot=${slot+1}`;
    navigator.clipboard.writeText(url);
    alert("Enlace OBS Canal " + (slot+1) + " copiado!");
}

function removePeer(id) {
    const c = connections.get(id);
    if (c) {
        availableSlots.push(c.slot); availableSlots.sort();
        if (document.getElementById('vcont-' + id)) document.getElementById('vcont-' + id).remove();
        updateSlotUI(c.slot, null, null, false);
        connections.delete(id);
    }
}

function toggleMic() {
    const t = localStream.getAudioTracks()[0]; t.enabled = !t.enabled;
    document.getElementById('micBtn').style.background = t.enabled ? '#222' : '#cc0000';
}
function toggleCam() {
    const t = localStream.getVideoTracks()[0]; t.enabled = !t.enabled;
    document.getElementById('camBtn').style.background = t.enabled ? '#222' : '#cc0000';
}

// --- LOGICA MODO OBS (Limpio) ---
const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'obs') {
    const room = params.get('room'), slotId = params.get('slot');
    document.body.style.background = "transparent";
    document.getElementById('appHeader').style.display = "none";
    document.getElementById('mainContainer').innerHTML = `<video id="obsVid" autoplay playsinline style="width:100vw; height:100vh; object-fit:cover;"></video>`;
    
    setTimeout(() => {
        const obsPeer = new Peer('OBS_' + room + '_' + slotId, { config: PEER_CONFIG });
        obsPeer.on('open', () => {
            const call = obsPeer.call(room, null); // OBS no envía stream, solo recibe
            call.on('stream', s => document.getElementById('obsVid').srcObject = s);
        });
    }, 1000);
}
</script>
</body>
</html>
