<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamMaster Zapping V9 - Ultimate</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Oswald:wght@500;700&display=swap');
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; }
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }
        body.overlay-mode { overflow: hidden !important; }

        .zapping-wrapper { position: absolute; bottom: 60px; left: 60px; display: flex; flex-direction: column; align-items: center; z-index: 9999; }

        /* --- FORMAS DE NOTICIA --- */
        .zap-news-box {
            width: 400px; background: rgba(10, 14, 26, 0.98); 
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-bottom: 6px solid; margin-bottom: -15px; transition: all 0.5s ease;
        }
        .shape-rect { border-radius: 20px; }
        .shape-capsule { border-radius: 50px; }
        .shape-modern { border-radius: 80px 0 20px 0; }
        .shape-glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }

        .zap-news-img { width: 100%; height: 200px; object-fit: cover; }
        .zap-news-body { padding: 22px; text-align: center; color: white; }
        .zap-news-title { font-size: 1.4rem; font-weight: 900; line-height: 1.2; text-transform: uppercase; }

        /* --- CÍRCULO BASE --- */
        .zap-circle {
            width: 195px; height: 195px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid #eab308; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; z-index: 10;
        }

        /* --- ANIMACIONES DE CÍRCULO --- */
        .anim-radar::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid #eab308; animation: radar 2s infinite; z-index: -1;
        }
        .anim-giro::before {
            content: ''; position: absolute; width: 110%; height: 110%; border-radius: 50%;
            border: 3px dashed #eab308; animation: spin 10s linear infinite; opacity: 0.5;
        }
        .anim-eco::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.4); animation: eco 1.5s infinite;
        }

        @keyframes radar { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes eco { 0% { box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7); } 100% { box-shadow: 0 0 0 30px rgba(234, 179, 8, 0); } }

        .zap-time { font-family: 'Oswald', sans-serif; font-size: 4rem; color: white; line-height: 1; }
        .zap-temp { font-size: 1.7rem; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); margin-top: 5px; width: 100px; text-align: center; }

        /* Dashboard UI */
        .panel { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-blue { background: #2563eb; color: white; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-opt { background: #334155; padding: 6px; border-radius: 6px; font-size: 10px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .btn-opt.active { border-color: #2563eb; background: #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const [loading, setLoading] = useState(false);
            const clientRef = useRef(null);

            const [config, setConfig] = useState({
                id: 'zapping_v9_master',
                visible: true,
                title: 'ULTIMO MOMENTO',
                color: '#0047ff',
                rssUrl: 'https://streaminghoy.com.ar/rss',
                city: 'Buenos Aires',
                temp: 23.9,
                activeIndex: 0,
                animType: 'anim-giro', // radar | giro | eco
                shapeType: 'shape-rect' // rect | capsule | modern | glass
            });

            const [news, setNews] = useState([]);
            const [searchInput, setSearchInput] = useState("Buenos Aires");

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                const rotator = setInterval(() => {
                    if (news.length > 0) {
                        setConfig(prev => ({ ...prev, activeIndex: (prev.activeIndex + 1) % news.length }));
                    }
                }, 20000);
                return () => { clearInterval(timer); clearInterval(rotator); };
            }, [news]);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('streammaster/zapping_v9');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') {
                        const parsed = JSON.parse(msg.toString());
                        setConfig(parsed);
                        if (parsed.newsPayload) setNews(parsed.newsPayload);
                    }
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c, newsArray = null) => {
                const payload = { ...c };
                if (newsArray) payload.newsPayload = newsArray;
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('streammaster/zapping_v9', JSON.stringify(payload), { retain: true });
                }
            };

            const fetchWeather = async () => {
                setLoading(true);
                try {
                    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchInput)}&count=1&language=es&format=json`);
                    const geoData = await geo.json();
                    if(geoData.results) {
                        const { latitude, longitude, name } = geoData.results[0];
                        const wea = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const weaData = await wea.json();
                        sync({ ...config, city: name, temp: weaData.current_weather.temperature });
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const fetchNews = async () => {
                setLoading(true);
                try {
                    const rssRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}`);
                    const json = await rssRes.json();
                    if (json.status === 'ok') {
                        const items = json.items.map(i => ({
                            title: i.title,
                            img: i.enclosure?.link || i.thumbnail || (i.description.match(/src="([^"]+)"/)?.[1]) || ''
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 }, items);
                    }
                } catch (e) { alert("Error RSS"); }
                setLoading(false);
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                const currentNews = news[config.activeIndex] || { title: 'SIN NOTICIAS', img: '' };
                return (
                    <div className="zapping-wrapper">
                        <div className={`zap-news-box ${config.shapeType}`} style={{borderBottomColor: config.color}}>
                            {currentNews.img && config.shapeType !== 'shape-glass' && <img src={currentNews.img} className="zap-news-img" />}
                            <div className="zap-news-body">
                                <div className="text-[0.8rem] font-black mb-1" style={{color: config.color}}>{config.title}</div>
                                <div className="zap-news-title">{currentNews.title.toUpperCase()}</div>
                            </div>
                        </div>
                        <div className={`zap-circle ${config.animType}`}>
                            <div className="zap-time text-white z-10">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                            <div className="zap-temp text-white z-10">ST {config.temp}°</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8 max-w-5xl mx-auto text-white">
                    <header className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                        <h1 className="text-3xl font-black italic">ZAPPING <span className="text-blue-500">PRO V9</span></h1>
                        <span className={status==='online'?'text-green-400 font-bold':'text-red-400'}>● {status.toUpperCase()}</span>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="panel space-y-4">
                            <h3 className="text-blue-400 font-bold uppercase text-[10px] tracking-widest">Clima & RSS</h3>
                            <div className="flex gap-2"><input value={searchInput} onChange={e=>setSearchInput(e.target.value)} /><button className="bg-blue-600 px-4 rounded font-bold" onClick={fetchWeather}>CLIMA</button></div>
                            <div className="flex gap-2"><input value={config.rssUrl} onChange={e=>sync({...config, rssUrl: e.target.value})} /><button className="bg-red-600 px-4 rounded font-bold" onClick={fetchNews}>RSS</button></div>
                        </div>

                        <div className="panel space-y-4">
                            <h3 className="text-yellow-400 font-bold uppercase text-[10px] tracking-widest">Estilos Visuales</h3>
                            <div className="space-y-2">
                                <label className="text-[9px] text-slate-400">ANIMACIÓN CÍRCULO</label>
                                <div className="flex gap-2">
                                    <div className={`btn-opt ${config.animType==='anim-radar'?'active':''}`} onClick={()=>sync({...config, animType:'anim-radar'})}>RADAR</div>
                                    <div className={`btn-opt ${config.animType==='anim-giro'?'active':''}`} onClick={()=>sync({...config, animType:'anim-giro'})}>GIRO PRO</div>
                                    <div className={`btn-opt ${config.animType==='anim-eco'?'active':''}`} onClick={()=>sync({...config, animType:'anim-eco'})}>ECO</div>
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[9px] text-slate-400">FORMA NOTICIA</label>
                                <div className="flex gap-2">
                                    <div className={`btn-opt ${config.shapeType==='shape-rect'?'active':''}`} onClick={()=>sync({...config, shapeType:'shape-rect'})}>CUADRADO</div>
                                    <div className={`btn-opt ${config.shapeType==='shape-capsule'?'active':''}`} onClick={()=>sync({...config, shapeType:'shape-capsule'})}>CÁPSULA</div>
                                    <div className={`btn-opt ${config.shapeType==='shape-modern'?'active':''}`} onClick={()=>sync({...config, shapeType:'shape-modern'})}>MODERN</div>
                                    <div className={`btn-opt ${config.shapeType==='shape-glass'?'active':''}`} onClick={()=>sync({...config, shapeType:'shape-glass'})}>GLASS</div>
                                </div>
                            </div>
                        </div>

                        <div className="panel md:col-span-2 space-y-4">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <input value={config.title} onChange={e=>sync({...config, title: e.target.value.toUpperCase()})} placeholder="Título Globo..." />
                                <input type="color" className="h-10 cursor-pointer" value={config.color} onChange={e=>sync({...config, color: e.target.value})} />
                                <button className={`h-12 rounded font-black ${config.visible?'bg-green-600':'bg-red-600'}`} onClick={()=>sync({...config, visible: !config.visible})}>
                                    {config.visible ? 'VISIBLE' : 'OCULTO'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="panel bg-black/50 border-dashed flex flex-col items-center gap-4">
                        <h3 className="text-xs text-slate-500 font-bold uppercase">Link para OBS / vMix</h3>
                        <code className="text-blue-400 text-[10px] bg-black p-4 rounded w-full text-center">
                            {window.location.href.split('?')[0]}?mode=overlay
                        </code>
                        <button className="bg-slate-700 px-6 py-2 rounded-full text-xs font-bold hover:bg-slate-600" 
                            onClick={() => { navigator.clipboard.writeText(window.location.href.split('?')[0]+"?mode=overlay"); alert("¡Copiado! Pegalo en una fuente de Navegador en OBS (1920x1080)"); }}>
                            COPIAR URL AUTOMÁTICAMENTE
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
