<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zapping Master V12 - TV Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@500;700&display=swap');
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; overflow: hidden; }
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }

        .zapping-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999;
        }

        /* FORMATOS DE NOTICIA ORIGINALES */
        .zap-news-box {
            width: 380px; background: #0a0e1a; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border-bottom: 6px solid; margin-bottom: -20px; transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        
        .shape-rect { border-radius: 15px; }
        .shape-capsule { border-radius: 50px; }
        .shape-modern { border-radius: 60px 0 60px 0; }
        .shape-glass { background: rgba(255,255,255,0.1) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }

        .zap-news-header {
            width: 100%; padding: 10px 0; text-align: center;
            font-weight: 900; font-size: 1.4rem; text-transform: uppercase;
            color: white; position: relative; z-index: 10;
        }

        .zap-news-img-container { width: 100%; height: 180px; background: #111; overflow: hidden; }
        .zap-news-img { width: 100%; height: 100%; object-fit: cover; }
        
        .zap-news-body {
            padding: 15px; background: rgba(0,0,0,0.8);
            min-height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .zap-news-title {
            color: white; text-align: center; font-weight: 800; font-size: 1.1rem;
            line-height: 1.2; text-transform: uppercase;
        }

        /* CÍRCULO CON ANIMACIONES PRO */
        .zap-circle {
            width: 185px; height: 185px;
            background: radial-gradient(circle at 30% 30%, #1e3a5f 0%, #0a0e1a 50%, #000 100%);
            border: 3px solid; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5);
            position: relative; z-index: 20;
        }

        .anim-pulse::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: pulseGlow 2s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.6; box-shadow: 0 0 20px currentColor; }
            50% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
        }

        .anim-radar-pro::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: radarSweep 2s linear infinite;
        }
        .anim-radar-pro::after {
            content: '';
            position: absolute;
            width: 50%; height: 50%;
            top: 0; left: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, currentColor 60deg, transparent 60deg);
            border-radius: 0 100% 0 0;
            transform-origin: 0% 100%;
            animation: radarSweep 2s linear infinite;
            opacity: 0.6;
        }
        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .anim-neon::before {
            content: '';
            position: absolute;
            width: 120%; height: 120%;
            border-radius: 50%;
            border: 1px dashed currentColor;
            animation: orbit 8s linear infinite;
            opacity: 0.4;
        }
        .anim-neon::after {
            content: '';
            position: absolute;
            width: 140%; height: 140%;
            border-radius: 50%;
            border: 1px dotted currentColor;
            animation: orbitReverse 12s linear infinite;
            opacity: 0.3;
        }
        @keyframes orbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes orbitReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .anim-breathe::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid currentColor;
            animation: breathe 3s ease-in-out infinite;
        }
        .anim-breathe::after {
            content: '';
            position: absolute;
            width: 110%; height: 110%;
            border-radius: 50%;
            border: 1px solid currentColor;
            animation: breathe 3s ease-in-out infinite 0.5s;
            opacity: 0.5;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .anim-glitch {
            animation: glitch 0.3s infinite;
        }
        .anim-glitch::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid currentColor;
            box-shadow: -2px 0 10px currentColor, 2px 0 10px currentColor;
            animation: glitchBorder 2s ease-in-out infinite;
        }
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
        }
        @keyframes glitchBorder {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; box-shadow: 0 0 30px currentColor; }
        }

        .zap-time { 
            font-family: 'Oswald', sans-serif; 
            font-size: 3.5rem; 
            color: white; 
            line-height: 1; 
            z-index: 30;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        .zap-widget-bot { 
            border-top: 1px solid rgba(255,255,255,0.3); 
            width: 120px; 
            height: 45px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-top: 5px; 
            z-index: 30; 
        }
        .zap-temp { font-size: 1.6rem; font-weight: bold; color: white; }
        .zap-alert { 
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); 
            border-radius: 30px; 
            width: 130px; 
            height: 35px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            animation: alertPulse 0.8s infinite; 
            font-weight: 900; 
            font-size: 1.1rem; 
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
        }

        @keyframes alertPulse { 
            0%, 100% { transform: scale(1); opacity: 1; } 
            50% { transform: scale(1.05); opacity: 0.9; } 
        }

        /* NUEVO: BREAKING NEWS BANNER */
        .breaking-banner {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(90deg, #dc2626 0%, #991b1b 100%);
            display: flex;
            align-items: center;
            padding: 0 50px;
            transform: translateY(-120px);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(220, 38, 38, 0.5);
        }
        
        .breaking-banner.active {
            transform: translateY(0);
        }
        
        .breaking-label {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-right: 25px;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 8px;
            animation: breakingPulse 1s ease-in-out infinite;
        }
        
        @keyframes breakingPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .breaking-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.3rem;
            color: white;
            font-weight: 600;
            flex: 1;
        }

        /* NUEVO: LOGO BUG */
        .tv-bug {
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 12px 24px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: white;
            z-index: 9998;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .tv-bug.visible {
            opacity: 1;
        }

        /* NUEVO: TICKER SCROLL */
        .ticker-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(0,0,0,0.9);
            border-top: 3px solid #0047ff;
            overflow: hidden;
            z-index: 9997;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .ticker-container.visible {
            opacity: 1;
        }
        
        .ticker-content {
            display: flex;
            align-items: center;
            height: 100%;
            white-space: nowrap;
            animation: tickerScroll 30s linear infinite;
        }
        
        @keyframes tickerScroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        .ticker-item {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: white;
            padding: 0 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .ticker-separator {
            color: #0047ff;
            font-weight: 900;
        }

        /* Dashboard UI */
        .panel { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            border: 1px solid #334155; 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .panel-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-opt { 
            background: #334155; 
            padding: 12px 8px; 
            border-radius: 10px; 
            font-size: 11px; 
            flex: 1; 
            text-align: center; 
            cursor: pointer; 
            border: 2px solid transparent; 
            font-weight: 700;
            transition: all 0.2s ease;
            color: #94a3b8;
        }
        .btn-opt:hover { background: #475569; color: white; }
        .btn-opt.active { 
            border-color: currentColor; 
            background: rgba(255,255,255,0.1); 
            color: white;
            box-shadow: 0 0 15px currentColor;
        }

        .dashboard-input {
            background: #0f172a !important;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f1f5f9 !important;
            font-size: 13px;
            width: 100%;
            transition: all 0.2s ease;
        }
        .dashboard-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .dashboard-input::placeholder {
            color: #64748b;
        }

        .news-feed-container {
            max-height: 300px;
            overflow-y: auto;
            border-radius: 12px;
            background: #0f172a;
            border: 1px solid #334155;
        }
        
        .news-feed-item {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .news-feed-item:hover {
            background: #1e293b;
        }
        
        .news-feed-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        
        .news-feed-thumb {
            width: 50px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            background: #334155;
            flex-shrink: 0;
        }
        
        .news-feed-title {
            font-size: 12px;
            line-height: 1.4;
            color: #e2e8f0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .news-feed-item.active .news-feed-title {
            color: #60a5fa;
            font-weight: 600;
        }

        .news-feed-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-loading { background: #f59e0b; color: #000; }
        .status-loaded { background: #10b981; color: #000; }
        .status-error { background: #ef4444; color: #fff; }

        .news-feed-container::-webkit-scrollbar {
            width: 6px;
        }
        .news-feed-container::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .news-feed-container::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .toggle-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        .toggle-visible {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .toggle-hidden {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .toggle-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: #1e293b;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-switch:hover {
            background: #334155;
        }
        .toggle-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #64748b;
            transition: all 0.2s;
        }
        .toggle-indicator.on {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const [rssStatus, setRssStatus] = useState('idle');
            const clientRef = useRef(null);

            const [config, setConfig] = useState({
                id: 'sm_v12_final',
                visible: true,
                title: 'ULTIMO MOMENTO',
                newsColor: '#0047ff',
                circleColor: '#eab308',
                rssUrl: 'https://streaminghoy.com.ar/rss',
                temp: 23.9,
                city: 'Buenos Aires',
                activeIndex: 0,
                alertVisible: false,
                alertText: 'AHORA',
                animType: 'anim-pulse',
                shapeType: 'shape-rect',
                // NUEVOS FEATURES TV
                showBug: false,
                bugText: 'CANAL 5',
                showTicker: false,
                tickerText: 'Síguenos en redes sociales • Instagram: @canal5 • Twitter: @canal5 • Próximo programa: 20:00hs',
                breakingActive: false,
                breakingText: 'ÚLTIMO MOMENTO: Información en desarrollo'
            });

            const [news, setNews] = useState([]);
            const [citySearch, setCitySearch] = useState("Buenos Aires");

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('streammaster/v12');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') {
                        try {
                            const parsed = JSON.parse(msg.toString());
                            setConfig(c => ({...c, ...parsed}));
                            if (parsed.newsPayload) setNews(parsed.newsPayload);
                        } catch(e) {}
                    }
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c, n = null) => {
                const payload = { ...c };
                if (n) payload.newsPayload = n;
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('streammaster/v12', JSON.stringify(payload), { retain: true });
                }
            };

            const fetchWeather = async () => {
                try {
                    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(citySearch)}&count=1&format=json`);
                    const gData = await geo.json();
                    if(gData.results && gData.results.length > 0) {
                        const wea = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${gData.results[0].latitude}&longitude=${gData.results[0].longitude}&current_weather=true`);
                        const wData = await wea.json();
                        sync({ ...config, temp: wData.current_weather.temperature, city: gData.results[0].name });
                    } else {
                        alert("Ciudad no encontrada");
                    }
                } catch (e) { 
                    alert("Error al obtener el clima"); 
                }
            };

            const fetchNews = async () => {
                setRssStatus('loading');
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}&t=${Date.now()}`);
                    const json = await res.json();
                    if (json.status === 'ok' && json.items && json.items.length > 0) {
                        const items = json.items.map((i, idx) => ({ 
                            id: idx,
                            title: i.title, 
                            img: i.enclosure?.link || i.thumbnail || (i.description?.match(/src="([^"]+)"/)?.[1]) || '' 
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 }, items);
                        setRssStatus('loaded');
                    } else {
                        setNews([]);
                        setRssStatus('error');
                    }
                } catch (e) { 
                    setNews([]);
                    setRssStatus('error');
                }
            };

            const selectNews = (index) => {
                sync({ ...config, activeIndex: index });
            };

            const toggleBreaking = () => {
                sync({ ...config, breakingActive: !config.breakingActive });
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                
                const item = news[config.activeIndex] || { title: 'CARGANDO NOTICIAS...', img: '' };
                
                return (
                    <div>
                        {/* NUEVO: Breaking News Banner */}
                        <div className={`breaking-banner ${config.breakingActive ? 'active' : ''}`}>
                            <span className="breaking-label">⚡ BREAKING</span>
                            <span className="breaking-text">{config.breakingText}</span>
                        </div>
                        
                        {/* NUEVO: Logo Bug */}
                        <div className={`tv-bug ${config.showBug ? 'visible' : ''}`}>
                            {config.bugText}
                        </div>
                        
                        {/* NUEVO: Ticker */}
                        <div className={`ticker-container ${config.showTicker ? 'visible' : ''}`}>
                            <div className="ticker-content">
                                <span className="ticker-item">
                                    {config.tickerText}
                                    <span className="ticker-separator">★</span>
                                    {config.tickerText}
                                    <span className="ticker-separator">★</span>
                                    {config.tickerText}
                                </span>
                            </div>
                        </div>
                        
                        {/* ORIGINAL: Zapping Wrapper */}
                        <div className="zapping-wrapper">
                            <div className={`zap-news-box ${config.shapeType}`} style={{borderBottomColor: config.newsColor}}>
                                <div className="zap-news-header" style={{backgroundColor: config.newsColor}}>{config.title}</div>
                                <div className="zap-news-img-container">
                                    {item.img && <img src={item.img} className="zap-news-img" />}
                                </div>
                                <div className="zap-news-body">
                                    <div className="zap-news-title">{item.title}</div>
                                </div>
                            </div>
                            <div className={`zap-circle ${config.animType}`} style={{borderColor: config.circleColor, color: config.circleColor}}>
                                <div className="zap-time">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                                <div className="zap-widget-bot">
                                    {config.alertVisible ? <div className="zap-alert">{config.alertText}</div> : <div className="zap-temp">{config.temp}°</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 max-w-6xl mx-auto text-white">
                    <header className="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tight">
                                ZAPPING MASTER <span className="text-blue-500 text-lg">V12 TV</span>
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">Dashboard de Control - Broadcast</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${status==='online'?'bg-green-500/20 text-green-400':'bg-red-500/20 text-red-400'}`}>
                                ● MQTT {status.toUpperCase()}
                            </span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                        {/* Panel Clima */}
                        <div className="panel">
                            <h3 className="panel-title text-blue-400">🌤️ Clima en Vivo</h3>
                            <div className="flex gap-3">
                                <input 
                                    className="dashboard-input flex-1" 
                                    value={citySearch} 
                                    onChange={e => setCitySearch(e.target.value)}
                                    placeholder="Buscar ciudad..."
                                />
                                <button onClick={fetchWeather} className="btn-primary">Buscar</button>
                            </div>
                            <div className="mt-3 flex items-center gap-3">
                                <div className="text-3xl font-bold">{config.temp}°C</div>
                                <div className="text-slate-400 text-sm">{config.city}</div>
                            </div>
                        </div>

                        {/* Panel Alerta */}
                        <div className="panel">
                            <h3 className="panel-title text-red-400">🚨 Alerta en Círculo</h3>
                            <div className="flex gap-3">
                                <input 
                                    className="dashboard-input flex-1" 
                                    value={config.alertText} 
                                    onChange={e => sync({...config, alertText: e.target.value.toUpperCase()})}
                                    placeholder="Texto de alerta..."
                                />
                                <button 
                                    onClick={() => sync({...config, alertVisible: !config.alertVisible})} 
                                    className={`px-5 rounded-lg font-bold text-sm transition-all ${config.alertVisible ? 'bg-red-500 hover:bg-red-600' : 'bg-slate-600 hover:bg-slate-500'}`}
                                >
                                    {config.alertVisible ? 'ACTIVA' : 'INACTIVA'}
                                </button>
                            </div>
                        </div>

                        {/* NUEVO: Panel Breaking News */}
                        <div className="panel lg:col-span-2">
                            <h3 className="panel-title text-red-500">🔴 Breaking News Banner</h3>
                            <div className="flex gap-3 mb-3">
                                <input 
                                    className="dashboard-input flex-1" 
                                    value={config.breakingText} 
                                    onChange={e => sync({...config, breakingText: e.target.value})}
                                    placeholder="Texto del breaking news..."
                                />
                                <button 
                                    onClick={toggleBreaking}
                                    className={`px-6 rounded-lg font-bold text-sm transition-all ${config.breakingActive ? 'bg-red-600 animate-pulse' : 'bg-slate-600'}`}
                                >
                                    {config.breakingActive ? 'ON AIR' : 'ACTIVAR'}
                                </button>
                            </div>
                        </div>

                        {/* NUEVO: Panel Elementos TV */}
                        <div className="panel">
                            <h3 className="panel-title text-purple-400">📺 Elementos Broadcast</h3>
                            <div className="space-y-3">
                                <div className="toggle-switch" onClick={() => sync({...config, showBug: !config.showBug})}>
                                    <div className={`toggle-indicator ${config.showBug ? 'on' : ''}`}></div>
                                    <span className="text-sm font-semibold">Logo Bug</span>
                                    <input 
                                        className="dashboard-input flex-1 ml-2 text-sm"
                                        value={config.bugText}
                                        onChange={e => {e.stopPropagation(); sync({...config, bugText: e.target.value})}}
                                        onClick={e => e.stopPropagation()}
                                        placeholder="Texto del bug..."
                                    />
                                </div>
                                <div className="toggle-switch" onClick={() => sync({...config, showTicker: !config.showTicker})}>
                                    <div className={`toggle-indicator ${config.showTicker ? 'on' : ''}`}></div>
                                    <span className="text-sm font-semibold">Ticker Inferior</span>
                                </div>
                                {config.showTicker && (
                                    <input 
                                        className="dashboard-input text-sm"
                                        value={config.tickerText}
                                        onChange={e => sync({...config, tickerText: e.target.value})}
                                        placeholder="Texto del ticker..."
                                    />
                                )}
                            </div>
                        </div>

                        {/* Panel RSS con Feed */}
                        <div className="panel">
                            <h3 className="panel-title text-green-400">📰 Fuentes RSS</h3>
                            <div className="flex gap-3 mb-3">
                                <input 
                                    className="dashboard-input flex-1 text-sm" 
                                    value={config.rssUrl} 
                                    onChange={e => sync({...config, rssUrl: e.target.value})}
                                    placeholder="URL del feed RSS..."
                                />
                                <button onClick={fetchNews} className="btn-danger text-xs px-3">Cargar</button>
                                <span className={`news-feed-status self-center ${rssStatus === 'loading' ? 'status-loading' : rssStatus === 'loaded' ? 'status-loaded' : rssStatus === 'error' ? 'status-error' : 'bg-slate-600'}`}>
                                    {rssStatus === 'idle' ? 'SIN CARGAR' : rssStatus === 'loading' ? '...' : rssStatus === 'loaded' ? `${news.length}` : 'ERR'}
                                </span>
                            </div>
                            
                            {news.length > 0 && (
                                <div className="news-feed-container max-h-48">
                                    {news.map((item, idx) => (
                                        <div 
                                            key={idx} 
                                            className={`news-feed-item ${config.activeIndex === idx ? 'active' : ''}`}
                                            onClick={() => selectNews(idx)}
                                        >
                                            {item.img && <img src={item.img} className="news-feed-thumb" alt="" />}
                                            <div className="news-feed-title">{item.title}</div>
                                            {config.activeIndex === idx && <span className="ml-auto text-blue-400 text-xs">●</span>}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Panel Animaciones */}
                        <div className="panel">
                            <h3 className="panel-title text-yellow-400">✨ Animación Círculo</h3>
                            <div className="grid grid-cols-3 gap-2">
                                {[
                                    {id: 'anim-pulse', name: 'Pulse', color: '#eab308'},
                                    {id: 'anim-radar-pro', name: 'Radar', color: '#3b82f6'},
                                    {id: 'anim-neon', name: 'Neon', color: '#a855f7'},
                                    {id: 'anim-breathe', name: 'Breathe', color: '#10b981'},
                                    {id: 'anim-glitch', name: 'Glitch', color: '#ef4444'}
                                ].map(a => (
                                    <div 
                                        key={a.id} 
                                        className={`btn-opt ${config.animType === a.id ? 'active' : ''}`} 
                                        style={{color: config.animType === a.id ? a.color : ''}}
                                        onClick={() => sync({...config, animType: a.id})}
                                    >
                                        {a.name}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Panel Formas */}
                        <div className="panel">
                            <h3 className="panel-title text-cyan-400">🔷 Forma Noticia</h3>
                            <div className="flex gap-2">
                                {['shape-rect', 'shape-capsule', 'shape-modern', 'shape-glass'].map(s => (
                                    <div 
                                        key={s} 
                                        className={`btn-opt ${config.shapeType === s ? 'active' : ''}`}
                                        onClick={() => sync({...config, shapeType: s})}
                                    >
                                        {s.split('-')[1].toUpperCase()}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Panel Config General */}
                        <div className="panel lg:col-span-2">
                            <h3 className="panel-title text-slate-300">⚙️ Configuración General</h3>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Título Globo</label>
                                    <input 
                                        className="dashboard-input" 
                                        value={config.title} 
                                        onChange={e => sync({...config, title: e.target.value.toUpperCase()})}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Color Noticia</label>
                                        <input type="color" className="w-full h-10 rounded cursor-pointer" value={config.newsColor} onChange={e => sync({...config, newsColor: e.target.value})}/>
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Color Círculo</label>
                                        <input type="color" className="w-full h-10 rounded cursor-pointer" value={config.circleColor} onChange={e => sync({...config, circleColor: e.target.value})}/>
                                    </div>
                                </div>
                                <button 
                                    className={`toggle-btn ${config.visible ? 'toggle-visible' : 'toggle-hidden'}`} 
                                    onClick={() => sync({...config, visible: !config.visible})}
                                >
                                    {config.visible ? '✓ VISIBLE' : '✕ OCULTO'}
                                </button>
                                <button 
                                    className="bg-slate-700 hover:bg-slate-600 h-12 rounded-lg text-sm font-bold" 
                                    onClick={() => {
                                        navigator.clipboard.writeText(window.location.href.split('?')[0] + '?mode=overlay');
                                        alert('Link copiado!');
                                    }}
                                >
                                    📋 Link OBS
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    {/* Preview */}
                    <div className="mt-6 panel">
                        <h3 className="panel-title text-slate-300">👁️ Preview</h3>
                        <div className="relative bg-slate-900 rounded-xl overflow-hidden" style={{height: '280px'}}>
                            <div className="absolute inset-0 bg-gradient-to-br from-slate-800 to-slate-900">
                                {/* Preview Breaking */}
                                {config.breakingActive && (
                                    <div className="breaking-banner active" style={{transform: 'scale(0.7)', transformOrigin: 'top left', height: '50px'}}>
                                        <span className="breaking-label" style={{fontSize: '1.5rem'}}>⚡ BREAKING</span>
                                    </div>
                                )}
                                {/* Preview Bug */}
                                {config.showBug && (
                                    <div className="tv-bug visible" style={{transform: 'scale(0.6)', top: '20px', right: '20px'}}>
                                        {config.bugText}
                                    </div>
                                )}
                                {/* Preview Ticker */}
                                {config.showTicker && (
                                    <div className="ticker-container visible" style={{height: '30px'}}>
                                        <div className="ticker-content text-xs">
                                            {config.tickerText.substring(0, 50)}...
                                        </div>
                                    </div>
                                )}
                                {/* Preview Original */}
                                <div className="absolute bottom-6 left-6" style={{transform: 'scale(0.65)', transformOrigin: 'bottom left'}}>
                                    <div className={`zap-news-box ${config.shapeType}`} style={{borderBottomColor: config.newsColor, width: '320px'}}>
                                        <div className="zap-news-header" style={{backgroundColor: config.newsColor, fontSize: '1.1rem'}}>
                                            {config.title}
                                        </div>
                                        <div className="zap-news-img-container" style={{height: '140px'}}>
                                            {news[config.activeIndex]?.img && (
                                                <img src={news[config.activeIndex].img} className="zap-news-img" style={{opacity: 0.8}}/>
                                            )}
                                        </div>
                                        <div className="zap-news-body" style={{minHeight: '60px'}}>
                                            <div className="zap-news-title" style={{fontSize: '0.9rem'}}>
                                                {news[config.activeIndex]?.title || 'Sin noticias'}
                                            </div>
                                        </div>
                                    </div>
                                    <div 
                                        className={`zap-circle ${config.animType}`} 
                                        style={{
                                            borderColor: config.circleColor, 
                                            color: config.circleColor,
                                            width: '150px',
                                            height: '150px',
                                            marginTop: '-15px'
                                        }}
                                    >
                                        <div className="zap-time" style={{fontSize: '2.5rem'}}>
                                            {time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}
                                        </div>
                                        <div className="zap-widget-bot" style={{width: '100px', height: '35px'}}>
                                            {config.alertVisible ? 
                                                <div className="zap-alert" style={{width: '100px', height: '28px', fontSize: '0.85rem'}}>{config.alertText}</div> : 
                                                <div className="zap-temp" style={{fontSize: '1.3rem'}}>{config.temp}°</div>
                                            }
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
