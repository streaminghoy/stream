<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamMaster V10 - Zapping Style Total</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap');
        
        html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }

        /* --- OVERLAY STYLES (ZAPPING STYLE FIELES) --- */
        .zapping-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* CUADRADO DE NOTICIA (Tipo Globo de la imagen) */
        .zap-news-box {
            width: 320px;
            background: rgba(10, 14, 26, 0.95);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
            position: relative;
        }

        /* Globo superior (Título) */
        .zap-news-header {
            width: 100%;
            background: #0047ff; /* Color por defecto */
            color: white;
            padding: 8px 0;
            text-align: center;
            font-weight: 900;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: relative; z-index: 2;
        }

        .zap-news-body {
            position: relative;
            z-index: 1;
        }

        .zap-news-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            opacity: 0.6; /* Un poco de opacidad para que se lea el texto encima */
        }

        .zap-news-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
            color: white;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
        }

        /* CÍRCULO (Reloj + Clima/Alerta) */
        .zap-circle {
            width: 170px; height: 170px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid; /* Color dinámico del borde */
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 15px 30px rgba(0,0,0,0.6);
            position: relative;
            margin-top: -15px; /* Solape con el globo */
            z-index: 10;
        }

        .zap-time {
            font-family: 'Oswald', sans-serif;
            font-size: 3.5rem;
            color: white;
            line-height: 1;
            margin-bottom: 3px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* WIDGET CLIMA/ALERTA (Abajo en el círculo) */
        .zap-bottom-widget {
            border-top: 1px solid rgba(255,255,255,0.3);
            width: 100px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
            transition: all 0.3s ease;
        }

        .zap-temp { font-size: 1.6rem; font-weight: bold; color: white; }

        /* Estilo Alerta Roja */
        .zap-alert-active {
            background: #ef4444; /* Rojo intenso */
            border-radius: 20px;
            width: 120px;
            height: 35px;
            border: none;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.7);
            animation: pulse 1s infinite;
        }
        .zap-alert-text { font-size: 1.1rem; font-weight: 900; color: white; text-transform: uppercase; }

        /* Animaciones */
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* DASHBOARD UI */
        .panel { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        .btn { background: #334155; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MQTT_CONFIG = { host: 'broker.emqx.io', port: 8084, path: '/mqtt' };

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const [loading, setLoading] = useState(false);
            const clientRef = useRef(null);

            // --- ESTADO UNIFICADO ---
            const [config, setConfig] = useState({
                id: 'sm_zap_v10_total',
                visible: true,
                title: 'ULTIMO MOMENTO',
                newsColor: '#0047ff', // Color del globo de noticia
                circleColor: '#eab308', // Color del borde amarillo del círculo
                rssUrl: 'https://streaminghoy.com.ar/rss',
                city: 'Buenos Aires',
                temp: 23.9,
                activeIndex: 0,
                alertVisible: false, // Estado de la alerta
                alertText: 'URGENTE'
            });

            const [news, setNews] = useState([]);
            const [searchInput, setSearchInput] = useState("Buenos Aires");

            // Reloj y Rotación cada 20s
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                const rotator = setInterval(() => {
                    if (news.length > 0) {
                        setConfig(prev => ({ ...prev, activeIndex: (prev.activeIndex + 1) % news.length }));
                    }
                }, 20000);
                return () => { clearInterval(timer); clearInterval(rotator); };
            }, [news]);

            // MQTT
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect(`wss://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`);
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('streammaster/zapping_v10');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') {
                        const parsed = JSON.parse(msg.toString());
                        setConfig(parsed);
                        if (parsed.newsPayload) setNews(parsed.newsPayload);
                    }
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c, newsArray = null) => {
                const payload = { ...c };
                if (newsArray) payload.newsPayload = newsArray;
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('streammaster/zapping_v10', JSON.stringify(payload), { retain: true });
                }
            };

            // --- TUS FUNCIONES DE CARGA ORIGINALES ---
            const fetchWeather = async () => {
                setLoading(true);
                try {
                    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchInput)}&count=1&language=es&format=json`);
                    const geoData = await geo.json();
                    if(geoData.results) {
                        const { latitude, longitude, name } = geoData.results[0];
                        const wea = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const weaData = await wea.json();
                        sync({ ...config, city: name, temp: weaData.current_weather.temperature });
                    }
                } catch (e) { alert("Error clima"); }
                setLoading(false);
            };

            const fetchNews = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}`);
                    const json = await res.json();
                    if (json.status === 'ok') {
                        const items = json.items.map(i => ({
                            title: i.title,
                            img: i.enclosure?.link || i.thumbnail || (i.description.match(/src="([^"]+)"/)?.[1]) || 'https://via.placeholder.com/400x200?text=ZAPPING'
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 }, items);
                    }
                } catch (e) { alert("Error RSS"); }
                setLoading(false);
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                const currentNews = news[config.activeIndex] || { title: 'SIN NOTICIAS CARGADAS', img: '' };
                return (
                    <div className="zapping-wrapper">
                        
                        {/* GLOBO DE NOTICIA (Tipo imagen de ejemplo) */}
                        <div className="zap-news-box">
                            <div className="zap-news-header" style={{backgroundColor: config.newsColor}}>{config.title}</div>
                            <div className="zap-news-body">
                                {currentNews.img && <img src={currentNews.img} className="zap-news-img" />}
                                <div className="zap-news-text">
                                    {currentNews.title.toUpperCase()}
                                </div>
                            </div>
                        </div>

                        {/* CÍRCULO (Reloj + Clima/Alerta) */}
                        <div className="zap-circle" style={{borderColor: config.circleColor}}>
                            <div className="zap-time">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                            
                            {/* WIDGET INFERIOR: CLIMA O ALERTA */}
                            <div className={`zap-bottom-widget ${config.alertVisible ? 'zap-alert-active' : ''}`}>
                                {config.alertVisible ? (
                                    <span className="zap-alert-text">{config.alertText}</span>
                                ) : (
                                    <span className="zap-temp">{config.temp}°</span>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8 max-w-5xl mx-auto text-white dashboard-mode">
                    <header className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                        <h1 className="text-2xl font-black uppercase">Zapping Master <span className="text-blue-500">V10</span></h1>
                        <div className="flex items-center gap-2 text-xs">
                            <span className={status==='online'?'text-green-400':'text-red-400'}>● {status.toUpperCase()}</span>
                            <button className="bg-slate-700 px-3 py-1 rounded hover:bg-slate-600" 
                                onClick={() => { navigator.clipboard.writeText(`${window.location.href.split('?')[0]}?mode=overlay&id=${config.id}`); alert("Link copiado para OBS"); }}>
                                COPIAR URL OBS
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* PANEL CONTROL CLIMA */}
                        <div className="panel space-y-4">
                            <h2 className="text-blue-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Clima Automático</h2>
                            <div className="flex gap-2">
                                <input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="Ej: Olavarría" />
                                <button className="btn active w-24" onClick={fetchWeather}>BUSCAR</button>
                            </div>
                            <div className="p-3 bg-slate-900 rounded-lg border border-slate-700 flex justify-between">
                                <span>{config.city}</span> <span className="font-bold text-yellow-500">{config.temp}°C</span>
                            </div>
                        </div>

                        {/* PANEL CONTROL RSS */}
                        <div className="panel space-y-4">
                            <h2 className="text-red-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Carga de Notas (RSS)</h2>
                            <input value={config.rssUrl} onChange={e=>sync({...config, rssUrl: e.target.value})} placeholder="URL RSS..." />
                            <button className="btn active w-full" onClick={fetchNews}>CARGAR NOTICIAS</button>
                        </div>

                        {/* PANEL CONTROL ALERTA URGENTE */}
                        <div className="panel md:col-span-2 space-y-4">
                            <h2 className="text-red-600 font-bold uppercase text-sm border-b border-slate-700 pb-2">Sistema de Alerta (Reemplaza Clima)</h2>
                            <div className="flex gap-3 items-center">
                                <input className="flex-1" placeholder="Texto de la alerta (Ej: URGENTE)" value={config.alertText} 
                                    onChange={e=>sync({...config, alertText: e.target.value.toUpperCase()})} />
                                <button className={`flex-1 py-3 rounded font-bold ${config.alertVisible ? 'bg-red-600' : 'bg-slate-700'}`} 
                                    onClick={()=>sync({...config, alertVisible: !config.alertVisible})}>
                                    {config.alertVisible ? 'OCULTAR ALERTA' : 'MOSTRAR ALERTA'}
                                </button>
                            </div>
                        </div>

                        {/* PANEL ESTILOS */}
                        <div className="panel md:col-span-2 space-y-4">
                            <h2 className="text-green-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Configuración Visual (Colores)</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                                <div>
                                    <label className="text-[10px] text-slate-400 block mb-1 tracking-widest">TÍTULO GLOBO NOTICIA</label>
                                    <input value={config.title} onChange={e=>sync({...config, title: e.target.value.toUpperCase()})} />
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="flex-1">
                                        <label className="text-[10px] text-slate-400 block mb-1">COLOR GLOBO</label>
                                        <input type="color" className="h-10 cursor-pointer p-1" value={config.newsColor} onChange={e=>sync({...config, newsColor: e.target.value})} />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-[10px] text-slate-400 block mb-1">COLOR CÍRCULO</label>
                                        <input type="color" className="h-10 cursor-pointer p-1" value={config.circleColor} onChange={e=>sync({...config, circleColor: e.target.value})} />
                                    </div>
                                </div>
                                <button className={`h-12 rounded font-black ${config.visible?'bg-green-600':'bg-red-600'}`} onClick={()=>sync({...config, visible: !config.visible})}>
                                    {config.visible ? 'VISIBLE EN OBS' : 'OCULTO EN OBS'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
