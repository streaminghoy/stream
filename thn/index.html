<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zapping Master TV - Broadcast Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@500;700&family=Roboto+Condensed:wght@400;700&display=swap');
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; overflow: hidden; }
        body.dashboard-mode { background-color: #0a0a0f !important; color: white; overflow-y: auto !important; }

        /* OVERLAY TV - Posiciones profesionales */
        .tv-overlay-safe {
            position: absolute;
            bottom: 60px;
            left: 60px;
            z-index: 9999;
        }
        
        .tv-overlay-top {
            position: absolute;
            top: 40px;
            right: 60px;
            z-index: 9999;
        }
        
        .tv-overlay-lower-third {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }

        /* BUG / LOGO CANAL */
        .tv-bug {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 120px;
            height: 60px;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            z-index: 9998;
            animation: bugPulse 4s ease-in-out infinite;
        }
        
        @keyframes bugPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        /* LOWER THIRD PROFESIONAL */
        .lower-third-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 600px;
        }
        
        .lower-third-main {
            background: linear-gradient(90deg, rgba(0,71,255,0.95) 0%, rgba(0,71,255,0.8) 60%, transparent 100%);
            padding: 15px 30px;
            border-left: 6px solid #fff;
            position: relative;
            overflow: hidden;
        }
        
        .lower-third-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .lower-third-title {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .lower-third-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
        }
        
        .lower-third-ticker {
            background: rgba(0,0,0,0.85);
            padding: 10px 30px;
            width: 100%;
            border-top: 2px solid #0047ff;
        }
        
        .ticker-text {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.95rem;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            animation: ticker 20s linear infinite;
        }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* NOTICIA BREAKING NEWS */
        .breaking-news-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10000;
        }
        
        .breaking-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(180deg, #dc2626 0%, #991b1b 100%);
            display: flex;
            align-items: center;
            padding: 0 40px;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .breaking-banner.active {
            transform: translateY(0);
        }
        
        .breaking-label {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-right: 30px;
            animation: breakingPulse 1s ease-in-out infinite;
        }
        
        @keyframes breakingPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .breaking-text {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            color: white;
            font-weight: 600;
        }

        /* RELOJ TV */
        .tv-clock {
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(20,20,30,0.9) 100%);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .tv-clock-time {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .tv-clock-date {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CLIMA TV */
        .tv-weather {
            background: linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(20,20,30,0.9) 100%);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            margin-top: 10px;
        }
        
        .weather-icon {
            font-size: 2.5rem;
        }
        
        .weather-temp {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }
        
        .weather-location {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }

        /* CÍRCULO ZAPPING MEJORADO */
        .zap-circle-tv {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, #1e3a5f 0%, #0a0e1a 50%, #000 100%);
            border: 4px solid;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.9),
                0 0 30px rgba(0,0,0,0.8),
                0 0 60px rgba(0,0,0,0.4);
            position: relative;
        }

        /* Animaciones TV Broadcast */
        .anim-broadcast-pulse::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid currentColor;
            animation: broadcastPulse 2s ease-out infinite;
        }
        
        @keyframes broadcastPulse {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 currentColor; }
            100% { transform: scale(1.3); opacity: 0; box-shadow: 0 0 0 30px transparent; }
        }
        
        .anim-broadcast-spin::before {
            content: '';
            position: absolute;
            width: 115%; height: 115%;
            border-radius: 50%;
            border: 2px dashed currentColor;
            border-top-color: transparent;
            animation: broadcastSpin 3s linear infinite;
        }
        
        @keyframes broadcastSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* COMING UP / NEXT */
        .coming-up {
            position: absolute;
            bottom: 280px;
            right: 60px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.9) 0%, rgba(88, 28, 135, 0.9) 100%);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            max-width: 350px;
        }
        
        .coming-up-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .coming-up-title {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            margin-top: 5px;
        }
        
        .coming-up-time {
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            color: #fbbf24;
            margin-top: 8px;
        }

        /* SCOREBOARD DEPORTES */
        .scoreboard {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(20,20,30,0.95) 100%);
            border-radius: 16px;
            border: 3px solid rgba(255,255,255,0.2);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            backdrop-filter: blur(10px);
        }
        
        .team {
            text-align: center;
        }
        
        .team-name {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            color: white;
            text-transform: uppercase;
        }
        
        .team-score {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #fbbf24;
        }
        
        .vs-divider {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
        }
        
        .match-time {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #dc2626;
            padding: 5px 20px;
            border-radius: 20px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: white;
            font-weight: 700;
        }

        /* REDES SOCIALES */
        .social-lower {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .social-pill {
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .social-icon {
            font-size: 1.2rem;
        }
        
        .social-handle {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: white;
            font-weight: 600;
        }

        /* Dashboard UI */
        .panel { 
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%); 
            border: 1px solid #2a2a3e; 
            padding: 20px; 
            border-radius: 16px; 
            margin-bottom: 15px;
        }
        
        .panel-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-opt { 
            background: #252538; 
            padding: 12px 8px; 
            border-radius: 10px; 
            font-size: 11px; 
            flex: 1; 
            text-align: center; 
            cursor: pointer; 
            border: 2px solid transparent; 
            font-weight: 700;
            transition: all 0.2s ease;
            color: #8b8b9f;
        }
        .btn-opt:hover { background: #353550; color: white; }
        .btn-opt.active { 
            border-color: currentColor; 
            background: rgba(255,255,255,0.1); 
            color: white;
        }

        .dashboard-input {
            background: #0f0f1a !important;
            border: 2px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f1f5f9 !important;
            font-size: 13px;
            width: 100%;
        }
        .dashboard-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .scene-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            text-align: center;
        }
        .scene-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3); }
        .scene-btn.active { border-color: #fbbf24; }

        .program-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .program-item {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2a2a3e;
            cursor: pointer;
            transition: all 0.2s;
        }
        .program-item:hover { background: #252538; border-color: #4f46e5; }
        .program-item.active { background: #4f46e5; border-color: #4f46e5; }
        
        .program-time {
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: #fbbf24;
        }
        .program-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .program-type {
            font-size: 0.75rem;
            color: #8b8b9f;
            margin-top: 2px;
            text-transform: uppercase;
        }

        /* Preview TV */
        .tv-preview {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
        }
        
        .tv-preview-content {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const [rssStatus, setRssStatus] = useState('idle');
            const clientRef = useRef(null);

            // Configuración TV
            const [config, setConfig] = useState({
                visible: true,
                scene: 'news', // news, sports, weather, breaking
                title: 'NOTICIAS',
                subtitle: 'Edición Central',
                newsColor: '#0047ff',
                circleColor: '#eab308',
                rssUrl: 'https://streaminghoy.com.ar/rss',
                temp: 23.9,
                city: 'Buenos Aires',
                activeIndex: 0,
                breakingActive: false,
                breakingText: 'ÚLTIMO MOMENTO: Se registran fuertes tormentas en la región',
                tickerText: 'Bienvenidos a la transmisión en vivo • Sigue nuestras redes sociales @CanalTV • Próximo programa: Deportes Central a las 20:00',
                animType: 'anim-broadcast-pulse',
                showBug: true,
                showClock: true,
                showWeather: true,
                showTicker: true,
                socialHandles: [
                    {platform: 'IG', handle: '@CanalTV'},
                    {platform: 'TW', handle: '@CanalTV'},
                    {platform: 'YT', handle: 'CanalTV'}
                ],
                // Programación
                currentProgram: {name: 'Noticiero Central', type: 'Noticias', time: '19:00 - 20:30'},
                nextProgram: {name: 'Deportes Central', type: 'Deportes', time: '20:30 - 22:00'},
                // Scoreboard deportes
                match: {
                    team1: {name: 'Boca', score: 2, color: '#0047ff'},
                    team2: {name: 'River', score: 1, color: '#dc2626'},
                    time: '78\'',
                    live: true
                }
            });

            const [news, setNews] = useState([]);
            const [programs, setPrograms] = useState([
                {time: '06:00', name: 'Mañana TV', type: 'Informativo'},
                {time: '10:00', name: 'Cocinando con Chef', type: 'Entretenimiento'},
                {time: '14:00', name: 'Noticiero Mediodía', type: 'Noticias'},
                {time: '17:00', name: 'El Show del Mediodía', type: 'Entretenimiento'},
                {time: '19:00', name: 'Noticiero Central', type: 'Noticias', active: true},
                {time: '20:30', name: 'Deportes Central', type: 'Deportes'},
                {time: '22:00', name: 'Película Estreno', type: 'Cine'},
                {time: '00:00', name: 'Late Night Show', type: 'Entretenimiento'}
            ]);

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(t);
            }, []);

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('tvchannel/broadcast');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') {
                        try {
                            const parsed = JSON.parse(msg.toString());
                            setConfig(c => ({...c, ...parsed}));
                            if (parsed.newsPayload) setNews(parsed.newsPayload);
                        } catch(e) {}
                    }
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c, n = null) => {
                const payload = { ...c };
                if (n) payload.newsPayload = n;
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('tvchannel/broadcast', JSON.stringify(payload), { retain: true });
                }
            };

            const fetchNews = async () => {
                setRssStatus('loading');
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}&t=${Date.now()}`);
                    const json = await res.json();
                    if (json.status === 'ok' && json.items) {
                        const items = json.items.map((i, idx) => ({ 
                            id: idx,
                            title: i.title, 
                            img: i.enclosure?.link || i.thumbnail || (i.description?.match(/src="([^"]+)"/)?.[1]) || '' 
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 }, items);
                        setRssStatus('loaded');
                    } else {
                        setRssStatus('error');
                    }
                } catch (e) { 
                    setRssStatus('error');
                }
            };

            const toggleBreaking = () => {
                sync({ ...config, breakingActive: !config.breakingActive });
            };

            const selectProgram = (idx) => {
                const updated = programs.map((p, i) => ({...p, active: i === idx}));
                setPrograms(updated);
                sync({ ...config, currentProgram: {name: programs[idx].name, type: programs[idx].type, time: programs[idx].time}});
            };

            const updateScore = (team, delta) => {
                const newMatch = {...config.match};
                if (team === 1) newMatch.team1.score = Math.max(0, newMatch.team1.score + delta);
                if (team === 2) newMatch.team2.score = Math.max(0, newMatch.team2.score + delta);
                sync({ ...config, match: newMatch });
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                
                const currentNews = news[config.activeIndex] || { title: config.subtitle, img: '' };
                
                return (
                    <div>
                        {/* BUG del Canal */}
                        {config.showBug && (
                            <div className="tv-bug">
                                CANAL TV
                            </div>
                        )}
                        
                        {/* Breaking News Banner */}
                        <div className={`breaking-news-container ${config.breakingActive ? 'active' : ''}`}>
                            <div className={`breaking-banner ${config.breakingActive ? 'active' : ''}`}>
                                <span className="breaking-label">⚡ BREAKING</span>
                                <span className="breaking-text">{config.breakingText}</span>
                            </div>
                        </div>
                        
                        {/* Scoreboard Deportes */}
                        {config.scene === 'sports' && (
                            <div className="scoreboard">
                                <div className="team">
                                    <div className="team-name" style={{color: config.match.team1.color}}>{config.match.team1.name}</div>
                                    <div className="team-score">{config.match.team1.score}</div>
                                </div>
                                <div className="vs-divider">VS</div>
                                <div className="team">
                                    <div className="team-name" style={{color: config.match.team2.color}}>{config.match.team2.name}</div>
                                    <div className="team-score">{config.match.team2.score}</div>
                                </div>
                                <div className="match-time">{config.match.time}</div>
                            </div>
                        )}
                        
                        {/* Coming Up */}
                        <div className="coming-up">
                            <div className="coming-up-label">Próximo Programa</div>
                            <div className="coming-up-title">{config.nextProgram.name}</div>
                            <div className="coming-up-time">⏰ {config.nextProgram.time}</div>
                        </div>
                        
                        {/* Lower Third Principal */}
                        <div className="tv-overlay-lower-third">
                            <div className="lower-third-container">
                                <div className="lower-third-main">
                                    <div className="lower-third-title">{config.title}</div>
                                    <div className="lower-third-subtitle">{currentNews.title}</div>
                                </div>
                                {config.showTicker && (
                                    <div className="lower-third-ticker">
                                        <div className="ticker-text">{config.tickerText}</div>
                                    </div>
                                )}
                                <div className="social-lower">
                                    {config.socialHandles.map((social, idx) => (
                                        <div key={idx} className="social-pill">
                                            <span className="social-icon">
                                                {social.platform === 'IG' ? '📷' : social.platform === 'TW' ? '🐦' : '📺'}
                                            </span>
                                            <span className="social-handle">{social.handle}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        {/* Widgets Laterales */}
                        <div className="tv-overlay-top">
                            {config.showClock && (
                                <div className="tv-clock">
                                    <div className="tv-clock-time">
                                        {time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}
                                    </div>
                                    <div className="tv-clock-date">
                                        {time.toLocaleDateString('es-AR', {weekday: 'short', day: 'numeric', month: 'short'})}
                                    </div>
                                </div>
                            )}
                            {config.showWeather && (
                                <div className="tv-weather">
                                    <span className="weather-icon">☀️</span>
                                    <div>
                                        <div className="weather-temp">{config.temp}°</div>
                                        <div className="weather-location">{config.city}</div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // DASHBOARD
            return (
                <div className="p-6 max-w-7xl mx-auto text-white">
                    <header className="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tight">
                                CANAL TV <span className="text-purple-500 text-lg">BROADCAST CONTROL</span>
                            </h1>
                            <p className="text-slate-500 text-sm mt-1">Sistema de Control Maestro - Playout</p>
                        </div>
                        <div className="flex items-center gap-3">
                            <span className={`px-3 py-1 rounded-full text-xs font-bold ${status==='online'?'bg-green-500/20 text-green-400':'bg-red-500/20 text-red-400'}`}>
                                ● MQTT {status.toUpperCase()}
                            </span>
                            <span className="px-3 py-1 rounded-full text-xs font-bold bg-blue-500/20 text-blue-400">
                                ● LIVE
                            </span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                        {/* Panel Escenas */}
                        <div className="panel lg:col-span-2">
                            <h3 className="panel-title text-purple-400">🎬 Escenas de Transmisión</h3>
                            <div className="grid grid-cols-4 gap-3 mb-4">
                                {[
                                    {id: 'news', name: 'Noticias', icon: '📰'},
                                    {id: 'sports', name: 'Deportes', icon: '⚽'},
                                    {id: 'weather', name: 'Clima', icon: '🌤️'},
                                    {id: 'breaking', name: 'Breaking', icon: '🚨'}
                                ].map(scene => (
                                    <div 
                                        key={scene.id}
                                        className={`scene-btn ${config.scene === scene.id ? 'active' : ''}`}
                                        onClick={() => sync({...config, scene: scene.id})}
                                    >
                                        <div className="text-2xl mb-1">{scene.icon}</div>
                                        <div className="text-sm">{scene.name}</div>
                                    </div>
                                ))}
                            </div>
                            
                            {/* Scoreboard Control (solo deportes) */}
                            {config.scene === 'sports' && (
                                <div className="mt-4 p-4 bg-slate-900/50 rounded-xl border border-slate-800">
                                    <h4 className="text-sm font-bold text-slate-400 mb-3 uppercase">Control Scoreboard</h4>
                                    <div className="flex items-center justify-between">
                                        <div className="text-center">
                                            <input 
                                                className="dashboard-input text-center mb-2" 
                                                value={config.match.team1.name}
                                                onChange={e => sync({...config, match: {...config.match, team1: {...config.match.team1, name: e.target.value}}})}
                                            />
                                            <div className="flex items-center gap-2 justify-center">
                                                <button 
                                                    className="w-10 h-10 bg-red-600 rounded-lg font-bold text-xl"
                                                    onClick={() => updateScore(1, -1)}
                                                >-</button>
                                                <span className="text-3xl font-bold w-12 text-center">{config.match.team1.score}</span>
                                                <button 
                                                    className="w-10 h-10 bg-green-600 rounded-lg font-bold text-xl"
                                                    onClick={() => updateScore(1, 1)}
                                                >+</button>
                                            </div>
                                        </div>
                                        <div className="text-slate-500 font-bold">VS</div>
                                        <div className="text-center">
                                            <input 
                                                className="dashboard-input text-center mb-2" 
                                                value={config.match.team2.name}
                                                onChange={e => sync({...config, match: {...config.match, team2: {...config.match.team2, name: e.target.value}}})}
                                            />
                                            <div className="flex items-center gap-2 justify-center">
                                                <button 
                                                    className="w-10 h-10 bg-red-600 rounded-lg font-bold text-xl"
                                                    onClick={() => updateScore(2, -1)}
                                                >-</button>
                                                <span className="text-3xl font-bold w-12 text-center">{config.match.team2.score}</span>
                                                <button 
                                                    className="w-10 h-10 bg-green-600 rounded-lg font-bold text-xl"
                                                    onClick={() => updateScore(2, 1)}
                                                >+</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="mt-3 flex justify-center">
                                        <input 
                                            className="dashboard-input w-24 text-center"
                                            value={config.match.time}
                                            onChange={e => sync({...config, match: {...config.match, time: e.target.value}})}
                                            placeholder="Tiempo"
                                        />
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Panel Breaking News */}
                        <div className="panel">
                            <h3 className="panel-title text-red-400">🚨 Breaking News</h3>
                            <button 
                                onClick={toggleBreaking}
                                className={`w-full py-4 rounded-xl font-bold text-lg mb-3 transition-all ${config.breakingActive ? 'bg-red-600 animate-pulse' : 'bg-slate-700'}`}
                            >
                                {config.breakingActive ? '🔴 BREAKING ACTIVO' : 'ACTIVAR BREAKING'}
                            </button>
                            <textarea 
                                className="dashboard-input w-full h-24 resize-none"
                                value={config.breakingText}
                                onChange={e => sync({...config, breakingText: e.target.value})}
                                placeholder="Texto de breaking news..."
                            />
                        </div>

                        {/* Panel Programación */}
                        <div className="panel lg:col-span-2">
                            <h3 className="panel-title text-blue-400">📺 Grilla de Programación</h3>
                            <div className="program-grid">
                                {programs.map((prog, idx) => (
                                    <div 
                                        key={idx}
                                        className={`program-item ${prog.active ? 'active' : ''}`}
                                        onClick={() => selectProgram(idx)}
                                    >
                                        <div className="program-time">{prog.time}</div>
                                        <div className="program-name">{prog.name}</div>
                                        <div className="program-type">{prog.type}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Panel RSS */}
                        <div className="panel">
                            <h3 className="panel-title text-green-400">📰 Fuentes RSS</h3>
                            <div className="flex gap-2 mb-3">
                                <input 
                                    className="dashboard-input flex-1 text-xs"
                                    value={config.rssUrl}
                                    onChange={e => sync({...config, rssUrl: e.target.value})}
                                />
                                <button 
                                    onClick={fetchNews}
                                    className="bg-green-600 px-4 rounded-lg font-bold text-xs"
                                >
                                    CARGAR
                                </button>
                            </div>
                            <span className={`inline-block px-2 py-1 rounded text-xs ${rssStatus === 'loaded' ? 'bg-green-500/20 text-green-400' : rssStatus === 'error' ? 'bg-red-500/20 text-red-400' : 'bg-slate-600'}`}>
                                {rssStatus === 'idle' ? 'Sin cargar' : rssStatus === 'loading' ? 'Cargando...' : rssStatus === 'loaded' ? `${news.length} noticias` : 'Error'}
                            </span>
                            
                            {news.length > 0 && (
                                <div className="mt-3 max-h-40 overflow-y-auto space-y-2">
                                    {news.map((item, idx) => (
                                        <div 
                                            key={idx}
                                            className={`p-2 rounded cursor-pointer text-xs ${config.activeIndex === idx ? 'bg-blue-600' : 'bg-slate-800 hover:bg-slate-700'}`}
                                            onClick={() => sync({...config, activeIndex: idx})}
                                        >
                                            {item.title}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Panel Config Lower Third */}
                        <div className="panel lg:col-span-3">
                            <h3 className="panel-title text-slate-300">⚙️ Configuración Lower Third</h3>
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Título</label>
                                    <input 
                                        className="dashboard-input"
                                        value={config.title}
                                        onChange={e => sync({...config, title: e.target.value.toUpperCase()})}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Subtítulo</label>
                                    <input 
                                        className="dashboard-input"
                                        value={config.subtitle}
                                        onChange={e => sync({...config, subtitle: e.target.value})}
                                    />
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 uppercase font-bold mb-2 block">Ticker</label>
                                    <input 
                                        className="dashboard-input"
                                        value={config.tickerText}
                                        onChange={e => sync({...config, tickerText: e.target.value})}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <input 
                                        type="color" 
                                        className="w-12 h-10 rounded cursor-pointer"
                                        value={config.newsColor}
                                        onChange={e => sync({...config, newsColor: e.target.value})}
                                    />
                                    <input 
                                        type="color" 
                                        className="w-12 h-10 rounded cursor-pointer"
                                        value={config.circleColor}
                                        onChange={e => sync({...config, circleColor: e.target.value})}
                                    />
                                </div>
                                <div className="flex gap-2">
                                    <button 
                                        className={`flex-1 py-2 rounded-lg font-bold text-sm ${config.visible ? 'bg-green-600' : 'bg-red-600'}`}
                                        onClick={() => sync({...config, visible: !config.visible})}
                                    >
                                        {config.visible ? 'VISIBLE' : 'OCULTO'}
                                    </button>
                                    <button 
                                        className="flex-1 bg-slate-700 py-2 rounded-lg font-bold text-sm"
                                        onClick={() => {
                                            navigator.clipboard.writeText(window.location.href.split('?')[0] + '?mode=overlay');
                                            alert('Link copiado!');
                                        }}
                                    >
                                        LINK OBS
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Preview TV */}
                        <div className="panel lg:col-span-3">
                            <h3 className="panel-title text-slate-300">👁️ Preview de Salida</h3>
                            <div className="tv-preview">
                                <div className="tv-preview-content">
                                    {/* Simulación del overlay */}
                                    {config.showBug && (
                                        <div className="tv-bug" style={{transform: 'scale(0.6)', top: '20px', left: '20px'}}>
                                            CANAL TV
                                        </div>
                                    )}
                                    
                                    <div style={{position: 'absolute', bottom: '40px', left: '50%', transform: 'translateX(-50%) scale(0.7)', transformOrigin: 'bottom center'}}>
                                        <div className="lower-third-container">
                                            <div className="lower-third-main" style={{minWidth: '400px'}}>
                                                <div className="lower-third-title">{config.title}</div>
                                                <div className="lower-third-subtitle">
                                                    {news[config.activeIndex]?.title || config.subtitle}
                                                </div>
                                            </div>
                                            {config.showTicker && (
                                                <div className="lower-third-ticker">
                                                    <div className="ticker-text">{config.tickerText}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    <div style={{position: 'absolute', top: '20px', right: '20px', transform: 'scale(0.6)', transformOrigin: 'top right'}}>
                                        {config.showClock && (
                                            <div className="tv-clock">
                                                <div className="tv-clock-time">
                                                    {time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}
                                                </div>
                                                <div className="tv-clock-date">
                                                    {time.toLocaleDateString('es-AR', {weekday: 'short', day: 'numeric', month: 'short'})}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
