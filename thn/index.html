<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamMaster Zapping OBS</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Oswald:wght@500;700&display=swap');
        
        /* IMPORTANTE PARA OBS: Fondo transparente y tamaño fijo */
        html, body { 
            margin: 0; padding: 0; 
            width: 1920px; height: 1080px; 
            background-color: transparent !important;
            overflow: hidden;
        }

        body.dashboard-mode { 
            background-color: #0f172a !important; 
            overflow-y: auto !important;
            height: auto;
        }

        /* WIDGET POSICIONADO EXACTO COMO LA IMAGEN */
        .zapping-anchor {
            position: absolute;
            bottom: 80px;
            left: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 9999;
        }

        /* NOTICIA (Rectángulo arriba) */
        .zap-card {
            width: 400px;
            background: #0a0e1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: -20px; /* Solapamiento con el círculo */
            border-bottom: 6px solid #0047ff;
            transition: opacity 0.5s ease;
        }

        .zap-img { width: 100%; height: 200px; object-fit: cover; }
        .zap-txt { padding: 20px; text-align: center; color: white; }
        .zap-title { font-size: 1.4rem; font-weight: 900; line-height: 1.2; text-transform: uppercase; }

        /* CIRCULO (Reloj y Clima) */
        .zap-circle {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid #eab308; /* Amarillo de la imagen */
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .zap-time { font-family: 'Oswald', sans-serif; font-size: 4rem; color: white; line-height: 1; }
        .zap-st { border-top: 1px solid rgba(255,255,255,0.3); margin-top: 5px; padding-top: 5px; color: white; font-size: 1.5rem; font-weight: bold; }

        /* Dashboard UI */
        .db-panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; margin: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [config, setConfig] = useState({
                id: 'zapping_live',
                visible: true,
                temp: 23.9,
                color: '#0047ff',
                title: 'SELECCIÓN',
                news: 'SCALONI DIO LA LISTA PARA EL AMISTOSO DEL 31 DE MARZO',
                img: 'https://img.asmedia.epimg.net/resizer/v2/LALU7H7Z7NCO7H2Z7NCO7H2Z7N.jpg?auth=888&width=1200'
            });

            const clientRef = useRef(null);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                client.on('connect', () => client.subscribe('streammaster/zap'));
                client.on('message', (t, msg) => {
                    if (m === 'overlay') setConfig(JSON.parse(msg.toString()));
                });
                clientRef.current = client;

                const tInterval = setInterval(() => setTime(new Date()), 1000);
                return () => { client.end(); clearInterval(tInterval); };
            }, []);

            const sync = (c) => {
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('streammaster/zap', JSON.stringify(c), { retain: true });
                }
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                return (
                    <div className="zapping-anchor">
                        <div className="zap-card" style={{borderBottomColor: config.color}}>
                            <img src={config.img} className="zap-img" />
                            <div className="zap-txt">
                                <div style={{color: config.color, fontWeight: 900, fontSize: '0.8rem', marginBottom: '5px'}}>{config.title}</div>
                                <div className="zap-title">{config.news}</div>
                            </div>
                        </div>
                        <div className="zap-circle">
                            <div className="zap-time">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                            <div className="zap-st">ST {config.temp}°</div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-10 max-w-2xl mx-auto text-white">
                    <h1 className="text-2xl font-black mb-6 uppercase">Control Zapping v5</h1>
                    <div className="db-panel space-y-4">
                        <input className="w-full bg-black p-2 rounded" value={config.title} onChange={e=>sync({...config, title: e.target.value.toUpperCase()})} placeholder="Título..." />
                        <textarea className="w-full bg-black p-2 rounded h-20" value={config.news} onChange={e=>sync({...config, news: e.target.value.toUpperCase()})} placeholder="Noticia..." />
                        <input className="w-full bg-black p-2 rounded" value={config.img} onChange={e=>sync({...config, img: e.target.value})} placeholder="URL Imagen..." />
                        <div className="flex gap-4">
                            <input type="number" className="w-20 bg-black p-2 rounded" value={config.temp} onChange={e=>sync({...config, temp: e.target.value})} />
                            <input type="color" className="flex-1 h-10 cursor-pointer" value={config.color} onChange={e=>sync({...config, color: e.target.value})} />
                        </div>
                        <button className="w-full bg-blue-600 p-3 rounded font-bold" onClick={() => sync({...config, visible: !config.visible})}>
                            {config.visible ? 'OCULTAR EN OBS' : 'MOSTRAR EN OBS'}
                        </button>
                    </div>
                    <div className="mt-4 p-4 bg-black rounded text-[10px] text-blue-400 break-all">
                        URL OBS: {window.location.href.split('?')[0]}?mode=overlay
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
