<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamMaster PRO - Zapping Style</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* --- ESTILOS BASE --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap');
        
        html, body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; width: 100%; height: 100%; overflow: hidden; }
        body.dashboard-mode { background-color: #0f172a; color: white; overflow-y: auto !important; }
        body.overlay-mode { background-color: transparent !important; }

        /* --- NUEVO DISEÑO ZAPPING STYLE --- */

        /* CONTENEDOR PRINCIPAL (Abajo Izquierda) */
        .zapping-container {
            position: absolute;
            bottom: 50px;
            left: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 1. TARJETA DE NOTICIA (Rectángulo redondeado arriba) */
        .zap-news-card {
            width: 380px;
            background: rgba(10, 14, 26, 0.95);
            border-radius: 18px;
            overflow: hidden;
            border-bottom: 5px solid; /* Color dinámico */
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: all 0.5s ease-in-out;
            opacity: 0;
            transform: translateY(20px);
        }
        .zap-news-card.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        .zap-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 3px solid rgba(255,255,255,0.1);
        }
        
        .zap-card-body {
            padding: 20px;
            text-align: center;
        }
        
        .zap-card-source {
            font-size: 0.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            /* Color dinámico */
        }
        
        .zap-card-title {
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1.3;
            color: white;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 2. WIDGET CIRCULAR (Reloj y Clima abajo) */
        .zap-clock-widget {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid #eab308; /* Borde amarillo fijo como la imagen */
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 15px 30px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }

        /* Animación interna del círculo */
        .zap-clock-widget::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(from 0deg, transparent, rgba(59, 130, 246, 0.2), transparent 50%);
            animation: rotateBg 6s linear infinite;
            z-index: 1;
        }

        .zap-clock-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .zap-time {
            font-family: 'Oswald', sans-serif;
            font-size: 3.8rem;
            font-weight: 500;
            line-height: 1;
            margin-bottom: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .zap-temp-box {
            border-top: 1px solid rgba(255,255,255,0.3);
            width: 100px;
            padding-top: 2px;
            margin-top: 5px;
        }

        .zap-temp {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .zap-st {
            font-size: 0.9rem;
            font-weight: normal;
            opacity: 0.8;
            margin-right: 4px;
        }

        /* --- ANIMACIONES --- */
        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* UI Dashboard */
        .panel { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; }
        .btn { background: #334155; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn.active { background: #2563eb; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MQTT_CONFIG = { host: 'broker.emqx.io', port: 8084, path: '/mqtt' };

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [status, setStatus] = useState('offline');
            const [time, setTime] = useState(new Date());
            const [cardActive, setCardActive] = useState(true); // Para la animación de fade
            const clientRef = useRef(null);

            // --- ESTADO UNIFICADO ---
            const [data, setData] = useState({
                sessionId: 'stream_zapping_' + Math.floor(Math.random() * 9999),
                visible: true,
                weather: {
                    city: 'Buenos Aires', temp: 23.9,
                },
                newsConfig: {
                    feedTitle: 'ULTIMO MOMENTO', color: '#ef4444', speed: 20, rssUrl: 'https://feeds.elpais.com/mr/elpais/EM/cl/portada.xml',
                    useManualText: false, manualText: 'TEXTO DE PRUEBA MANUAL'
                },
                newsItems: [],
                activeIndex: 0
            });

            const [searchInput, setSearchInput] = useState("");
            const [loading, setLoading] = useState(false);

            // Reloj en tiempo real
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // LÓGICA DE ROTACIÓN AUTOMÁTICA (Cada 20 segundos)
            useEffect(() => {
                if (data.newsItems.length > 0) {
                    const rotationTimer = setInterval(() => {
                        setCardActive(false); // Inicia fade out
                        
                        setTimeout(() => {
                            setData(prev => ({
                                ...prev,
                                activeIndex: (prev.activeIndex + 1) % prev.newsItems.length
                            }));
                            setCardActive(true); // Inicia fade in
                        }, 500); // Tiempo del fade out

                    }, data.newsConfig.speed * 1000); // 20 segundos por defecto

                    return () => clearInterval(rotationTimer);
                }
            }, [data.newsItems, data.newsConfig.speed]);

            // --- CONEXIÓN MQTT ---
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') || 'dashboard';
                const id = params.get('id') || data.sessionId;
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect(`wss://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`);
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe(`stream_zapping/${id}`);
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') setData(JSON.parse(msg.toString()));
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (newData) => {
                setData(newData);
                if (clientRef.current?.connected) {
                    clientRef.current.publish(`stream_zapping/${data.sessionId}`, JSON.stringify(newData), { retain: true });
                }
            };

            // --- LÓGICA CLIMA (Original) ---
            const fetchWeather = async () => {
                if(!searchInput) return;
                setLoading(true);
                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchInput)}&count=1&language=es&format=json`);
                    const geoData = await geoRes.json();
                    if(geoData.results) {
                        const { latitude, longitude, name } = geoData.results[0];
                        const weaRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const weaData = await weaRes.json();
                        
                        const newData = { ...data };
                        newData.weather = { city: name, temp: weaData.current_weather.temperature };
                        sync(newData);
                    }
                } catch (e) { alert("Error clima"); }
                setLoading(false);
            };

            // --- LÓGICA NOTICIAS (Original mejorada para extraer imagen) ---
            const fetchNews = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(data.newsConfig.rssUrl)}`);
                    const json = await res.json();
                    if (json.status === 'ok') {
                        // Limpiamos los ítems para asegurar que tengan imagen o placeholder
                        const processedItems = json.items.map(item => {
                            let img = item.enclosure?.link || item.thumbnail;
                            if (!img) {
                                // Intenta buscar una imagen en la descripción HTML
                                const imgMatch = item.description.match(/<img[^>]+src="([^">]+)"/);
                                img = imgMatch ? imgMatch[1] : 'https://via.placeholder.com/400x200?text=NOTICIA';
                            }
                            return { ...item, image: img };
                        });

                        const newData = { ...data, newsItems: processedItems.slice(0, 10), activeIndex: 0 };
                        sync(newData);
                    }
                } catch (e) { alert("Error RSS"); }
                setLoading(false);
            };

            // --- RENDER OVERLAY (ZAPPING STYLE) ---
            if (mode === 'overlay') {
                if (!data.visible) return null;
                const currentItem = data.newsItems[data.activeIndex];

                return (
                    <div className="w-full h-full relative overflow-hidden">
                        <div className="zapping-container">
                            
                            {/* 1. TARJETA DE NOTICIA (Fade y Slide Up) */}
                            {currentItem && (
                                <div className={`zap-news-card ${cardActive ? 'active' : ''}`} style={{borderBottomColor: data.newsConfig.color}}>
                                    <img src={currentItem.image} className="zap-card-img" onError={(e)=>e.target.style.display='none'}/>
                                    <div className="zap-card-body">
                                        <div className="zap-card-source" style={{color: data.newsConfig.color}}>{data.newsConfig.feedTitle}</div>
                                        <div className="zap-card-title">{currentItem.title.toUpperCase()}</div>
                                    </div>
                                </div>
                            )}

                            {/* 2. WIDGET CIRCULAR (Reloj y Clima) */}
                            <div className="zap-clock-widget">
                                <div className="zap-clock-content">
                                    <div className="zap-time">
                                        {time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}
                                    </div>
                                    <div className="zap-temp-box">
                                        <span className="zap-temp"><span className="zap-st">ST</span>{data.weather.temp}°</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                );
            }

            // --- RENDER DASHBOARD (Actualizado para el nuevo diseño) ---
            return (
                <div className="p-8 max-w-5xl mx-auto space-y-6 dashboard-mode text-white">
                    <header className="flex justify-between items-center border-b border-slate-700 pb-4">
                        <h1 className="text-2xl font-black italic">STREAM<span className="text-blue-500">MASTER</span> PRO <span className="text-xs bg-red-600 px-2 py-1 rounded">ZAPPING</span></h1>
                        <div className="flex items-center gap-4">
                            <span className={status==='online'?'text-green-400':'text-red-400'}>● {status.toUpperCase()}</span>
                            <button className="bg-slate-700 text-white px-4 py-2 rounded font-bold text-xs" 
                                onClick={() => { navigator.clipboard.writeText(`${window.location.href.split('?')[0]}?mode=overlay&id=${data.sessionId}`); alert("Link copiado para OBS"); }}>
                                COPIAR URL OVERLAY
                            </button>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        
                        {/* PANEL CLIMA */}
                        <div className="panel space-y-4">
                            <h2 className="text-blue-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Clima (Abajo-Izquierda)</h2>
                            <div className="flex gap-2">
                                <input className="flex-1" placeholder="Buscar ciudad..." value={searchInput} onChange={e=>setSearchInput(e.target.value)} />
                                <button className="btn active" onClick={fetchWeather}>BUSCAR</button>
                            </div>
                            <div className="p-4 bg-slate-900 rounded flex justify-between items-center">
                                <span>{data.weather.city}</span>
                                <span className="font-bold text-2xl text-yellow-500">{data.weather.temp}°C</span>
                            </div>
                        </div>

                        {/* PANEL NOTICIAS (RSS) */}
                        <div className="panel space-y-4">
                            <h2 className="text-red-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Noticias (Arriba-Izquierda)</h2>
                            <input className="w-full" value={data.newsConfig.rssUrl} onChange={e=>sync({...data, newsConfig: {...data.newsConfig, rssUrl: e.target.value}})} placeholder="URL RSS..." />
                            <div className="flex gap-2">
                                <input placeholder="Título (ej: ULTIMO MOMENTO)" className="flex-1" value={data.newsConfig.feedTitle} onChange={e=>sync({...data, newsConfig: {...data.newsConfig, feedTitle: e.target.value.toUpperCase()}})} />
                                <button className="btn active" onClick={fetchNews}>CARGAR</button>
                            </div>
                        </div>

                        {/* PANEL ESTILO GLOBAL */}
                        <div className="panel md:col-span-2 space-y-4">
                            <h2 className="text-green-400 font-bold uppercase text-sm border-b border-slate-700 pb-2">Configuración Visual</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 items-center">
                                <div className="flex items-center gap-2 bg-slate-900 p-2 rounded border border-slate-700">
                                    <label className="text-xs text-slate-400">Color Acento:</label>
                                    <input type="color" className="h-8 w-12 cursor-pointer bg-transparent" value={data.newsConfig.color} onChange={e=>sync({...data, newsConfig: {...data.newsConfig, color: e.target.value}})} />
                                </div>
                                <div className="flex items-center gap-2 bg-slate-900 p-2 rounded border border-slate-700">
                                    <label className="text-xs text-slate-400">Rotación (seg):</label>
                                    <input type="number" min="5" className="w-20 text-center" value={data.newsConfig.speed} onChange={e=>sync({...data, newsConfig: {...data.newsConfig, speed: parseInt(e.target.value) || 20}})} />
                                </div>
                                <div>
                                    <button className={`w-full py-3 rounded font-bold ${data.visible?'bg-green-600':'bg-red-600'}`} onClick={()=>sync({...data, visible: !data.visible})}>
                                        {data.visible ? 'ON AIR' : 'HIDDEN'}
                                    </button>
                                </div>
                                <p className="text-xs text-slate-500">Noticias cargadas: {data.newsItems.length}</p>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
