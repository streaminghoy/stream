<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Zapping Master V12 - Ultimate Fix</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap');
        
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; overflow: hidden; }
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }

        .zapping-wrapper {
            position: absolute; bottom: 50px; left: 50px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999;
        }

        /* --- FORMATOS DE NOTICIA --- */
        .zap-news-box {
            width: 380px; background: #0a0e1a; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            border-bottom: 6px solid; margin-bottom: -20px; transition: all 0.4s ease;
            position: relative; overflow: hidden;
        }
        
        /* BORDES DINÁMICOS */
        .shape-rect { border-radius: 15px; }
        .shape-capsule { border-radius: 50px; }
        .shape-modern { border-radius: 60px 0 60px 0; }
        .shape-glass { background: rgba(255,255,255,0.1) !important; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); }

        .zap-news-header {
            width: 100%; padding: 10px 0; text-align: center;
            font-weight: 900; font-size: 1.4rem; text-transform: uppercase;
            color: white; position: relative; z-index: 10;
        }

        .zap-news-img-container { width: 100%; height: 180px; background: #111; overflow: hidden; }
        .zap-news-img { width: 100%; height: 100%; object-fit: cover; }
        
        .zap-news-body {
            padding: 15px; background: rgba(0,0,0,0.8);
            min-height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .zap-news-title {
            color: white; text-align: center; font-weight: 800; font-size: 1.1rem;
            line-height: 1.2; text-transform: uppercase;
        }

        /* --- CÍRCULO Y ANIMACIONES --- */
        .zap-circle {
            width: 185px; height: 185px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid; border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 15px 30px rgba(0,0,0,0.6);
            position: relative; z-index: 20;
        }

        .anim-radar::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid currentColor; animation: radar 2s infinite; }
        .anim-giro::before { content: ''; position: absolute; width: 112%; height: 112%; border-radius: 50%; border: 4px dashed currentColor; animation: spin 10s linear infinite; opacity: 0.5; }
        .anim-eco::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 0 0 currentColor; animation: eco 1.5s infinite; }

        @keyframes radar { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes eco { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.6); } 100% { box-shadow: 0 0 0 35px rgba(255,255,255,0); } }

        .zap-time { font-family: 'Oswald', sans-serif; font-size: 4rem; color: white; line-height: 1; z-index: 30; }
        
        .zap-widget-bot { border-top: 1px solid rgba(255,255,255,0.3); width: 120px; height: 45px; display: flex; justify-content: center; align-items: center; margin-top: 5px; z-index: 30; }
        .zap-temp { font-size: 1.8rem; font-weight: bold; color: white; }
        .zap-alert { background: #ef4444; border-radius: 30px; width: 130px; height: 35px; display: flex; justify-content: center; align-items: center; animation: pulse 0.8s infinite; font-weight: 900; font-size: 1.1rem; color: white; }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

        /* Dashboard UI */
        .panel { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .btn-opt { background: #334155; padding: 10px; border-radius: 8px; font-size: 11px; flex: 1; text-align: center; cursor: pointer; border: 2px solid transparent; font-weight: 800; }
        .btn-opt.active { border-color: #2563eb; background: #2563eb; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const clientRef = useRef(null);

            const [config, setConfig] = useState({
                id: 'sm_v12_final',
                visible: true,
                title: 'ULTIMO MOMENTO',
                newsColor: '#0047ff',
                circleColor: '#eab308',
                rssUrl: 'https://streaminghoy.com.ar/rss',
                temp: 23.9,
                activeIndex: 0,
                alertVisible: false,
                alertText: 'AHORA',
                animType: 'anim-giro',
                shapeType: 'shape-rect'
            });

            const [news, setNews] = useState([]);
            const [citySearch, setCitySearch] = useState("Buenos Aires");

            useEffect(() => {
                const t = setInterval(() => setTime(new Date()), 1000);
                const r = setInterval(() => {
                    if (news.length > 0) setConfig(p => ({ ...p, activeIndex: (p.activeIndex + 1) % news.length }));
                }, 15000);
                return () => { clearInterval(t); clearInterval(r); };
            }, [news]);

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('streammaster/v12');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') {
                        const parsed = JSON.parse(msg.toString());
                        setConfig(parsed);
                        if (parsed.newsPayload) setNews(parsed.newsPayload);
                    }
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c, n = null) => {
                const payload = { ...c };
                if (n) payload.newsPayload = n;
                setConfig(c);
                if (clientRef.current?.connected) clientRef.current.publish('streammaster/v12', JSON.stringify(payload), { retain: true });
            };

            const fetchWeather = async () => {
                try {
                    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(citySearch)}&count=1&format=json`);
                    const gData = await geo.json();
                    if(gData.results) {
                        const wea = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${gData.results[0].latitude}&longitude=${gData.results[0].longitude}&current_weather=true`);
                        const wData = await wea.json();
                        sync({ ...config, temp: wData.current_weather.temperature });
                    }
                } catch (e) { alert("Error clima"); }
            };

            const fetchNews = async () => {
                try {
                    // Bypass CORS con AllOrigins + rss2json
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}&t=${Date.now()}`);
                    const json = await res.json();
                    if (json.status === 'ok') {
                        const items = json.items.map(i => ({ 
                            title: i.title, 
                            img: i.enclosure?.link || i.thumbnail || (i.description.match(/src="([^"]+)"/)?.[1]) || '' 
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 }, items);
                    } else {
                        alert("El RSS no respondió. Verifica la URL.");
                    }
                } catch (e) { alert("Error de conexión al RSS."); }
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                const item = news[config.activeIndex] || { title: 'CARGANDO NOTICIAS...', img: '' };
                return (
                    <div className="zapping-wrapper">
                        <div className={`zap-news-box ${config.shapeType}`} style={{borderBottomColor: config.newsColor}}>
                            <div className="zap-news-header" style={{backgroundColor: config.newsColor}}>{config.title}</div>
                            <div className="zap-news-img-container">
                                {item.img && <img src={item.img} className="zap-news-img" />}
                            </div>
                            <div className="zap-news-body">
                                <div className="zap-news-title">{item.title}</div>
                            </div>
                        </div>
                        <div className={`zap-circle ${config.animType}`} style={{borderColor: config.circleColor, color: config.circleColor}}>
                            <div className="zap-time">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                            <div className="zap-widget-bot">
                                {config.alertVisible ? <div className="zap-alert">{config.alertText}</div> : <div className="zap-temp">{config.temp}°</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-4 max-w-5xl mx-auto text-white">
                    <header className="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                        <h1 className="text-2xl font-black italic">ZAPPING MASTER <span className="text-blue-500 text-sm">V12</span></h1>
                        <span className={status==='online'?'text-green-400 font-bold':'text-red-400'}>● {status.toUpperCase()}</span>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="panel space-y-3">
                            <h3 className="text-blue-400 font-bold text-[10px] uppercase">Clima & RSS</h3>
                            <div className="flex gap-2"><input value={citySearch} onChange={e=>setCitySearch(e.target.value)} /><button onClick={fetchWeather} className="bg-blue-600 px-4 rounded font-bold">CLIMA</button></div>
                            <div className="flex gap-2"><input value={config.rssUrl} onChange={e=>sync({...config, rssUrl: e.target.value})} /><button onClick={fetchNews} className="bg-red-600 px-4 rounded font-bold uppercase">Cargar</button></div>
                        </div>

                        <div className="panel space-y-3">
                            <h3 className="text-red-500 font-bold text-[10px] uppercase">Alerta Urgente</h3>
                            <div className="flex gap-2"><input value={config.alertText} onChange={e=>sync({...config, alertText: e.target.value.toUpperCase()})} />
                            <button onClick={()=>sync({...config, alertVisible: !config.alertVisible})} className={`px-4 rounded font-bold ${config.alertVisible?'bg-red-600':'bg-slate-700'}`}>ALERTA</button></div>
                        </div>

                        <div className="panel space-y-3">
                            <h3 className="text-yellow-400 font-bold text-[10px] uppercase">Animación Círculo</h3>
                            <div className="flex gap-2">
                                {['anim-radar', 'anim-giro', 'anim-eco'].map(a => <div key={a} className={`btn-opt ${config.animType===a?'active':''}`} onClick={()=>sync({...config, animType:a})}>{a.split('-')[1].toUpperCase()}</div>)}
                            </div>
                        </div>

                        <div className="panel space-y-3">
                            <h3 className="text-green-400 font-bold text-[10px] uppercase">Forma Noticia</h3>
                            <div className="flex gap-2">
                                {['shape-rect', 'shape-capsule', 'shape-modern', 'shape-glass'].map(s => <div key={s} className={`btn-opt ${config.shapeType===s?'active':''}`} onClick={()=>sync({...config, shapeType:s})}>{s.split('-')[1].toUpperCase()}</div>)}
                            </div>
                        </div>

                        <div className="panel md:col-span-2 grid grid-cols-1 md:grid-cols-4 gap-3 items-center">
                            <div><label className="text-[9px] text-gray-400 uppercase">Título Globo</label><input value={config.title} onChange={e=>sync({...config, title: e.target.value.toUpperCase()})} /></div>
                            <div className="flex gap-2 pt-4"><input type="color" className="h-10 cursor-pointer" value={config.newsColor} onChange={e=>sync({...config, newsColor:e.target.value})}/><input type="color" className="h-10 cursor-pointer" value={config.circleColor} onChange={e=>sync({...config, circleColor:e.target.value})}/></div>
                            <button className={`h-12 rounded mt-4 font-black ${config.visible?'bg-green-600':'bg-red-600'}`} onClick={()=>sync({...config, visible: !config.visible})}>{config.visible?'VISIBLE':'OCULTO'}</button>
                            <button className="bg-slate-700 h-12 rounded mt-4 text-[11px] font-bold" onClick={()=>{navigator.clipboard.writeText(window.location.href.split('?')[0]+'?mode=overlay'); alert('Link Copiado');}}>COPIAR LINK OBS</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
