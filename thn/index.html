<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>StreamMaster Zapping V6 - Unified</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&family=Oswald:wght@500;700&display=swap');
        
        /* OVERLAY: 100% Transparente para OBS */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent !important; }
        
        /* DASHBOARD: Fondo oscuro solo en modo control */
        body.dashboard-mode { background-color: #0f172a !important; color: white; overflow-y: auto !important; }
        body.overlay-mode { overflow: hidden !important; }

        /* --- DISEÑO ZAPPING (Imagen) --- */
        .zapping-wrapper {
            position: absolute; bottom: 60px; left: 60px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 9999;
        }

        /* CUADRADO DE NOTICIA */
        .zap-news-box {
            width: 380px; background: #0a0e1a; border-radius: 20px;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-bottom: 6px solid; /* Color dinámico */
            margin-bottom: -15px; /* Solape con el círculo */
            transition: all 0.5s ease;
        }
        .zap-news-img { width: 100%; height: 190px; object-fit: cover; }
        .zap-news-body { padding: 20px; text-align: center; color: white; }
        .zap-news-label { font-size: 0.8rem; font-weight: 900; margin-bottom: 5px; }
        .zap-news-title { font-size: 1.3rem; font-weight: 900; line-height: 1.2; text-transform: uppercase; }

        /* CÍRCULO (Reloj + Clima) */
        .zap-circle {
            width: 190px; height: 190px;
            background: radial-gradient(circle, #1a2a4a 0%, #050a14 100%);
            border: 8px solid #eab308; /* Amarillo Fijo */
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative; z-index: 10;
        }
        .zap-time { font-family: 'Oswald', sans-serif; font-size: 3.8rem; color: white; line-height: 1; }
        .zap-temp-box { border-top: 1px solid rgba(255,255,255,0.3); margin-top: 5px; padding-top: 3px; color: white; }
        .zap-temp { font-size: 1.6rem; font-weight: bold; }

        /* DASHBOARD UI */
        .panel { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, textarea { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        .btn-blue { background: #2563eb; color: white; padding: 10px; border-radius: 6px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MQTT_CONFIG = { host: 'broker.emqx.io', port: 8084, path: '/mqtt' };

        const App = () => {
            const [mode, setMode] = useState('dashboard');
            const [time, setTime] = useState(new Date());
            const [status, setStatus] = useState('offline');
            const [loading, setLoading] = useState(false);
            const clientRef = useRef(null);

            // --- ESTADO UNIFICADO (Tus variables originales) ---
            const [config, setConfig] = useState({
                id: 'zapping_v6',
                visible: true,
                title: 'SELECCIÓN',
                color: '#0047ff',
                rssUrl: 'https://feeds.elpais.com/mr/elpais/EM/cl/portada.xml',
                city: 'Buenos Aires',
                temp: 23.9,
                activeIndex: 0
            });

            const [news, setNews] = useState([]);
            const [searchInput, setSearchInput] = useState("Buenos Aires");

            // Reloj y Rotación cada 20s
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                const rotator = setInterval(() => {
                    if (news.length > 0) {
                        setConfig(prev => ({ ...prev, activeIndex: (prev.activeIndex + 1) % news.length }));
                    }
                }, 20000);
                return () => { clearInterval(timer); clearInterval(rotator); };
            }, [news]);

            // MQTT
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode') || 'dashboard';
                setMode(m);
                document.body.className = m + '-mode';

                const client = mqtt.connect(`wss://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`);
                client.on('connect', () => {
                    setStatus('online');
                    client.subscribe('streammaster/zapping_v6');
                });
                client.on('message', (t, msg) => {
                    if (m === 'overlay') setConfig(JSON.parse(msg.toString()));
                });
                clientRef.current = client;
                return () => client.end();
            }, []);

            const sync = (c) => {
                setConfig(c);
                if (clientRef.current?.connected) {
                    clientRef.current.publish('streammaster/zapping_v6', JSON.stringify(c), { retain: true });
                }
            };

            // --- TUS FUNCIONES DE CARGA ORIGINALES ---
            const fetchWeather = async () => {
                setLoading(true);
                try {
                    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(searchInput)}&count=1&language=es&format=json`);
                    const geoData = await geo.json();
                    if(geoData.results) {
                        const { latitude, longitude, name } = geoData.results[0];
                        const wea = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
                        const weaData = await wea.json();
                        sync({ ...config, city: name, temp: weaData.current_weather.temperature });
                    }
                } catch (e) { alert("Error clima"); }
                setLoading(false);
            };

            const fetchNews = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config.rssUrl)}`);
                    const json = await res.json();
                    if (json.status === 'ok') {
                        const items = json.items.map(i => ({
                            title: i.title,
                            img: i.enclosure?.link || i.thumbnail || 'https://via.placeholder.com/400x200?text=NEWS'
                        }));
                        setNews(items);
                        sync({ ...config, activeIndex: 0 });
                    }
                } catch (e) { alert("Error RSS"); }
                setLoading(false);
            };

            if (mode === 'overlay') {
                if (!config.visible) return null;
                const currentNews = news[config.activeIndex] || { title: 'Cargando noticias...', img: '' };
                return (
                    <div className="zapping-wrapper">
                        <div className="zap-news-box" style={{borderBottomColor: config.color}}>
                            {currentNews.img && <img src={currentNews.img} className="zap-news-img" />}
                            <div className="zap-news-body">
                                <div className="zap-news-label" style={{color: config.color}}>{config.title}</div>
                                <div className="zap-news-title">{currentNews.title.toUpperCase()}</div>
                            </div>
                        </div>
                        <div className="zap-circle">
                            <div className="zap-time">{time.getHours()}:{time.getMinutes().toString().padStart(2, '0')}</div>
                            <div className="zap-temp-box">
                                <span className="zap-temp">ST {config.temp}°</span>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8 max-w-4xl mx-auto text-white">
                    <header className="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
                        <h1 className="text-2xl font-black uppercase">Zapping <span className="text-blue-500">Master</span> V6</h1>
                        <span className={status==='online'?'text-green-400':'text-red-400'}>● {status.toUpperCase()}</span>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* PANEL CLIMA */}
                        <div className="panel space-y-4">
                            <h3 className="text-blue-400 font-bold uppercase text-xs">Clima Automático</h3>
                            <div className="flex gap-2">
                                <input value={searchInput} onChange={e=>setSearchInput(e.target.value)} placeholder="Ciudad..." />
                                <button className="btn-blue w-24" onClick={fetchWeather}>BUSCAR</button>
                            </div>
                            <div className="p-3 bg-slate-900 rounded flex justify-between">
                                <span>{config.city}</span> <span className="font-bold text-yellow-500">{config.temp}°C</span>
                            </div>
                        </div>

                        {/* PANEL RSS */}
                        <div className="panel space-y-4">
                            <h3 className="text-red-400 font-bold uppercase text-xs">Carga de Notas (RSS)</h3>
                            <input value={config.rssUrl} onChange={e=>sync({...config, rssUrl: e.target.value})} placeholder="URL RSS..." />
                            <button className="btn-blue" onClick={fetchNews}>CARGAR NOTICIAS</button>
                        </div>

                        {/* CONFIG VISUAL */}
                        <div className="panel md:col-span-2 space-y-4">
                            <h3 className="text-green-400 font-bold uppercase text-xs">Ajustes Visuales</h3>
                            <div className="flex flex-wrap gap-4 items-center">
                                <div className="flex-1">
                                    <label className="text-[10px] block text-slate-400">TÍTULO GLOBO</label>
                                    <input value={config.title} onChange={e=>sync({...config, title: e.target.value.toUpperCase()})} />
                                </div>
                                <div className="w-24">
                                    <label className="text-[10px] block text-slate-400">COLOR</label>
                                    <input type="color" className="h-10 cursor-pointer" value={config.color} onChange={e=>sync({...config, color: e.target.value})} />
                                </div>
                                <button className={`flex-1 py-3 rounded font-bold ${config.visible?'bg-green-600':'bg-red-600'}`} onClick={()=>sync({...config, visible: !config.visible})}>
                                    {config.visible ? 'VISIBLE EN OBS' : 'OCULTO EN OBS'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="mt-8 p-4 bg-slate-900 rounded text-[10px] text-blue-400">
                        URL OBS: {window.location.href.split('?')[0]}?mode=overlay
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
