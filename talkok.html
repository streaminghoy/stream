<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamTalk V3 (Matrix IFB)</title>
    
    <!-- LIBRERÍAS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PEER JS (WebRTC P2P) -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #0b0f19; color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            user-select: none; -webkit-user-select: none;
        }

        /* --- LOBBY & SETUP --- */
        .auth-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.8); padding: 30px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; width: 100%; }
        
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 15px; outline: none; text-transform: uppercase; }
        input:focus { border-color: #3b82f6; }
        
        .btn { width: 100%; padding: 15px; font-weight: 900; font-size: 1rem; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; margin-bottom: 10px; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-blue:hover { background: #2563eb; }
        .btn-green { background: #22c55e; color: black; }
        .btn-green:hover { background: #16a34a; }
        .btn-gray { background: #334155; color: white; }

        /* --- DIRECTOR VIEW --- */
        .director-layout { display: flex; flex-direction: column; height: 100vh; background: #0f172a; }
        .top-bar { padding: 15px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        
        select { width: 100%; background: #000; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; outline: none; margin-bottom: 10px; }

        /* MATRIZ DE RUTEO (Botones Destino) */
        .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: #0b0f19; border-bottom: 1px solid #334155; }
        .matrix-btn { 
            padding: 12px 5px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; text-align: center;
            border: 2px solid #334155; background: #1e293b; color: #94a3b8; cursor: pointer; transition: 0.2s;
        }
        .matrix-btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .matrix-btn.all-active { background: #f59e0b; border-color: #fcd34d; color: black; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        /* BOTÓN PTT (Push To Talk / Toggle) */
        .mic-btn-huge { 
            flex: 1; margin: 15px; border-radius: 20px; font-size: 2rem; font-weight: 900; 
            border: 4px solid transparent; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
        }
        .mic-btn-huge.on { background: #ef4444; color: white; box-shadow: 0 0 40px rgba(239, 68, 68, 0.4); border-color: #fca5a5; animation: pulseRed 2s infinite; }
        .mic-btn-huge.off { background: #1e293b; color: #64748b; border-color: #334155; }
        .mic-btn-huge:active { transform: scale(0.98); }

        .crew-list { padding: 15px; background: #0f172a; border-top: 1px solid #334155; height: 220px; overflow-y: auto; }
        .crew-item { background: #1e293b; padding: 10px 15px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: bold; border-left: 4px solid #333; transition: 0.3s; }
        .crew-item.receiving { border-left-color: #ef4444; background: #2a1115; } /* Rojo si le estamos hablando */

        /* --- CREW VIEW (RECEPTOR) --- */
        .crew-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; background: radial-gradient(circle at center, #1e293b 0%, #000 100%); }
        
        .status-ring { width: 160px; height: 160px; border-radius: 50%; border: 8px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 4rem; margin-bottom: 30px; transition: all 0.3s; position: relative; }
        .status-ring.idle { border-color: #3b82f6; color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        .status-ring.active { border-color: #ef4444; box-shadow: 0 0 50px rgba(239, 68, 68, 0.5); color: #ef4444; }
        
        .vu-ring { position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border-radius: 50%; border: 8px solid #ef4444; opacity: 0; transition: opacity 0.1s; pointer-events: none; }

        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const PEER_CONFIG = { config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] } };

        // Destinos predefinidos para la Matriz
        const DEFAULT_ROLES = ['CAM 1', 'CAM 2', 'CAM 3', 'CAM 4', 'SONIDO', 'PISO'];

        // --- COMPONENTE DIRECTOR ---
        const DirectorView = ({ roomName }) => {
            const [status, setStatus] = useState('Listo para iniciar');
            const [isSystemActive, setIsSystemActive] = useState(false);
            const [micMuted, setMicMuted] = useState(true); 
            const [crewList, setCrewList] = useState([]); // { id, name, call, track }
            
            // Matriz de Ruteo
            const [targets, setTargets] = useState(['TODOS']); // A quién le hablamos
            const [dynamicRoles, setDynamicRoles] = useState([]); // Si entra alguien con nombre raro
            
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            
            const peer = useRef(null);
            const baseStream = useRef(null);
            const activePeers = useRef({}); // Diccionario de conexiones

            // 1. Obtener micrófonos
            useEffect(() => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then((tempStream) => {
                    tempStream.getTracks().forEach(t => t.stop());
                    navigator.mediaDevices.enumerateDevices().then(devs => {
                        const audios = devs.filter(d => d.kind === 'audioinput');
                        setAudioDevices(audios);
                        if (audios.length > 0) setSelectedAudio(audios[0].deviceId);
                    });
                }).catch(e => setStatus('Error: Permiso de micrófono denegado.'));
                
                return () => {
                    if (peer.current) peer.current.destroy();
                    if (baseStream.current) baseStream.current.getTracks().forEach(t => t.stop());
                };
            }, []);

            // Lógica Central de Ruteo (Matrix Logic)
            const applyAudioRouting = () => {
                const currentTargets = targets;
                const isMasterMuted = micMuted;

                Object.values(activePeers.current).forEach(p => {
                    if (p.track) {
                        const isTargeted = currentTargets.includes('TODOS') || currentTargets.includes(p.role);
                        // Habilitar pista solo si el master NO está muteado Y es un target válido
                        p.track.enabled = !isMasterMuted && isTargeted;
                    }
                });
                
                // Forzar re-render para mostrar colores en la lista visual
                setCrewList(Object.values(activePeers.current).map(p => ({
                    id: p.id,
                    name: p.role,
                    receiving: !isMasterMuted && (currentTargets.includes('TODOS') || currentTargets.includes(p.role))
                })));
            };

            // Re-aplicar ruteo si cambian los targets o el Mute principal
            useEffect(() => {
                applyAudioRouting();
            }, [targets, micMuted]);

            // 2. Iniciar Servidor Director
            const startDirector = async () => {
                if (!selectedAudio) return;
                try {
                    setStatus('Conectando dispositivos...');
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { deviceId: { exact: selectedAudio }, echoCancellation: true, noiseSuppression: true } 
                    });
                    
                    baseStream.current = stream;
                    setIsSystemActive(true);

                    const directorId = `st_dir_${roomName.replace(/\s+/g, '').toUpperCase()}`;
                    
                    if (peer.current) peer.current.destroy();
                    peer.current = new Peer(directorId, PEER_CONFIG);

                    peer.current.on('open', () => {
                        setStatus('Matriz Activa. Esperando conexiones...');
                    });

                    // Cuando un miembro del Crew se conecta (Ping Data)
                    peer.current.on('connection', (conn) => {
                        const role = conn.metadata?.role?.toUpperCase() || 'INVITADO';
                        
                        // Agregar a roles dinámicos si no existe
                        if (!DEFAULT_ROLES.includes(role) && role !== 'TODOS') {
                            setDynamicRoles(prev => prev.includes(role) ? prev : [...prev, role]);
                        }

                        conn.on('open', () => {
                            if (!baseStream.current) return;
                            
                            // MAGIA: Clonar la pista de audio para ESTE usuario específico
                            const clonedTrack = baseStream.current.getAudioTracks()[0].clone();
                            clonedTrack.enabled = false; // Arranca en silencio por seguridad
                            const customStream = new MediaStream([clonedTrack]);

                            // Llamar al usuario con su propia pista aislada
                            const call = peer.current.call(conn.peer, customStream);
                            
                            activePeers.current[conn.peer] = { id: conn.peer, conn, call, track: clonedTrack, role };
                            applyAudioRouting(); // Aplicar reglas actuales
                            
                            call.on('close', () => removePeer(conn.peer));
                            call.on('error', () => removePeer(conn.peer));
                        });
                        
                        conn.on('close', () => removePeer(conn.peer));
                    });

                    peer.current.on('error', (err) => {
                        if (err.type === 'unavailable-id') setStatus('Error: Reclamando sala, espera 15s e intenta de nuevo.');
                        else setStatus('Error de conexión.');
                    });

                } catch(e) {
                    setStatus('Error al capturar micrófono.');
                }
            };

            const removePeer = (id) => {
                if (activePeers.current[id]) {
                    if (activePeers.current[id].track) activePeers.current[id].track.stop();
                    delete activePeers.current[id];
                    applyAudioRouting();
                }
            };

            const toggleTarget = (t) => {
                if (t === 'TODOS') {
                    setTargets(['TODOS']);
                } else {
                    let newTargets = targets.filter(x => x !== 'TODOS');
                    if (newTargets.includes(t)) {
                        newTargets = newTargets.filter(x => x !== t);
                        if (newTargets.length === 0) newTargets = ['TODOS']; // Fallback
                    } else {
                        newTargets.push(t);
                    }
                    setTargets(newTargets);
                }
            };

            const copyLink = () => {
                const url = `${window.location.href.split('?')[0]}?mode=crew&room=${roomName}`;
                navigator.clipboard.writeText(url);
                alert("Link copiado. Envíalo al equipo por WhatsApp.");
            };

            const allMatrixRoles = [...DEFAULT_ROLES, ...dynamicRoles];

            if (!isSystemActive) {
                return (
                    <div className="auth-container">
                        <div className="glass-box">
                            <h2 className="text-2xl font-black mb-2 text-blue-400">PANEL DE DIRECTOR</h2>
                            <p className="mb-4 text-sm text-gray-400">Selecciona el micrófono de tu computadora para hablarle al equipo.</p>
                            
                            <select value={selectedAudio} onChange={(e) => setSelectedAudio(e.target.value)}>
                                {audioDevices.length === 0 && <option>Buscando audios...</option>}
                                {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Micrófono'}</option>)}
                            </select>

                            <button className="btn btn-blue" onClick={startDirector}>INICIAR MATRIZ IFB</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="director-layout">
                    <div className="top-bar">
                        <div>
                            <div className="font-black text-xl text-blue-400">STREAM<span className="text-white">TALK</span> V3</div>
                            <div className="text-xs text-gray-400 font-bold tracking-widest">{status}</div>
                        </div>
                        <button className="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded text-xs font-bold" onClick={copyLink}>
                            🔗 COPIAR LINK
                        </button>
                    </div>

                    {/* MATRIZ DE RUTEO */}
                    <div className="px-4 pt-3 pb-1">
                        <label className="text-[10px] font-bold text-gray-500">DESTINOS DE AUDIO (RUTEO)</label>
                    </div>
                    <div className="matrix-grid">
                        <button 
                            className={`matrix-btn ${targets.includes('TODOS') ? 'all-active' : ''}`}
                            onClick={() => toggleTarget('TODOS')}
                        >
                            📢 TODOS
                        </button>
                        
                        {allMatrixRoles.map(role => (
                            <button 
                                key={role}
                                className={`matrix-btn ${targets.includes(role) ? 'active' : ''}`}
                                onClick={() => toggleTarget(role)}
                            >
                                {role}
                            </button>
                        ))}
                    </div>

                    {/* BOTÓN PTT CENTRAL */}
                    <button 
                        className={`mic-btn-huge ${micMuted ? 'off' : 'on'}`}
                        onClick={() => setMicMuted(!micMuted)}
                    >
                        <span>{micMuted ? '🎙️ SILENCIO' : '🔴 HABLANDO'}</span>
                        <span className="text-sm font-normal opacity-70">
                            {micMuted 
                                ? 'Toca para hablar a los destinos seleccionados' 
                                : `Enviando audio a: ${targets.join(', ')}`}
                        </span>
                    </button>

                    {/* LISTA DE RECEPTORES */}
                    <div className="crew-list">
                        <div className="text-[10px] font-bold text-gray-500 mb-2 uppercase">Conectados en sala ({crewList.length})</div>
                        {crewList.length === 0 && <div className="text-sm text-gray-600 italic">Esperando que el equipo se una...</div>}
                        
                        {crewList.map(crew => (
                            <div key={crew.id} className={`crew-item ${crew.receiving ? 'receiving' : ''}`}>
                                <span>📱 {crew.name}</span>
                                <span className={crew.receiving ? "text-red-400 text-xs animate-pulse" : "text-gray-500 text-xs"}>
                                    {crew.receiving ? 'Escuchando' : 'En espera'}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- COMPONENTE CREW (RECEPTOR) ---
        const CrewView = ({ roomName, crewName }) => {
            const [joined, setJoined] = useState(false);
            const [status, setStatus] = useState('Esperando inicio...');
            const [receiving, setReceiving] = useState(false);
            const [vuLevel, setVuLevel] = useState(0);
            
            const peer = useRef(null);
            const audioRef = useRef(null);
            const audioCtxRef = useRef(null);
            const animRef = useRef(null);
            const reconnectTimer = useRef(null);
            const wakeLockRef = useRef(null);

            // --- SISTEMA WAKE LOCK (MANTENER PANTALLA ENCENDIDA) ---
            useEffect(() => {
                if (!joined) return;

                const requestWakeLock = async () => {
                    if ('wakeLock' in navigator) {
                        try {
                            wakeLockRef.current = await navigator.wakeLock.request('screen');
                            console.log('Pantalla mantenida activa.');
                        } catch (err) {
                            console.log('No se pudo bloquear la pantalla:', err);
                        }
                    }
                };

                // Solicitar inicialmente
                requestWakeLock();

                // Volver a solicitar si el usuario minimiza y vuelve al navegador
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) {
                        wakeLockRef.current.release().catch(() => {});
                        wakeLockRef.current = null;
                    }
                };
            }, [joined]);


            useEffect(() => {
                if (!joined) return;

                const connectToDirector = () => {
                    setStatus('Conectando al Director...');
                    
                    if (peer.current) peer.current.destroy();
                    peer.current = new Peer(undefined, PEER_CONFIG);

                    peer.current.on('open', (id) => {
                        const directorId = `st_dir_${roomName.replace(/\s+/g, '').toUpperCase()}`;
                        
                        // Llamar a la puerta pasando el ROL
                        const conn = peer.current.connect(directorId, { metadata: { role: crewName } });
                        
                        conn.on('open', () => {
                            setStatus('Conectado. Esperando ruteo de audio...');
                        });

                        conn.on('error', () => scheduleReconnect('Error de datos.'));
                        conn.on('close', () => scheduleReconnect('Director desconectado.'));
                    });

                    // Recibir la llamada (Pista de audio clonada exclusiva)
                    peer.current.on('call', (call) => {
                        call.answer(); 
                        
                        call.on('stream', (remoteStream) => {
                            setStatus('CONECTADO AL ESTUDIO');
                            setReceiving(true);
                            
                            if (audioRef.current) {
                                audioRef.current.srcObject = remoteStream;
                                // Forzar play con volumen alto
                                audioRef.current.volume = 1;
                                audioRef.current.play().catch(e => console.error("Autoplay", e));
                            }

                            // VU METER VISUAL
                            try {
                                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                                audioCtxRef.current = audioCtx;
                                const analyser = audioCtx.createAnalyser();
                                const source = audioCtx.createMediaStreamSource(remoteStream);
                                source.connect(analyser);
                                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                                
                                const updateLevel = () => {
                                    analyser.getByteFrequencyData(dataArray);
                                    let sum = 0;
                                    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                                    const avg = sum / dataArray.length;
                                    setVuLevel(avg);
                                    animRef.current = requestAnimationFrame(updateLevel);
                                };
                                updateLevel();
                            } catch(e) {}
                        });

                        call.on('close', () => { setReceiving(false); scheduleReconnect('Llamada finalizada.'); });
                    });

                    peer.current.on('error', (err) => {
                        scheduleReconnect('Buscando señal del Director...');
                    });
                };

                const scheduleReconnect = (msg) => {
                    setStatus(msg);
                    setReceiving(false);
                    if (reconnectTimer.current) clearTimeout(reconnectTimer.current);
                    // Reintentar cada 3 segundos si se cae
                    reconnectTimer.current = setTimeout(connectToDirector, 3000);
                };

                connectToDirector();

                return () => { 
                    if(peer.current) peer.current.destroy(); 
                    if(reconnectTimer.current) clearTimeout(reconnectTimer.current);
                    if(animRef.current) cancelAnimationFrame(animRef.current);
                    if(audioCtxRef.current) audioCtxRef.current.close();
                };
            }, [joined, roomName, crewName]);

            // PANTALLA 2: OBLIGAR AL USUARIO A HACER CLIC PARA DESBLOQUEAR AUDIO
            if (!joined) {
                return (
                    <div className="auth-container">
                        <div className="glass-box animate__animated animate__fadeIn">
                            <h2 className="text-2xl font-black mb-2 text-blue-400">STREAM<span className="text-white">TALK</span></h2>
                            <p className="mb-4 text-sm text-gray-400">Receptor de Instrucciones (IFB)</p>
                            
                            <div className="bg-slate-800 p-4 rounded-lg mb-6 text-left">
                                <p className="text-xs font-bold text-gray-300 mb-2">👤 ROL: <span className="text-white">{crewName.toUpperCase()}</span></p>
                                <p className="text-xs font-bold text-gray-300">🏢 SALA: <span className="text-white">{roomName.toUpperCase()}</span></p>
                            </div>

                            <div className="border border-yellow-600 bg-yellow-900/30 p-4 rounded-lg mb-6">
                                <p className="text-sm text-yellow-400 font-bold mb-1">⚠️ ATENCIÓN</p>
                                <p className="text-xs text-yellow-200">1. Sube el volumen de tu celular al máximo.<br/>2. Ponte los auriculares.<br/>3. Presiona el botón verde.</p>
                            </div>
                            
                            <button className="btn btn-green shadow-lg" onClick={() => setJoined(true)}>
                                🎧 CONECTAR Y ESCUCHAR
                            </button>
                        </div>
                    </div>
                );
            }

            // PANTALLA 3: RECEPCIÓN ACTIVA
            // Si el VU es mayor a 10, consideramos que el director está hablando activamente
            const isDirectorTalking = vuLevel > 10;

            return (
                <div className="crew-layout">
                    <h2 className="text-xl font-black text-gray-400 mb-6 tracking-widest">{crewName.toUpperCase()}</h2>

                    <div className={`status-ring ${isDirectorTalking ? 'active' : 'idle'}`}>
                        {isDirectorTalking ? '🗣️' : '🎧'}
                        {/* Anillo de VU Meter que brilla con la voz */}
                        {isDirectorTalking && <div className="vu-ring" style={{ opacity: Math.min(vuLevel / 50, 1), transform: `scale(${1 + (vuLevel/300)})` }}></div>}
                    </div>

                    <div className="text-lg font-bold mb-2 text-white h-8">{status}</div>
                    
                    <div className="h-4">
                        {isDirectorTalking ? (
                            <p className="text-sm font-bold text-red-400 animate-pulse">DIRECTOR HABLANDO...</p>
                        ) : (
                            receiving && <p className="text-xs font-bold text-blue-400">Canal abierto y en silencio</p>
                        )}
                    </div>
                    
                    <div className="mt-8 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        <span className="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Pantalla y Audio Activos de Fondo</span>
                    </div>

                    {/* Audio Tag Oculto de Forma Segura (Bypass Safari Restrictions) */}
                    <audio ref={audioRef} autoPlay playsInline style={{ position: 'absolute', width: 1, height: 1, opacity: 0, pointerEvents: 'none' }}></audio>
                </div>
            );
        };

        // --- LOBBY Y ENRUTADOR ---
        const App = () => {
            const [mode, setMode] = useState('lobby'); 
            const [roomName, setRoomName] = useState('');
            
            // Estado intermedio para manejar inputs correctamente sin auto-submit
            const [tempInput, setTempInput] = useState('');
            const [crewName, setCrewName] = useState(''); 

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const m = params.get('mode');
                const r = params.get('room');
                
                if (r) setRoomName(r);
                else setRoomName(Math.random().toString(36).substring(2, 6).toUpperCase());
                
                if (m === 'director') setMode('director');
                else if (m === 'crew') setMode('crew-setup'); // Vamos al paso de pedir nombre
            }, []);

            const enterAsDirector = () => {
                if (!roomName.trim()) return alert("Ingresa un nombre de sala");
                const url = new URL(window.location);
                url.searchParams.set('mode', 'director');
                url.searchParams.set('room', roomName);
                window.location.href = url.toString();
            };

            const submitCrewName = (name) => {
                if (!name.trim()) return alert("Debes ingresar un nombre o rol.");
                setCrewName(name.trim().toUpperCase());
                setMode('crew-active');
            };

            // Ruteo Vistas
            if (mode === 'director') return <DirectorView roomName={roomName} />;
            if (mode === 'crew-active') return <CrewView roomName={roomName} crewName={crewName} />;

            // PANTALLA 1B: PEDIR NOMBRE AL INVITADO (Fix Issue 1)
            if (mode === 'crew-setup') {
                return (
                    <div className="auth-container">
                        <div className="glass-box animate__animated animate__zoomIn">
                            <h1 className="text-2xl font-black mb-1">IDENTIFICACIÓN</h1>
                            <p className="text-xs text-gray-400 mb-6">Sala: {roomName}</p>
                            
                            <label className="block text-left text-xs font-bold text-gray-500 mb-2">ELIGE TU PUESTO O ESCRIBE TU NOMBRE</label>
                            
                            {/* Opciones rápidas */}
                            <div className="grid grid-cols-3 gap-2 mb-4">
                                {['CAM 1', 'CAM 2', 'CAM 3', 'SONIDO', 'PISO', 'PROD'].map(preset => (
                                    <button key={preset} className="bg-slate-700 text-xs font-bold py-2 rounded text-white hover:bg-blue-600" onClick={() => submitCrewName(preset)}>{preset}</button>
                                ))}
                            </div>

                            <div className="w-full border-t border-gray-700 my-4"></div>

                            <input 
                                value={tempInput} 
                                onChange={(e) => setTempInput(e.target.value.toUpperCase())} 
                                placeholder="OTRO NOMBRE..." 
                                onKeyPress={(e) => e.key === 'Enter' && submitCrewName(tempInput)}
                            />
                            
                            <button className="btn btn-blue" onClick={() => submitCrewName(tempInput)}>
                                CONTINUAR
                            </button>
                        </div>
                    </div>
                );
            }

            // PANTALLA 1A: LOBBY PRINCIPAL
            return (
                <div className="auth-container">
                    <div className="glass-box animate__animated animate__zoomIn">
                        <h1 className="text-3xl font-black mb-2 text-white">STREAM<span className="text-blue-500">TALK</span> V3</h1>
                        <p className="text-gray-400 text-sm mb-8 font-bold">MATRIX IFB EDITION</p>

                        <label className="block text-left text-xs font-bold text-gray-500 mb-2">CÓDIGO DE PRODUCCIÓN</label>
                        <input 
                            value={roomName} 
                            onChange={(e) => setRoomName(e.target.value.toUpperCase())}
                            placeholder="EJ: SHOW-1"
                        />

                        <button className="btn btn-blue" onClick={enterAsDirector}>ENTRAR COMO DIRECTOR</button>
                        <button className="btn btn-gray" onClick={() => setMode('crew-setup')}>ENTRAR COMO EQUIPO</button>
                        
                        <p className="text-[10px] text-gray-500 mt-6 text-left leading-tight">
                            * Ruteo de audio individual. Habla a cámaras específicas o a todo el equipo desde un solo panel.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
