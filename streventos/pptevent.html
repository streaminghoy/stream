<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCall - Simple</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { background-color: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.95); padding: 40px; border-radius: 16px; max-width: 450px; width: 100%; border: 1px solid #334155; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #3b82f6; color: white; font-size: 1rem; margin-bottom: 10px; transition: all 0.2s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-purple { background: #8b5cf6; }
        .btn-red { background: #ef4444; }
        
        .director-layout { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .director-header { background: #0f172a; border-bottom: 1px solid #334155; padding: 15px; text-align: center; }
        .grid-container { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 10px; padding: 10px; overflow-y: auto; }
        
        .slot-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .slot-card.live { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.3); }
        .slot-card.prev { border-color: #eab308; }
        
        .slot-video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; min-height: 250px; }
        .slot-video { width: 100%; height: 100%; object-fit: contain; }
        .slot-status { position: absolute; color: #64748b; text-align: center; }
        
        .source-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 10; border: 1px solid; }
        .source-badge.screen { color: #8b5cf6; border-color: #8b5cf6; }
        .source-badge.camera { color: #3b82f6; border-color: #3b82f6; }
        
        .controls { padding: 10px; display: flex; gap: 5px; background: #0f172a; }
        .t-btn { flex: 1; padding: 10px; font-size: 0.8rem; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; background: #1e293b; color: #94a3b8; }
        .t-btn:hover { background: #334155; }
        .t-btn.idle { color: white; border: 1px solid #64748b; }
        .t-btn.prev { background: rgba(234, 179, 8, 0.2); color: #eab308; border: 1px solid #eab308; }
        .t-btn.live { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        
        .presenter-layout { width: 100vw; height: 100vh; position: relative; background: #000; overflow: hidden; }
        .presenter-video { width: 100%; height: 100%; object-fit: contain; }
        
        .tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 15px solid transparent; pointer-events: none; z-index: 50; box-sizing: border-box; transition: all 0.3s; }
        .tally-border.live { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.5); }
        .tally-border.prev { border-color: #eab308; box-shadow: inset 0 0 50px rgba(234,179,8,0.5); }
        
        .status-badge { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; z-index: 100; }
        .status-badge.live { background: #ef4444; color: white; }
        .status-badge.prev { background: #eab308; color: black; }
        
        .presenter-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 12px; display: flex; gap: 10px; z-index: 100; border: 1px solid #334155; }
        .control-btn { width: 50px; height: 50px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 1.2rem; cursor: pointer; }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.off { background: #ef4444; }
        .control-btn.switch { width: auto; padding: 0 15px; font-size: 0.85rem; font-weight: bold; }
        
        .obs-layout { width: 100vw; height: 100vh; background: #000; position: relative; }
        .obs-video { width: 100%; height: 100%; object-fit: contain; }
        .obs-waiting { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #64748b; font-size: 1.2rem; text-align: center; }
        
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .mode-btn { background: rgba(51, 65, 85, 0.5); border: 2px solid #334155; border-radius: 8px; padding: 20px; cursor: pointer; text-align: center; }
        .mode-btn:hover { border-color: #8b5cf6; }
        .mode-btn.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); }
        .mode-icon { font-size: 2rem; margin-bottom: 8px; color: #8b5cf6; }
        
        .error-box { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 0.8rem; }
        .success-box { background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e; color: #22c55e; padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const PEER_CONFIG = { 
            config: { 
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ]
            }
        };
        
        const Video = ({ stream, muted, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && stream) {
                    ref.current.srcObject = stream;
                    ref.current.play().catch(() => {});
                }
            }, [stream]);
            return <video ref={ref} className={className} autoPlay playsInline muted={muted} />;
        };

        // ==========================================
        // DIRECTOR - Solo recibe, sin retorno
        // ==========================================
        const DirectorView = ({ roomName }) => {
            const [slots, setSlots] = useState({ 
                1: { stream: null, tally: 'idle', source: 'camera' }, 
                2: { stream: null, tally: 'idle', source: 'camera' }, 
                3: { stream: null, tally: 'idle', source: 'camera' }
            });
            
            const peer = useRef(null);

            useEffect(() => {
                const myId = `dir_${roomName}`;
                console.log('Director ID:', myId);
                
                peer.current = new Peer(myId, PEER_CONFIG);
                
                peer.current.on('open', () => {
                    console.log('✅ Director listo');
                });
                
                peer.current.on('error', (err) => {
                    console.error('Error:', err.type);
                    if (err.type === 'unavailable-id') {
                        alert('Error: ID ocupado. Recarga la página.');
                    }
                });
                
                // Escuchar llamadas entrantes
                peer.current.on('call', call => {
                    const peerId = call.peer;
                    console.log('Llamada de:', peerId);
                    
                    // Extraer slot del ID (pres_EVENTO_1_12345 -> slot 1)
                    const match = peerId.match(/pres_${roomName}_(\d+)_/);
                    if (!match) {
                        console.log('ID no reconocido:', peerId);
                        return;
                    }
                    
                    const slotId = match[1];
                    
                    call.answer(); // Aceptar sin enviar nada (solo recibir)
                    
                    call.on('stream', stream => {
                        console.log(`✅ Slot ${slotId} conectado`);
                        setSlots(prev => ({
                            ...prev, 
                            [slotId]: { ...prev[slotId], stream }
                        }));
                    });
                    
                    call.on('close', () => {
                        console.log(`❌ Slot ${slotId} desconectado`);
                        setSlots(prev => ({
                            ...prev, 
                            [slotId]: { ...prev[slotId], stream: null }
                        }));
                    });
                });

                return () => peer.current?.destroy();
            }, [roomName]);

            const setTally = (id, state) => {
                setSlots(prev => ({...prev, [id]: {...prev[id], tally: state}}));
                // Notificar al presentador (usando peer.connect para datos simples)
                const conn = peer.current?.connections[`pres_${roomName}_${id}`]?.[0];
                if (conn && conn.send) {
                    conn.send({ tally: state });
                }
            };

            return (
                <div className="director-layout">
                    <div className="director-header">
                        <h2 style={{color: '#8b5cf6', margin: 0}}><i className="fas fa-th-large"></i> {roomName}</h2>
                        <small style={{color: '#64748b'}}>Esperando laptops...</small>
                    </div>

                    <div className="grid-container">
                        {[1,2,3].map(id => (
                            <div key={id} className={`slot-card ${slots[id].tally}`}>
                                <div className="slot-video-area">
                                    {slots[id].stream ? (
                                        <>
                                            <div className={`source-badge ${slots[id].source}`}>
                                                {slots[id].source === 'screen' ? '📺 PANTALLA' : '📹 CÁMARA'}
                                            </div>
                                            <Video stream={slots[id].stream} muted={false} className="slot-video" />
                                        </>
                                    ) : (
                                        <div className="slot-status">
                                            <i className="fas fa-laptop" style={{fontSize: '3rem', marginBottom: '10px', opacity: 0.3}}></i>
                                            <div>SLOT {id}</div>
                                            <small style={{fontSize: '0.7rem'}}>Esperando pres_{roomName}_{id}_...</small>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="controls">
                                    <button className={`t-btn ${slots[id].tally === 'idle' ? 'idle' : ''}`} onClick={()=>setTally(id,'idle')}>SAFE</button>
                                    <button className={`t-btn ${slots[id].tally === 'prev' ? 'prev' : ''}`} onClick={()=>setTally(id,'prev')}>PREV</button>
                                    <button className={`t-btn ${slots[id].tally === 'live' ? 'live' : ''}`} onClick={()=>setTally(id,'live')}>LIVE</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // PRESENTER - Con ID único (evita unavailable-id)
        // ==========================================
        const PresenterView = ({ roomName, slotId }) => {
            const [step, setStep] = useState('select'); // select, connecting, live, error
            const [sourceType, setSourceType] = useState('screen');
            const [tally, setTally] = useState('idle');
            const [error, setError] = useState('');
            const [micMuted, setMicMuted] = useState(false);
            
            const peer = useRef(null);
            const localStream = useRef(null);
            const connRef = useRef(null);

            // Generar ID único con timestamp para evitar "unavailable-id"
            const myId = `pres_${roomName}_${slotId}_${Date.now()}`;

            useEffect(() => {
                if (step === 'live') {
                    startConnection();
                }
                return () => {
                    localStream.current?.getTracks().forEach(t => t.stop());
                    peer.current?.destroy();
                };
            }, [step]);

            const startConnection = async () => {
                try {
                    setError('');
                    
                    // 1. Obtener stream
                    let stream;
                    if (sourceType === 'screen') {
                        const screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                        // Mezclar con micrófono
                        const mic = await navigator.mediaDevices.getUserMedia({audio: true});
                        const ctx = new AudioContext();
                        const dest = ctx.createMediaStreamDestination();
                        
                        if (screenStream.getAudioTracks().length > 0) {
                            const sys = ctx.createMediaStreamSource(screenStream);
                            sys.connect(dest);
                        }
                        
                        const m = ctx.createMediaStreamSource(mic);
                        const g = ctx.createGain();
                        g.gain.value = 0.8;
                        m.connect(g);
                        g.connect(dest);
                        
                        stream = new MediaStream([
                            screenStream.getVideoTracks()[0],
                            ...dest.stream.getAudioTracks()
                        ]);
                        
                        screenStream.getVideoTracks()[0].onended = () => {
                            setSourceType('camera');
                            startConnection(); // Reiniciar con cámara
                        };
                    } else {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { width: 1280, height: 720 },
                            audio: true
                        });
                    }
                    
                    localStream.current = stream;
                    
                    // 2. Conectar PeerJS
                    const dirId = `dir_${roomName}`;
                    
                    peer.current = new Peer(myId, PEER_CONFIG);
                    
                    peer.current.on('open', () => {
                        console.log('Conectado como:', myId);
                        
                        // Llamar al Director
                        const call = peer.current.call(dirId, stream);
                        if (!call) {
                            setError('No se pudo llamar al Director. ¿Está abierto?');
                            return;
                        }
                        
                        // También conectar datos para tally
                        const conn = peer.current.connect(dirId);
                        conn.on('data', (data) => {
                            if (data.tally) setTally(data.tally);
                        });
                        
                        // Llamar a OBS (si existe)
                        setTimeout(() => {
                            const obsId = `obs_${roomName}_${slotId}`;
                            peer.current.call(obsId, stream);
                        }, 500);
                    });
                    
                    peer.current.on('error', (err) => {
                        console.error(err);
                        if (err.type === 'unavailable-id') {
                            setError('ID ocupado. Recarga e intenta de nuevo.');
                        } else if (err.type === 'peer-unavailable') {
                            setError('Director no encontrado. Abre el Director primero.');
                        } else {
                            setError('Error de red: ' + err.type);
                        }
                    });
                    
                } catch(e) {
                    console.error(e);
                    setError('Error: ' + e.message);
                }
            };

            const toggleMic = () => {
                if (localStream.current) {
                    localStream.current.getAudioTracks().forEach(t => t.enabled = !t.enabled);
                    setMicMuted(!micMuted);
                }
            };

            if (step === 'select') {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <h2 style={{color: '#8b5cf6'}}><i className="fas fa-laptop"></i> Laptop {slotId}</h2>
                            <p style={{color: '#64748b', fontSize: '0.8rem', marginBottom: '20px'}}>
                                ID: {myId}
                            </p>
                            
                            <div className="mode-selector">
                                <div className={`mode-btn ${sourceType === 'screen' ? 'selected' : ''}`} onClick={() => setSourceType('screen')}>
                                    <div className="mode-icon"><i className="fas fa-desktop"></i></div>
                                    <div>Presentación</div>
                                </div>
                                <div className={`mode-btn ${sourceType === 'camera' ? 'selected' : ''}`} onClick={() => setSourceType('camera')}>
                                    <div className="mode-icon"><i className="fas fa-video"></i></div>
                                    <div>Cámara Web</div>
                                </div>
                            </div>
                            
                            {error && <div className="error-box"><i className="fas fa-exclamation-circle"></i> {error}</div>}
                            
                            <button className="btn btn-purple" onClick={() => setStep('live')}>
                                <i className="fas fa-play"></i> Conectar Ahora
                            </button>
                            
                            <div style={{marginTop: '15px', fontSize: '0.75rem', color: '#64748b'}}>
                                Abre primero el Director en otra ventana<br/>
                                Luego presiona "Conectar"
                            </div>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <div className="error-box" style={{marginBottom: '20px'}}>
                                <i className="fas fa-exclamation-triangle"></i> {error}
                            </div>
                            <button className="btn" onClick={() => window.location.reload()}>
                                <i className="fas fa-redo"></i> Reintentar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="presenter-layout">
                    <div className={`tally-border ${tally}`}></div>
                    
                    {tally !== 'idle' && (
                        <div className={`status-badge ${tally}`}>
                            {tally === 'live' ? '● EN VIVO' : '◐ PREV'}
                        </div>
                    )}
                    
                    <div style={{position: 'absolute', top: '20px', left: '20px', background: 'rgba(0,0,0,0.7)', padding: '8px 12px', borderRadius: '6px', fontSize: '0.75rem', zIndex: 100}}>
                        <i className={sourceType === 'screen' ? 'fas fa-desktop' : 'fas fa-video'} style={{marginRight: '5px'}}></i>
                        {sourceType === 'screen' ? 'PANTALLA' : 'CÁMARA WEB'}
                    </div>
                    
                    {localStream.current && (
                        <Video stream={localStream.current} muted={true} className="presenter-video" 
                            style={{objectFit: sourceType === 'screen' ? 'contain' : 'cover'}} />
                    )}
                    
                    <div className="presenter-controls">
                        <button className={`control-btn ${micMuted ? 'off' : ''}`} onClick={toggleMic}>
                            <i className={micMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone'}></i>
                        </button>
                        
                        <button className="control-btn switch" onClick={() => window.location.reload()}>
                            <i className="fas fa-exchange-alt"></i> Cambiar Modo
                        </button>
                        
                        <button className="control-btn" style={{background: '#ef4444'}} onClick={() => window.location.href = './'}>
                            <i className="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // OBS - Simplificado
        // ==========================================
        const ObsView = ({ roomName, slotId }) => {
            const [stream, setStream] = useState(null);
            const [status, setStatus] = useState('Esperando...');
            const peer = useRef(null);
            const videoRef = useRef(null);

            useEffect(() => {
                const myId = `obs_${roomName}_${slotId}`;
                
                peer.current = new Peer(myId, PEER_CONFIG);
                
                peer.current.on('open', () => {
                    setStatus('Listo - Esperando laptop...');
                });
                
                peer.current.on('call', call => {
                    console.log('OBS recibiendo de:', call.peer);
                    call.answer();
                    call.on('stream', s => {
                        setStream(s);
                        setStatus('Recibiendo');
                    });
                    call.on('close', () => {
                        setStream(null);
                        setStatus('Desconectado');
                    });
                });

                return () => peer.current?.destroy();
            }, [roomName, slotId]);

            useEffect(() => {
                if (stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(() => {
                        videoRef.current.muted = true;
                        videoRef.current.play();
                    });
                }
            }, [stream]);

            return (
                <div className="obs-layout">
                    {stream ? (
                        <video ref={videoRef} className="obs-video" autoPlay playsInline muted={false}></video>
                    ) : (
                        <div className="obs-waiting">
                            <i className="fas fa-circle-notch fa-spin" style={{fontSize: '2rem', marginBottom: '10px', display: 'block'}}></i>
                            {status}<br/>
                            <small style={{opacity: 0.5}}>ID: obs_{roomName}_{slotId}</small>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // APP
        // ==========================================
        const App = () => {
            const [state, setState] = useState({mode: null, room: 'EVENTO', slot: '1'});

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode'), r = p.get('room'), s = p.get('slot') || '1';
                if (m && r) {
                    if (m === 'obs') document.body.style.background = 'transparent';
                    setState({mode: m, room: r.toUpperCase(), slot: s});
                } else {
                    setState({mode: 'lobby', room: 'EVENTO', slot: '1'});
                }
            }, []);

            if (state.mode === 'director') return <DirectorView roomName={state.room} />;
            if (state.mode === 'obs') return <ObsView roomName={state.room} slotId={state.slot} />;
            if (state.mode === 'presenter') return <PresenterView roomName={state.room} slotId={state.slot} />;
            
            return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <h1 style={{color: '#8b5cf6', marginBottom: '20px'}}><i className="fas fa-broadcast-tower"></i> StreamCall</h1>
                        
                        <input value={state.room} onChange={e => setState({...state, room: e.target.value.toUpperCase()})} placeholder="NOMBRE SALA" />
                        
                        <button className="btn" onClick={() => window.location.href=`?mode=director&room=${state.room}`}>
                            <i className="fas fa-th-large"></i> Soy Director (Panel)
                        </button>
                        
                        <button className="btn btn-purple" onClick={() => window.location.href=`?mode=presenter&room=${state.room}&slot=1`}>
                            <i className="fas fa-laptop"></i> Soy Presentador
                        </button>
                        
                        <div style={{marginTop: '20px', padding: '15px', background: 'rgba(0,0,0,0.2)', borderRadius: '8px'}}>
                            <div style={{fontSize: '0.7rem', color: '#94a3b8', marginBottom: '8px'}}>Links para OBS:</div>
                            <div style={{display: 'flex', gap: '5px', justifyContent: 'center'}}>
                                {[1,2,3].map(n => (
                                    <button key={n} onClick={() => navigator.clipboard.writeText(`${window.location.href.split('?')[0]}?mode=obs&room=${state.room}&slot=${n}`)}
                                        style={{background: '#334155', border: 'none', color: 'white', padding: '5px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '0.7rem'}}>
                                        Slot {n}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
