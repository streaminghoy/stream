<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCall Presenter - Fixed</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.95); padding: 40px; border-radius: 16px; max-width: 500px; width: 100%; border: 1px solid #334155; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; text-align: center; font-weight: 600; }
        .btn { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #3b82f6; color: white; font-size: 1rem; margin-bottom: 10px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4); }
        .btn-purple { background: #8b5cf6; }
        .btn-red { background: #ef4444; }
        
        .director-layout { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .director-header { background: #0f172a; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 15px; padding: 15px; overflow-y: auto; }
        
        .slot-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; min-height: 300px; }
        .slot-video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; min-height: 220px; overflow: hidden; }
        .slot-video { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .slot-status { position: absolute; color: #64748b; font-weight: bold; text-align: center; padding: 20px; }
        
        .source-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; z-index: 10; }
        .source-badge.screen { color: #8b5cf6; border: 1px solid #8b5cf6; }
        .source-badge.camera { color: #3b82f6; border: 1px solid #3b82f6; }
        
        .debug-info { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; color: #94a3b8; z-index: 10; font-family: monospace; }
        
        .quality-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.85); color: #22c55e; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-family: monospace; border: 1px solid #22c55e; z-index: 10; }
        
        .connection-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.85); padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; z-index: 10; }
        .connection-badge.local { color: #22c55e; border: 1px solid #22c55e; }
        .connection-badge.relay { color: #f59e0b; border: 1px solid #f59e0b; }
        
        .vu-meter-container { width: 100%; height: 4px; background: #000; }
        .vu-meter-bar { height: 100%; background: linear-gradient(90deg, #22c55e, #facc15, #ef4444); width: 0%; transition: width 0.1s; }
        
        .slot-controls-area { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: #0f172a; gap: 12px; }
        .tally-group { display: flex; gap: 6px; flex: 1; }
        .t-btn { flex: 1; padding: 10px 0; font-size: 0.8rem; font-weight: bold; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background: #1e293b; color: #94a3b8; text-align: center; transition: all 0.2s; }
        .t-btn.active-idle { border-color: #64748b; color: white; background: #334155; }
        .t-btn.active-prev { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #22c55e; }
        .t-btn.active-live { background: rgba(239, 68, 68, 0.3); border-color: #ef4444; color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        
        .director-preview { position: fixed; bottom: 20px; right: 20px; width: 213px; height: 120px; background: #000; border: 3px solid #3b82f6; border-radius: 8px; overflow: hidden; z-index: 1000; display: none; }
        .director-preview.active { display: block; }
        .director-preview video { width: 100%; height: 100%; object-fit: cover; }
        .director-preview-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(59, 130, 246, 0.9); color: white; text-align: center; font-size: 0.7rem; padding: 4px; font-weight: bold; }
        
        .presenter-layout { width: 100vw; height: 100vh; position: relative; background: #000; overflow: hidden; }
        .presenter-video { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        
        .tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 20px solid transparent; pointer-events: none; z-index: 50; box-sizing: border-box; transition: all 0.3s; }
        .tally-live .tally-border { border-color: #ef4444; box-shadow: inset 0 0 60px rgba(239,68,68,0.6); }
        .tally-prev .tally-border { border-color: #eab308; box-shadow: inset 0 0 60px rgba(234,179,8,0.5); }
        
        .tally-overlay { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.9); color: white; padding: 10px 30px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; display: none; z-index: 100; letter-spacing: 2px; }
        .tally-live .tally-overlay { display: block; animation: pulse 2s infinite; }
        .tally-prev .tally-overlay { display: block; background: rgba(234, 179, 8, 0.9); color: black; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .return-pip { position: absolute; background: #000; border: 3px solid #3b82f6; border-radius: 12px; overflow: hidden; z-index: 80; display: none; aspect-ratio: 16/9; }
        .return-pip.active { display: block; }
        .return-pip video { width: 100%; height: 100%; object-fit: cover; }
        .pip-header { position: absolute; top: 0; left: 0; right: 0; height: 35px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 10; cursor: grab; display: flex; align-items: center; justify-content: center; }
        .pip-header::before { content: '•••'; color: rgba(255,255,255,0.5); letter-spacing: 4px; font-size: 12px; }
        .pip-resize { position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; cursor: se-resize; }
        .pip-resize::after { content: ''; position: absolute; bottom: 6px; right: 6px; width: 10px; height: 10px; border-right: 2px solid #3b82f6; border-bottom: 2px solid #3b82f6; }
        
        .presenter-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.98); padding: 15px 25px; border-radius: 16px; display: flex; gap: 15px; z-index: 100; border: 1px solid #334155; }
        .control-btn { width: 56px; height: 56px; border-radius: 12px; border: none; background: #334155; color: white; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .control-btn:hover { background: #475569; }
        .control-btn.off { background: #ef4444; }
        .control-btn.active { background: #8b5cf6; }
        .control-btn.switch { width: auto; padding: 0 20px; font-size: 0.9rem; font-weight: bold; gap: 8px; }
        
        .source-label-floating { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; z-index: 90; border: 1px solid; }
        .source-label-floating.screen { color: #8b5cf6; border-color: #8b5cf6; }
        .source-label-floating.camera { color: #3b82f6; border-color: #3b82f6; }
        
        .network-status { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; z-index: 90; font-weight: 600; border: 1px solid; }
        .network-status.local { color: #22c55e; border-color: #22c55e; }
        .network-status.relay { color: #f59e0b; border-color: #f59e0b; }
        
        .obs-layout { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; }
        .obs-video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .obs-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #64748b; font-size: 18px; background: rgba(0,0,0,0.9); padding: 30px 40px; border-radius: 12px; border: 2px solid #334155; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .mode-card { background: rgba(51, 65, 85, 0.5); border: 2px solid #334155; border-radius: 12px; padding: 25px 15px; cursor: pointer; transition: all 0.3s; }
        .mode-card:hover { border-color: #8b5cf6; }
        .mode-card.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); }
        .mode-icon { font-size: 2rem; margin-bottom: 10px; color: #8b5cf6; }
        .mode-title { font-weight: bold; margin-bottom: 5px; }
        .mode-desc { font-size: 0.75rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const PEER_CONFIG = { 
            config: { 
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'turn:140.82.25.249:3478', username: 'reportero', credential: 'mundial2026' }
                ]
            }
        };
        
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';
        
        // IDs estandarizados
        const getDirectorId = (room) => `dir_${room}`;
        const getPresenterId = (room, slot) => `pres_${room}_${slot}`;
        const getObsId = (room, slot) => `obs_${room}_${slot}`;
        
        const VideoPlayer = ({ stream, muted, className }) => {
            const videoRef = useRef(null);
            useEffect(() => {
                if (videoRef.current && stream) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(e => console.log("Autoplay prevented:", e));
                }
            }, [stream]);
            return <video ref={videoRef} className={className} autoPlay playsInline muted={muted} />;
        };

        const DraggablePIP = ({ stream }) => {
            const [pos, setPos] = useState({ x: 20, y: 20 });
            const [size, setSize] = useState({ w: 240, h: 135 });
            const dragRef = useRef(false);
            const resizeRef = useRef(false);
            const startPos = useRef({ x: 0, y: 0 });
            const startRect = useRef({ x: 0, y: 0, w: 0, h: 0 });

            useEffect(() => {
                const onMove = (e) => {
                    if (!dragRef.current && !resizeRef.current) return;
                    const x = e.touches ? e.touches[0].clientX : e.clientX;
                    const y = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    if (dragRef.current) {
                        setPos({
                            x: Math.max(0, Math.min(window.innerWidth - size.w, startRect.current.x + (x - startPos.current.x))),
                            y: Math.max(0, Math.min(window.innerHeight - size.h - 100, startRect.current.y + (y - startPos.current.y)))
                        });
                    } else if (resizeRef.current) {
                        const newW = Math.max(160, Math.min(window.innerWidth - pos.x - 10, startRect.current.w + (x - startPos.current.x)));
                        setSize({ w: newW, h: newW * 0.5625 });
                    }
                };
                const onEnd = () => { dragRef.current = false; resizeRef.current = false; };
                
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                window.addEventListener('touchmove', onMove);
                window.addEventListener('touchend', onEnd);
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onEnd);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onEnd);
                };
            }, [pos.x, size.w]);

            const startDrag = (e) => {
                dragRef.current = true;
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                startPos.current = { x, y };
                startRect.current = { x: pos.x, y: pos.y, w: size.w, h: size.h };
            };

            const startResize = (e) => {
                resizeRef.current = true;
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                startPos.current = { x };
                startRect.current = { x: pos.x, y: pos.y, w: size.w, h: size.h };
            };

            if (!stream) return null;
            return (
                <div className="return-pip active" style={{ left: pos.x, top: pos.y, width: size.w, height: size.h }}>
                    <div className="pip-header" onMouseDown={startDrag} onTouchStart={startDrag} />
                    <VideoPlayer stream={stream} muted={false} />
                    <div className="pip-resize" onMouseDown={startResize} onTouchStart={startResize} />
                </div>
            );
        };

        // ==========================================
        // DIRECTOR (ARREGLADO)
        // ==========================================
        const DirectorView = ({ roomName }) => {
            const [slots, setSlots] = useState({ 
                1: { connected: false, tally: 'idle', stream: null, source: 'camera', quality: '-', debug: '' }, 
                2: { connected: false, tally: 'idle', stream: null, source: 'camera', quality: '-', debug: '' }, 
                3: { connected: false, tally: 'idle', stream: null, source: 'camera', quality: '-', debug: '' }
            });
            const [talkbackActive, setTalkbackActive] = useState(false);
            const [localStream, setLocalStream] = useState(null);
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const returnCallsRef = useRef({});

            useEffect(() => {
                const interval = setInterval(() => {
                    setSlots(prev => {
                        const n = {...prev};
                        Object.keys(n).forEach(k => {
                            if (n[k].stream) {
                                const t = n[k].stream.getVideoTracks()[0];
                                if (t) {
                                    const s = t.getSettings();
                                    n[k].quality = s.width ? `${s.width}x${s.height}` : '720p';
                                }
                            }
                        });
                        return n;
                    });
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                if (!talkbackActive || !localStream) return;
                [1,2,3].forEach(id => {
                    if (slots[id].connected && !returnCallsRef.current[id]) {
                        const c = peer.current.call(getPresenterId(roomName, id), localStream);
                        returnCallsRef.current[id] = c;
                        c.on('close', () => delete returnCallsRef.current[id]);
                    }
                });
            }, [slots, talkbackActive, localStream, roomName]);

            useEffect(() => {
                // MQTT para Tally
                mqttClient.current = mqtt.connect(MQTT_BROKER);
                mqttClient.current.on('connect', () => {
                    [1,2,3].forEach(id => mqttClient.current.subscribe(`sc/tally/${roomName}/${id}`));
                });
                mqttClient.current.on('message', (t, msg) => {
                    try {
                        const d = JSON.parse(msg.toString());
                        const m = t.match(/\/(\d+)$/);
                        if (m) setSlots(prev => ({...prev, [m[1]]: {...prev[m[1]], tally: d.state, source: d.source || prev[m[1]].source}}));
                    } catch(e){}
                });

                // PeerJS - ESCUCHANDO LLAMADAS
                const myId = getDirectorId(roomName);
                console.log('Director ID:', myId);
                
                peer.current = new Peer(myId, PEER_CONFIG);
                
                peer.current.on('open', (id) => {
                    console.log('Director conectado con ID:', id);
                });
                
                peer.current.on('error', (err) => {
                    console.error('PeerJS Error:', err);
                });
                
                peer.current.on('call', call => {
                    const peerId = call.peer;
                    console.log('Llamada entrante de:', peerId);
                    
                    // Extraer slot del peer ID (pres_EVENTO_1)
                    const match = peerId.match(/pres_${roomName}_(\d+)$/);
                    if (match) {
                        const slotId = match[1];
                        console.log(`Aceptando llamada para slot ${slotId}`);
                        
                        call.answer(); // Director no envía video, solo recibe
                        
                        call.on('stream', stream => {
                            console.log(`Stream recibido en slot ${slotId}`);
                            setSlots(prev => ({...prev, [slotId]: {
                                ...prev[slotId], 
                                connected: true, 
                                stream: stream,
                                debug: 'Conectado'
                            }}));
                        });
                        
                        call.on('close', () => {
                            console.log(`Llamada cerrada slot ${slotId}`);
                            setSlots(prev => ({...prev, [slotId]: {
                                ...prev[slotId], 
                                connected: false, 
                                stream: null,
                                debug: 'Desconectado'
                            }}));
                        });
                        
                        call.on('error', (err) => {
                            console.error(`Error en llamada slot ${slotId}:`, err);
                        });
                    } else {
                        console.log('Llamada de ID desconocido:', peerId);
                    }
                });

                return () => {
                    peer.current?.destroy();
                    mqttClient.current?.end();
                    localStream?.getTracks().forEach(t => t.stop());
                };
            }, [roomName]);

            const setTally = (id, state) => {
                setSlots(prev => ({...prev, [id]: {...prev[id], tally: state}}));
                mqttClient.current?.publish(`sc/tally/${roomName}/${id}`, JSON.stringify({state: state, source: slots[id].source}), {retain: true});
            };

            const toggleTalkback = async () => {
                if (talkbackActive) {
                    Object.values(returnCallsRef.current).forEach(c => {try{c.close()}catch(e){}});
                    returnCallsRef.current = {};
                    localStream?.getTracks().forEach(t => t.stop());
                    setLocalStream(null);
                    setTalkbackActive(false);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({audio: true, video: {width: 426, height: 240}});
                        setLocalStream(s);
                        setTalkbackActive(true);
                    } catch(e) {alert("Error cámara: " + e.message)}
                }
            };

            const copyObs = id => {
                const url = `${window.location.href.split('?')[0]}?mode=obs&room=${roomName}&slot=${id}`;
                navigator.clipboard.writeText(url);
            };

            return (
                <div className="director-layout">
                    <div className="director-header">
                        <div>
                            <h2 style={{color: '#8b5cf6', margin: 0}}><i className="fas fa-th-large"></i> Director | {roomName}</h2>
                            <small style={{color: '#64748b'}}>Esperando laptops...</small>
                        </div>
                        <button className={talkbackActive ? 'btn btn-red' : 'btn btn-purple'} style={{width: 'auto', padding: '10px 20px', margin: 0}} onClick={toggleTalkback}>
                            <i className={talkbackActive ? 'fas fa-stop' : 'fas fa-comment-dots'}></i> {talkbackActive ? 'Cortar' : 'Talkback'}
                        </button>
                    </div>
                    
                    <div className={`director-preview ${localStream ? 'active' : ''}`}>
                        {localStream && <VideoPlayer stream={localStream} muted={true} />}
                        <div className="director-preview-label">RETORNO</div>
                    </div>

                    <div className="grid-container">
                        {[1,2,3].map(id => (
                            <div key={id} className="slot-card" style={{borderColor: slots[id].tally === 'live' ? '#ef4444' : slots[id].tally === 'prev' ? '#eab308' : '#334155'}}>
                                <div className="slot-video-area">
                                    {slots[id].stream ? (
                                        <>
                                            <div className={`source-badge ${slots[id].source}`}>
                                                <i className={slots[id].source === 'screen' ? 'fas fa-desktop' : 'fas fa-video'}></i>
                                                {slots[id].source === 'screen' ? 'PANTALLA' : 'CAMARA'}
                                            </div>
                                            <div className="quality-badge">{slots[id].quality}</div>
                                            <div className="debug-info">ID: dir_{roomName} | Peer: OK</div>
                                            <VideoPlayer stream={slots[id].stream} muted={false} className="slot-video" />
                                        </>
                                    ) : (
                                        <div className="slot-status">
                                            <i className="fas fa-laptop" style={{fontSize: '2.5rem', marginBottom: '10px', opacity: 0.4}}></i>
                                            <div>SLOT {id}</div>
                                            <small style={{fontSize: '0.7rem', color: '#475569'}}>ID: dir_{roomName}</small>
                                            <div style={{fontSize: '0.6rem', color: '#ef4444', marginTop: '5px'}}>{slots[id].debug}</div>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="slot-controls-area">
                                    <div style={{minWidth: '60px'}}>
                                        <div style={{fontWeight: 'bold', color: '#8b5cf6'}}>#{id}</div>
                                        <div style={{fontSize: '0.75rem', color: slots[id].connected ? '#22c55e' : '#64748b'}}>
                                            {slots[id].connected ? '● ONLINE' : '○ OFFLINE'}
                                        </div>
                                    </div>
                                    
                                    <div className="tally-group">
                                        <button className={`t-btn ${slots[id].tally==='idle'?'active-idle':''}`} onClick={()=>setTally(id,'idle')}>SAFE</button>
                                        <button className={`t-btn ${slots[id].tally==='prev'?'active-prev':''}`} onClick={()=>setTally(id,'prev')}>PREV</button>
                                        <button className={`t-btn ${slots[id].tally==='live'?'active-live':''}`} onClick={()=>setTally(id,'live')}>LIVE</button>
                                    </div>
                                    
                                    <button className="btn btn-purple" style={{width: 'auto', padding: '8px 12px', fontSize: '0.75rem'}} onClick={()=>copyObs(id)}>
                                        <i className="fas fa-copy"></i> OBS
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // PRESENTER (ARREGLADO)
        // ==========================================
        const PresenterView = ({ roomName, slotId }) => {
            const [step, setStep] = useState('select');
            const [sourceType, setSourceType] = useState('screen');
            const [tally, setTally] = useState('idle');
            const [micMuted, setMicMuted] = useState(false);
            const [connType, setConnType] = useState('checking');
            const [returnStream, setReturnStream] = useState(null);
            const [status, setStatus] = useState('Iniciando...');
            
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const localStream = useRef(null);
            const screenStream = useRef(null);
            const audioCtx = useRef(null);

            useEffect(() => {
                if (step !== 'live') return;
                
                setStatus('Conectando a director...');
                
                mqttClient.current = mqtt.connect(MQTT_BROKER);
                mqttClient.current.on('connect', () => {
                    mqttClient.current.subscribe(`sc/tally/${roomName}/${slotId}`);
                });
                mqttClient.current.on('message', (t, msg) => {
                    try {
                        const d = JSON.parse(msg.toString());
                        if (d.state) setTally(d.state);
                    } catch(e){}
                });
                
                initStream();
                
                return () => cleanup();
            }, [step, roomName, slotId, sourceType]);

            const cleanup = () => {
                localStream.current?.getTracks().forEach(t => t.stop());
                screenStream.current?.getTracks().forEach(t => t.stop());
                audioCtx.current?.close();
                peer.current?.destroy();
                mqttClient.current?.end();
            };

            const initStream = async () => {
                try {
                    let stream;
                    
                    if (sourceType === 'screen') {
                        screenStream.current = await navigator.mediaDevices.getDisplayMedia({
                            video: true,
                            audio: true
                        });
                        
                        if (screenStream.current.getAudioTracks().length > 0) {
                            const mic = await navigator.mediaDevices.getUserMedia({audio: true});
                            audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                            const dest = audioCtx.current.createMediaStreamDestination();
                            
                            const sys = audioCtx.current.createMediaStreamSource(screenStream.current);
                            sys.connect(dest);
                            
                            const m = audioCtx.current.createMediaStreamSource(mic);
                            const g = audioCtx.current.createGain();
                            g.gain.value = 0.8;
                            m.connect(g);
                            g.connect(dest);
                            
                            stream = new MediaStream([
                                screenStream.current.getVideoTracks()[0],
                                ...dest.stream.getAudioTracks()
                            ]);
                        } else {
                            const mic = await navigator.mediaDevices.getUserMedia({audio: true});
                            stream = new MediaStream([
                                screenStream.current.getVideoTracks()[0],
                                ...mic.getAudioTracks()
                            ]);
                        }
                        
                        screenStream.current.getVideoTracks()[0].onended = () => {
                            if (sourceType === 'screen') toggleSource('camera');
                        };
                        
                    } else {
                        stream = await navigator.mediaDevices.getUserMedia({
                            video: { width: 1280, height: 720 },
                            audio: { echoCancellation: true, noiseSuppression: true }
                        });
                    }
                    
                    localStream.current = stream;
                    setStatus('Stream listo, conectando PeerJS...');
                    
                    // ID del presentador
                    const myId = getPresenterId(roomName, slotId);
                    const directorId = getDirectorId(roomName);
                    
                    console.log('Mi ID:', myId);
                    console.log('Llamando a Director:', directorId);
                    
                    peer.current = new Peer(myId, PEER_CONFIG);
                    
                    peer.current.on('open', () => {
                        setStatus('Conectado a servidor, llamando director...');
                        
                        // LLAMAR AL DIRECTOR (CRÍTICO)
                        const call = peer.current.call(directorId, stream);
                        
                        if (call) {
                            console.log('Llamada iniciada al director');
                            setStatus('Enviando video al director...');
                            
                            // Detectar si se conectó
                            setTimeout(() => {
                                if (call.open) {
                                    setStatus('Conectado al director!');
                                    setConnType('checking');
                                }
                            }, 2000);
                        } else {
                            console.error('Fallo al iniciar llamada');
                            setStatus('Error: No se pudo llamar al director');
                        }
                        
                        // Reconectar OBS cada 3s
                        const tryObs = () => {
                            const obsId = getObsId(roomName, slotId);
                            if (!peer.current.connections[obsId]?.some(c => c.open)) {
                                peer.current.call(obsId, stream);
                            }
                        };
                        tryObs();
                        setInterval(tryObs, 3000);
                    });
                    
                    peer.current.on('error', (err) => {
                        console.error('PeerJS error:', err);
                        setStatus('Error: ' + err.type);
                    });
                    
                    peer.current.on('call', call => {
                        call.answer();
                        call.on('stream', s => setReturnStream(s));
                    });
                    
                    mqttClient.current?.publish(`sc/tally/${roomName}/${slotId}`, 
                        JSON.stringify({state: 'idle', source: sourceType}), {retain: true});
                    
                } catch(e) {
                    console.error(e);
                    setStatus('Error: ' + e.message);
                    alert("Error: " + e.message);
                }
            };

            const toggleSource = async (newType) => {
                if (newType === sourceType) return;
                cleanup();
                setSourceType(newType);
                setTimeout(() => initStream(), 100);
            };

            const toggleMic = () => {
                if (localStream.current) {
                    localStream.current.getAudioTracks().forEach(t => t.enabled = !t.enabled);
                    setMicMuted(!micMuted);
                }
            };

            if (step === 'select') {
                return (
                    <div className="lobby-container">
                        <div className="glass-box">
                            <h2 style={{color: '#8b5cf6', marginBottom: '10px'}}><i className="fas fa-laptop"></i> Laptop {slotId}</h2>
                            <p style={{color: '#94a3b8', marginBottom: '20px'}}>Sala: {roomName}</p>
                            <p style={{fontSize: '0.8rem', color: '#64748b', marginBottom: '15px'}}>
                                Mi ID será: <strong>pres_{roomName}_{slotId}</strong><br/>
                                Director: <strong>dir_{roomName}</strong>
                            </p>
                            
                            <div className="mode-grid">
                                <div className={`mode-card ${sourceType === 'screen' ? 'selected' : ''}`} onClick={() => setSourceType('screen')}>
                                    <div className="mode-icon"><i className="fas fa-desktop"></i></div>
                                    <div className="mode-title">Presentación</div>
                                    <div className="mode-desc">PowerPoint</div>
                                </div>
                                <div className={`mode-card ${sourceType === 'camera' ? 'selected' : ''}`} onClick={() => setSourceType('camera')}>
                                    <div className="mode-icon"><i className="fas fa-video"></i></div>
                                    <div className="mode-title">Cámara Web</div>
                                    <div className="mode-desc">720p</div>
                                </div>
                            </div>
                            
                            <button className="btn btn-purple" onClick={() => setStep('live')}>
                                <i className="fas fa-play"></i> Conectar
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`presenter-layout ${tally === 'live' ? 'tally-live' : tally === 'prev' ? 'tally-prev' : ''}`}>
                    <div className="tally-border"></div>
                    <div className="tally-overlay">{tally === 'live' ? '● EN VIVO' : tally === 'prev' ? 'PREPARADO' : ''}</div>
                    
                    <div className={`source-label-floating ${sourceType}`}>
                        <i className={sourceType === 'screen' ? 'fas fa-desktop' : 'fas fa-video'}></i>
                        {sourceType === 'screen' ? 'PANTALLA' : 'CAMARA WEB'}
                    </div>
                    
                    <div className="network-status" style={{borderColor: status.includes('Error') ? '#ef4444' : connType === 'local' ? '#22c55e' : '#f59e0b', color: status.includes('Error') ? '#ef4444' : connType === 'local' ? '#22c55e' : '#f59e0b'}}>
                        <i className={status.includes('Error') ? 'fas fa-exclamation-circle' : 'fas fa-circle'}></i>
                        {status}
                    </div>
                    
                    <DraggablePIP stream={returnStream} />
                    
                    {localStream.current && (
                        <VideoPlayer stream={localStream.current} muted={true} className="presenter-video" 
                            style={{objectFit: sourceType === 'screen' ? 'contain' : 'cover'}} />
                    )}
                    
                    <div className="presenter-controls">
                        <button className={`control-btn ${micMuted ? 'off' : ''}`} onClick={toggleMic}>
                            <i className={micMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone'}></i>
                        </button>
                        
                        <button className={`control-btn switch ${sourceType === 'screen' ? 'active' : ''}`} onClick={() => toggleSource(sourceType === 'screen' ? 'camera' : 'screen')}>
                            <i className="fas fa-exchange-alt"></i>
                            Cambiar
                        </button>
                        
                        <button className="control-btn" style={{background: '#ef4444'}} onClick={() => {cleanup(); window.location.reload();}}>
                            <i className="fas fa-phone-slash"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // OBS
        // ==========================================
        const ObsView = ({ roomName, slotId }) => {
            const [stream, setStream] = useState(null);
            const [status, setStatus] = useState('Esperando...');
            const peer = useRef(null);
            const videoRef = useRef(null);

            useEffect(() => {
                const myId = getObsId(roomName, slotId);
                console.log('OBS ID:', myId);
                
                peer.current = new Peer(myId, PEER_CONFIG);
                
                peer.current.on('open', () => setStatus('Listo'));
                
                peer.current.on('call', call => {
                    console.log('OBS recibiendo llamada de:', call.peer);
                    call.answer();
                    call.on('stream', s => {
                        setStream(s);
                        setStatus('Recibiendo');
                    });
                    call.on('close', () => {
                        setStream(null);
                        setStatus('Cerrado');
                    });
                });

                return () => peer.current?.destroy();
            }, [roomName, slotId]);

            useEffect(() => {
                if (stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(() => {
                        videoRef.current.muted = true;
                        videoRef.current.play();
                    });
                }
            }, [stream]);

            return (
                <div className="obs-layout">
                    {stream ? (
                        <video ref={videoRef} className="obs-video" autoPlay playsInline muted={false}></video>
                    ) : (
                        <div className="obs-status">
                            <i className="fas fa-circle-notch fa-spin" style={{marginRight: '10px'}}></i>
                            {status}
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // APP
        // ==========================================
        const App = () => {
            const [state, setState] = useState({mode: null, room: 'EVENTO', slot: '1'});

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode'), r = p.get('room'), s = p.get('slot') || '1';
                if (m && r) {
                    if (m === 'obs') document.body.style.background = 'transparent';
                    setState({mode: m, room: r.toUpperCase(), slot: s});
                } else {
                    setState({mode: 'lobby', room: 'EVENTO', slot: '1'});
                }
            }, []);

            if (state.mode === 'director') return <DirectorView roomName={state.room} />;
            if (state.mode === 'obs') return <ObsView roomName={state.room} slotId={state.slot} />;
            if (state.mode === 'presenter') return <PresenterView roomName={state.room} slotId={state.slot} />;
            
            return (
                <div className="lobby-container">
                    <div className="glass-box">
                        <h1 style={{color: '#8b5cf6', marginBottom: '10px'}}><i className="fas fa-broadcast-tower"></i> StreamCall</h1>
                        <input value={state.room} onChange={e => setState({...state, room: e.target.value.toUpperCase()})} placeholder="SALA" />
                        
                        <button className="btn btn-purple" onClick={() => window.location.href=`?mode=presenter&room=${state.room}&slot=1`}>
                            <i className="fas fa-laptop"></i> Soy Presentador
                        </button>
                        <button className="btn" onClick={() => window.location.href=`?mode=director&room=${state.room}`}>
                            <i className="fas fa-th-large"></i> Soy Director
                        </button>
                        
                        <div style={{marginTop: '15px', display: 'flex', gap: '5px', justifyContent: 'center'}}>
                            {['1','2','3'].map(n => (
                                <button key={n} onClick={() => navigator.clipboard.writeText(`${window.location.href.split('?')[0]}?mode=obs&room=${state.room}&slot=${n}`)}
                                    style={{background: '#334155', border: 'none', color: 'white', padding: '5px 10px', borderRadius: '4px', cursor: 'pointer', fontSize: '0.7rem'}}>
                                    OBS {n}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
