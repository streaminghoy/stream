<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamCall - LAN Only</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; height: 100vh; overflow: hidden; }
        
        .lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; }
        .glass { background: rgba(30, 41, 59, 0.95); padding: 40px; border-radius: 16px; width: 100%; max-width: 450px; border: 1px solid #334155; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; text-align: center; }
        .btn { width: 100%; padding: 15px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; background: #3b82f6; color: white; font-size: 1rem; margin-bottom: 10px; }
        .btn-purple { background: #8b5cf6; }
        
        .lan-badge { display: inline-block; background: #22c55e; color: black; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-left: 8px; }
        
        .director { display: flex; flex-direction: column; height: 100vh; background: #000; }
        .header { background: #0f172a; border-bottom: 1px solid #334155; padding: 15px; text-align: center; }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 10px; padding: 10px; }
        
        .slot { background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .slot.live { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.2); }
        .slot.prev { border-color: #eab308; }
        
        .video-area { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; min-height: 250px; }
        .video { width: 100%; height: 100%; object-fit: contain; }
        .badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; border: 1px solid; z-index: 10; }
        .badge.screen { color: #8b5cf6; border-color: #8b5cf6; }
        .badge.camera { color: #3b82f6; border-color: #3b82f6; }
        .badge.lan { color: #22c55e; border-color: #22c55e; right: 10px; left: auto; font-size: 0.65rem; }
        .status { position: absolute; color: #64748b; text-align: center; }
        
        .controls { padding: 10px; display: flex; gap: 5px; background: #0f172a; }
        .t-btn { flex: 1; padding: 10px; font-size: 0.8rem; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; background: #1e293b; color: #94a3b8; }
        .t-btn.idle { background: #334155; color: white; }
        .t-btn.prev { background: rgba(234, 179, 8, 0.2); color: #eab308; }
        .t-btn.live { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        
        .presenter { width: 100vw; height: 100vh; position: relative; background: #000; }
        .presenter-video { width: 100%; height: 100%; object-fit: contain; }
        
        .tally-border { position: absolute; inset: 0; border: 15px solid transparent; pointer-events: none; z-index: 50; transition: all 0.3s; }
        .tally-border.live { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.5); }
        .tally-border.prev { border-color: #eab308; box-shadow: inset 0 0 50px rgba(234,179,8,0.4); }
        
        .on-air { position: absolute; top: 20px; right: 20px; background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; font-weight: bold; display: none; z-index: 100; }
        .on-air.active { display: block; }
        
        .p-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); padding: 15px; border-radius: 12px; display: flex; gap: 10px; z-index: 100; border: 1px solid #334155; }
        .p-btn { width: 50px; height: 50px; border-radius: 8px; border: none; background: #334155; color: white; font-size: 1.2rem; cursor: pointer; }
        .p-btn.off { background: #ef4444; }
        .p-btn.switch { width: auto; padding: 0 15px; font-size: 0.8rem; font-weight: bold; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .mode-card { background: rgba(51, 65, 85, 0.5); border: 2px solid #334155; border-radius: 8px; padding: 20px; cursor: pointer; text-align: center; }
        .mode-card.selected { border-color: #8b5cf6; background: rgba(139, 92, 246, 0.2); }
        .mode-icon { font-size: 2rem; margin-bottom: 8px; color: #8b5cf6; }
        
        .error { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 10px; border-radius: 6px; margin: 10px 0; font-size: 0.8rem; }
        
        .obs { width: 100vw; height: 100vh; background: #000; position: relative; overflow: hidden; }
        .obs-video { width: 100%; height: 100%; object-fit: contain; display: block; }
        .obs-wait { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #64748b; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // 🔴 CONFIGURACIÓN LAN ONLY - Sin servidor TURN de Miami
        // Usa solo STUN gratuito de Google (solo para descubrir IP, no consume datos)
        // Si quieres 100% offline sin internet, cambia a: iceServers: []
        const PEER_CONFIG = { 
            config: { 
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' } // STUN gratuito, bajo consumo
                ]
                // Si no hay internet LAN, pon: iceServers: [] 
                // y funcionará pura LAN local (192.168.x.x)
            }
        };
        
        const Video = ({ stream, ...props }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && stream) {
                    ref.current.srcObject = stream;
                    ref.current.play().catch(() => {});
                }
            }, [stream]);
            return <video ref={ref} autoPlay playsInline {...props} />;
        };

        // ==========================================
        // DIRECTOR (LAN Mode)
        // ==========================================
        const Director = ({ room }) => {
            const [slots, setSlots] = useState({ 
                1: { stream: null, tally: 'idle', source: 'camera', isLocal: false }, 
                2: { stream: null, tally: 'idle', source: 'camera', isLocal: false }, 
                3: { stream: null, tally: 'idle', source: 'camera', isLocal: false }
            });
            const peer = useRef(null);
            const conns = useRef({});

            useEffect(() => {
                peer.current = new Peer(`dir_${room}`, PEER_CONFIG);
                
                peer.current.on('call', call => {
                    const match = call.peer.match(/pres_${room}_(\d+)_/);
                    if (!match) return;
                    
                    const id = match[1];
                    
                    // Detectar si es conexión local (LAN)
                    let isLocal = false;
                    if (call.peerConnection) {
                        call.peerConnection.onicecandidate = (e) => {
                            if (e.candidate && (e.candidate.type === 'host' || e.candidate.address?.startsWith('192.168.'))) {
                                isLocal = true;
                            }
                        };
                    }
                    
                    call.answer();
                    
                    call.on('stream', stream => {
                        setSlots(s => ({...s, [id]: {...s[id], stream, isLocal}}));
                    });
                    
                    call.on('close', () => {
                        setSlots(s => ({...s, [id]: {...s[id], stream: null}}));
                    });
                });

                return () => peer.current?.destroy();
            }, [room]);

            const setTally = (id, state) => {
                setSlots(s => ({...s, [id]: {...s[id], tally: state}}));
                // Enviar tally por PeerJS (sin MQTT, 100% P2P)
                Object.values(peer.current?.connections || {}).forEach(calls => {
                    calls.forEach(call => {
                        if (call.peer.includes(`pres_${room}_${id}_`) && call.send) {
                            call.send({ tally: state });
                        }
                    });
                });
            };

            return (
                <div className="director">
                    <div className="header">
                        <h2 style={{color: '#8b5cf6'}}>
                            <i className="fas fa-th-large"></i> {room} 
                            <span className="lan-badge">LAN MODE</span>
                        </h2>
                        <small style={{color: '#64748b'}}>Sin servidor externo | Red local únicamente</small>
                    </div>

                    <div className="grid">
                        {[1,2,3].map(id => (
                            <div key={id} className={`slot ${slots[id].tally}`}>
                                <div className="video-area">
                                    {slots[id].stream ? (
                                        <>
                                            <div className={`badge ${slots[id].source}`}>
                                                {slots[id].source === 'screen' ? '📺 PANTALLA' : '📹 CÁMARA'}
                                            </div>
                                            {slots[id].isLocal && <div className="badge lan">🟢 LAN DIRECTO</div>}
                                            <Video stream={slots[id].stream} muted={false} className="video" />
                                        </>
                                    ) : (
                                        <div className="status">
                                            <i className="fas fa-laptop" style={{fontSize: '2.5rem', marginBottom: '10px', opacity: 0.3}}></i>
                                            <div>SLOT {id}</div>
                                            <small style={{fontSize: '0.7rem', marginTop: '5px'}}>Esperando conexión local...</small>
                                        </div>
                                    )}
                                </div>
                                <div className="controls">
                                    <button className={`t-btn ${slots[id].tally === 'idle' ? 'idle' : ''}`} onClick={()=>setTally(id,'idle')}>SAFE</button>
                                    <button className={`t-btn ${slots[id].tally === 'prev' ? 'prev' : ''}`} onClick={()=>setTally(id,'prev')}>PREV</button>
                                    <button className={`t-btn ${slots[id].tally === 'live' ? 'live' : ''}`} onClick={()=>setTally(id,'live')}>LIVE</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ==========================================
        // PRESENTER (LAN Mode)
        // ==========================================
        const Presenter = ({ room, slot }) => {
            const [step, setStep] = useState('select');
            const [source, setSource] = useState('screen');
            const [tally, setTally] = useState('idle');
            const [error, setError] = useState('');
            const [muted, setMuted] = useState(false);
            const [connType, setConnType] = useState('Esperando...');
            
            const peer = useRef(null);
            const streamRef = useRef(null);
            const audioCtxRef = useRef(null);
            const myId = `pres_${room}_${slot}_${Date.now()}`;

            useEffect(() => {
                if (step === 'live') connect();
                return () => {
                    streamRef.current?.getTracks().forEach(t => t.stop());
                    audioCtxRef.current?.close();
                    peer.current?.destroy();
                };
            }, [step]);

            const connect = async () => {
                try {
                    setError('');
                    let stream;
                    
                    if (source === 'screen') {
                        const screenStream = await navigator.mediaDevices.getDisplayMedia({video: true, audio: true});
                        const micStream = await navigator.mediaDevices.getUserMedia({audio: true});
                        
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        audioCtxRef.current = audioCtx;
                        const dest = audioCtx.createMediaStreamDestination();
                        
                        if (screenStream.getAudioTracks().length > 0) {
                            const sys = audioCtx.createMediaStreamSource(screenStream);
                            sys.connect(dest);
                        }
                        
                        const m = audioCtx.createMediaStreamSource(micStream);
                        const g = audioCtx.createGain();
                        g.gain.value = 0.8;
                        m.connect(g);
                        g.connect(dest);
                        
                        stream = new MediaStream([screenStream.getVideoTracks()[0], ...dest.stream.getAudioTracks()]);
                        screenStream.getVideoTracks()[0].onended = () => window.location.reload();
                        
                    } else {
                        stream = await navigator.mediaDevices.getUserMedia({video: {width: 1280, height: 720}, audio: true});
                    }
                    
                    streamRef.current = stream;
                    
                    peer.current = new Peer(myId, PEER_CONFIG);
                    
                    peer.current.on('open', () => {
                        setConnType('Conectando por LAN...');
                        
                        // Llamar al Director (192.168.x.x - red local)
                        const call = peer.current.call(`dir_${room}`, stream);
                        
                        if (!call) {
                            setError('No se pudo conectar. ¿Director abierto?');
                            return;
                        }
                        
                        // Detectar si es conexión local
                        if (call.peerConnection) {
                            call.peerConnection.oniceconnectionstatechange = () => {
                                const state = call.peerConnection.iceConnectionState;
                                if (state === 'connected' || state === 'completed') {
                                    setConnType('🟢 Conectado vía LAN');
                                } else if (state === 'failed') {
                                    setConnType('🔴 Fallo de conexión LAN');
                                }
                            };
                        }
                        
                        // Tally vía PeerJS (sin servidor MQTT externo)
                        const conn = peer.current.connect(`dir_${room}`);
                        conn.on('data', (data) => {
                            if (data.tally) setTally(data.tally);
                        });
                        
                        // Llamar a OBS
                        setTimeout(() => peer.current.call(`obs_${room}_${slot}`, stream), 500);
                    });
                    
                    peer.current.on('error', err => {
                        if (err.type === 'peer-unavailable') setError('Director no encontrado en la red');
                        else setError(err.type);
                    });
                    
                } catch(e) {
                    setError(e.message);
                }
            };

            const toggleMic = () => {
                if (streamRef.current) {
                    streamRef.current.getAudioTracks().forEach(t => t.enabled = !t.enabled);
                    setMuted(!muted);
                }
            };

            if (step === 'select') {
                return (
                    <div className="lobby">
                        <div className="glass">
                            <h2 style={{color: '#8b5cf6', marginBottom: '10px'}}>
                                <i className="fas fa-laptop"></i> Laptop {slot}
                                <span className="lan-badge">LAN</span>
                            </h2>
                            <p style={{color: '#64748b', fontSize: '0.8rem', marginBottom: '20px'}}>
                                Modo: Red Local (sin internet)<br/>
                                <small>Conecta todos los equipos al mismo WiFi</small>
                            </p>
                            
                            <div className="mode-grid">
                                <div className={`mode-card ${source === 'screen' ? 'selected' : ''}`} onClick={() => setSource('screen')}>
                                    <div className="mode-icon"><i className="fas fa-desktop"></i></div>
                                    <div>Presentación</div>
                                </div>
                                <div className={`mode-card ${source === 'camera' ? 'selected' : ''}`} onClick={() => setSource('camera')}>
                                    <div className="mode-icon"><i className="fas fa-video"></i></div>
                                    <div>Cámara</div>
                                </div>
                            </div>
                            
                            {error && <div className="error">{error}</div>}
                            
                            <button className="btn btn-purple" onClick={() => setStep('live')}>
                                <i className="fas fa-play"></i> Conectar por LAN
                            </button>
                        </div>
                    </div>
                );
            }

            if (error) return (
                <div className="lobby">
                    <div className="glass">
                        <div className="error" style={{marginBottom: '20px'}}>{error}</div>
                        <button className="btn" onClick={() => window.location.reload()}>Reintentar</button>
                    </div>
                </div>
            );

            return (
                <div className="presenter">
                    <div className={`tally-border ${tally}`}></div>
                    <div className={`on-air ${tally === 'live' ? 'active' : ''}`}>● EN VIVO</div>
                    
                    <div style={{position: 'absolute', top: '20px', left: '20px', background: 'rgba(0,0,0,0.7)', padding: '8px 12px', borderRadius: '6px', fontSize: '0.75rem', zIndex: 100}}>
                        <div>{source === 'screen' ? '📺 PANTALLA' : '📹 CÁMARA'}</div>
                        <div style={{color: '#22c55e', fontSize: '0.7rem', marginTop: '2px'}}>{connType}</div>
                    </div>
                    
                    <Video stream={streamRef.current} muted={true} className="presenter-video" 
                        style={{objectFit: source === 'screen' ? 'contain' : 'cover'}} />
                    
                    <div className="p-controls">
                        <button className={`p-btn ${muted ? 'off' : ''}`} onClick={toggleMic}>
                            <i className={muted ? 'fas fa-microphone-slash' : 'fas fa-microphone'}></i>
                        </button>
                        <button className="p-btn switch" onClick={() => window.location.reload()}>
                            Cambiar
                        </button>
                        <button className="p-btn" style={{background: '#ef4444'}} onClick={() => window.location.href = './'}>
                            <i className="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // ==========================================
        // OBS (LAN)
        // ==========================================
        const Obs = ({ room, slot }) => {
            const [stream, setStream] = useState(null);
            const peer = useRef(null);
            const videoRef = useRef(null);

            useEffect(() => {
                peer.current = new Peer(`obs_${room}_${slot}`, PEER_CONFIG);
                
                peer.current.on('call', call => {
                    call.answer();
                    call.on('stream', s => setStream(s));
                });

                return () => peer.current?.destroy();
            }, [room, slot]);

            useEffect(() => {
                if (stream && videoRef.current) {
                    videoRef.current.srcObject = stream;
                    videoRef.current.play().catch(() => {});
                }
            }, [stream]);

            return (
                <div className="obs">
                    {stream ? (
                        <video ref={videoRef} className="obs-video" autoPlay playsInline muted={false}></video>
                    ) : (
                        <div className="obs-wait">
                            <i className="fas fa-circle-notch fa-spin" style={{fontSize: '2rem', marginBottom: '10px'}}></i>
                            <div>Esperando señal LAN...</div>
                            <small style={{opacity: 0.5}}>obs_{room}_{slot}</small>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // APP
        // ==========================================
        const App = () => {
            const [state, setState] = useState({mode: null, room: 'EVENTO', slot: '1'});

            useEffect(() => {
                const p = new URLSearchParams(window.location.search);
                const m = p.get('mode'), r = p.get('room'), s = p.get('slot') || '1';
                if (m && r) {
                    if (m === 'obs') document.body.style.background = 'transparent';
                    setState({mode: m, room: r.toUpperCase(), slot: s});
                }
            }, []);

            if (state.mode === 'director') return <Director room={state.room} />;
            if (state.mode === 'obs') return <Obs room={state.room} slot={state.slot} />;
            if (state.mode === 'presenter') return <Presenter room={state.room} slot={state.slot} />;
            
            return (
                <div className="lobby">
                    <div className="glass">
                        <h1 style={{color: '#8b5cf6', marginBottom: '20px', textAlign: 'center'}}>
                            <i className="fas fa-broadcast-tower"></i> StreamCall 
                            <span className="lan-badge">LAN ONLY</span>
                        </h1>
                        <p style={{color: '#64748b', fontSize: '0.85rem', marginBottom: '20px', textAlign: 'center'}}>
                            Sin servidor externo. Solo funciona en tu red WiFi/Ethernet local.
                        </p>
                        
                        <input value={state.room} onChange={e => setState({...state, room: e.target.value.toUpperCase()})} placeholder="NOMBRE SALA" />
                        <button className="btn" onClick={() => window.location.href=`?mode=director&room=${state.room}`}>Soy Director</button>
                        <button className="btn btn-purple" onClick={() => window.location.href=`?mode=presenter&room=${state.room}&slot=1`}>Soy Presentador</button>
                        
                        <div style={{marginTop: '15px', textAlign: 'center'}}>
                            {[1,2,3].map(n => (
                                <button key={n} onClick={() => navigator.clipboard.writeText(`${window.location.href.split('?')[0]}?mode=obs&room=${state.room}&slot=${n}`)}
                                    style={{background: '#334155', border: 'none', color: 'white', padding: '5px 8px', margin: '2px', borderRadius: '4px', fontSize: '0.7rem', cursor: 'pointer'}}>OBS {n}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
