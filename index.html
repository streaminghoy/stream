<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamCall V10 PRO (Auto-Start Fix)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        body.obs-mode { background-color: transparent !important; }

        /* --- LOBBY --- */
        .lobby-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #0f172a; padding: 20px; text-align: center; }
        .glass-box { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 400px; width: 100%; }
        input { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 15px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; text-transform: uppercase; }
        
        .quality-select { width: 100%; background: #000; border: 2px solid #334155; color: white; padding: 12px; border-radius: 8px; font-size: 1rem; text-align: center; font-weight: bold; margin-bottom: 20px; outline: none; cursor: pointer; }

        .btn { width: 100%; padding: 12px; font-weight: 900; font-size: 0.9rem; border-radius: 8px; cursor: pointer; border: none; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: #3b82f6; color: white; margin-bottom: 10px; }
        .btn-green { background: #10b981; color: black; margin-bottom: 10px; }
        .btn-red { background: #ef4444; color: white; margin-bottom: 10px; }
        .btn-gray { background: #334155; color: white; margin-bottom: 10px; border: 1px solid #475569; }

        /* --- OBS --- */
        .obs-layout { width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .obs-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        .obs-status { position: relative; z-index: 9999; background: rgba(0,0,0,0.85); color: #facc15; padding: 20px 30px; border-radius: 12px; font-family: monospace; font-size: 16px; border: 2px solid #facc15; text-align: center; }

        /* --- DIRECTOR (DASHBOARD) --- */
        .director-layout { display: flex; height: 100vh; position: relative; }
        .video-stage { flex: 1; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .remote-video { width: 100%; height: 100%; object-fit: contain; }
        .director-controls { width: 350px; background: #0f172a; border-left: 1px solid #334155; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        .panel-header { padding: 20px; border-bottom: 1px solid #334155; text-align: center; }
        .panel-content { padding: 20px; flex: 1; overflow-y: auto; }
        
        select { width: 100%; background: #000 !important; border: 1px solid #334155 !important; color: #fff !important; padding: 10px; border-radius: 6px; font-size: 0.85rem; outline: none; margin-bottom: 10px; appearance: auto; }

        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }
        .bg-green { background: #22c55e; color: black; }
        .bg-yellow { background: #facc15; color: black; }
        
        .tally-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .t-btn { padding: 15px 5px; font-size: 0.8rem; font-weight: bold; border-radius: 8px; cursor: pointer; border: 2px solid transparent; background: #1e293b; color: #94a3b8; }
        .t-btn.active-idle { border-color: #64748b; color: white; }
        .t-btn.active-prev { background: rgba(34, 197, 94, 0.2); border-color: #22c55e; color: #22c55e; }
        .t-btn.active-live { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; animation: pulseRed 2s infinite; }
        
        .clean-mode .director-controls { display: none !important; }
        .clean-mode .video-stage { width: 100vw; }
        .exit-btn { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(220, 38, 38, 0.8); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid white; font-size: 12px; }

        /* --- GUEST UI --- */
        .guest-layout { width: 100vw; height: 100vh; position: relative; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .guest-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .guest-tally-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 15px solid transparent; pointer-events: none; transition: border-color 0.3s; z-index: 50; box-sizing: border-box; }
        .guest-layout.tally-live .guest-tally-border { border-color: #ef4444; box-shadow: inset 0 0 50px rgba(239,68,68,0.8); }
        .guest-layout.tally-prev .guest-tally-border { border-color: #22c55e; box-shadow: inset 0 0 50px rgba(34,197,94,0.8); }
        
        .return-pip { position: absolute; top: 20px; left: 20px; width: 260px; aspect-ratio: 16/9; background: #000; border: 2px solid #475569; border-radius: 12px; overflow: hidden; z-index: 80; opacity: 0; pointer-events: none; transition: opacity 0.3s; cursor: grab; }
        .return-pip.active { opacity: 1; pointer-events: auto; }
        .return-pip video { width: 100%; height: 100%; object-fit: cover; }
        .pip-label { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.8); color: white; font-size: 10px; padding: 4px 8px; border-radius: 4px; font-weight: bold; }

        .guest-overlay { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 12px 25px; border-radius: 50px; display: flex; align-items: center; gap: 20px; z-index: 100; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .mic-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.3rem; transition: 0.2s; background: #334155; color: white; }
        .mic-btn.off { background: #ef4444; }

        .big-tally-text { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 2rem; font-weight: 900; padding: 5px 20px; border-radius: 10px; z-index: 100; text-transform: uppercase; display: none; }
        .guest-layout.tally-live .big-tally-text { display: block; background: #ef4444; color: white; }
        .guest-layout.tally-prev .big-tally-text { display: block; background: #22c55e; color: black; }

        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #facc15; animation: spin 1s linear infinite; margin: 0 auto 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const PEER_CONFIG = { 
            config: { 
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ],
                'iceTransportPolicy': 'all'
            } 
        };
        const MQTT_BROKER = 'wss://broker.emqx.io:8084/mqtt';

        // --- COMPONENTE RECEPTOR (DIRECTOR / OBS) ---
        const ReceiverView = ({ roomName, isObsMode }) => {
            const [status, setStatus] = useState('BUSCANDO SEÑAL...');
            const [guestConnected, setGuestConnected] = useState(false);
            const [tally, setTally] = useState('idle');
            const [cleanMode, setCleanMode] = useState(false); 
            const [audioDevices, setAudioDevices] = useState([]);
            const [selectedAudio, setSelectedAudio] = useState('');
            const [talkbackActive, setTalkbackActive] = useState(false);

            const peer = useRef(null);
            const remoteVideoRef = useRef(null);
            const mqttClient = useRef(null);
            const returnStreamRef = useRef(null);
            const returnCallRef = useRef(null);

            useEffect(() => {
                if (!isObsMode) {
                    navigator.mediaDevices.enumerateDevices().then(devs => {
                        const audios = devs.filter(d => d.kind === 'audioinput');
                        setAudioDevices(audios);
                        if (audios.length > 0) setSelectedAudio(audios[0].deviceId);
                    });
                    mqttClient.current = mqtt.connect(MQTT_BROKER);
                }

                const baseId = roomName.toUpperCase();
                const myId = isObsMode ? `sc_obs_${baseId}` : `sc_dir_${baseId}`;
                peer.current = new Peer(myId, PEER_CONFIG);

                peer.current.on('open', () => setStatus('SALA LISTA - ESPERANDO...'));
                
                peer.current.on('call', (call) => {
                    call.answer(); 
                    call.on('stream', (stream) => {
                        if (remoteVideoRef.current) {
                            remoteVideoRef.current.srcObject = stream;
                            
                            // AUTO-START HACK: Forzamos muted al inicio
                            remoteVideoRef.current.muted = true;
                            remoteVideoRef.current.setAttribute('autoplay', '');
                            remoteVideoRef.current.setAttribute('playsinline', '');

                            remoteVideoRef.current.play().then(() => {
                                setGuestConnected(true);
                                setStatus('ONLINE');
                                // Intentamos habilitar audio automáticamente tras el arranque visual
                                setTimeout(() => {
                                    if (remoteVideoRef.current) {
                                        remoteVideoRef.current.muted = false;
                                        remoteVideoRef.current.play().catch(() => {
                                            console.log("Audio requiere interacción manual");
                                        });
                                    }
                                }, 1000);
                            }).catch(e => setStatus("BLOQUEO DE NAVEGADOR"));
                        }
                    });
                });
                return () => { peer.current?.destroy(); mqttClient.current?.end(); };
            }, [roomName, isObsMode]);

            const handleTally = (s) => {
                setTally(s);
                mqttClient.current?.publish(`sc_tally/${roomName}`, JSON.stringify({ state: s }), { retain: true });
            };

            const toggleReturn = async () => {
                if (talkbackActive) {
                    returnStreamRef.current?.getTracks().forEach(t => t.stop());
                    if (returnCallRef.current) returnCallRef.current.close();
                    setTalkbackActive(false);
                } else {
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({ audio: { deviceId: selectedAudio }, video: true });
                        returnStreamRef.current = s;
                        returnCallRef.current = peer.current.call(`sc_guest_${roomName.toUpperCase()}`, s);
                        setTalkbackActive(true);
                    } catch (e) { alert("Error retorno"); }
                }
            };

            const copyLink = (m) => {
                const url = `${window.location.href.split('?')[0]}?mode=${m}&room=${roomName}`;
                navigator.clipboard.writeText(url); alert(`Link ${m} copiado`);
            };

            if (isObsMode) return (
                <div className="obs-layout">
                    <video ref={remoteVideoRef} className="obs-video" autoPlay playsInline></video>
                    {!guestConnected && <div className="obs-status">{status}</div>}
                </div>
            );

            return (
                <div className={`director-layout ${cleanMode ? 'clean-mode' : ''}`} onDoubleClick={() => cleanMode && setCleanMode(false)}>
                    {cleanMode && <div className="exit-btn" onClick={()=>setCleanMode(false)}>❌ SALIR</div>}
                    <div className="video-stage">
                        <video ref={remoteVideoRef} className="remote-video relative z-10" autoPlay playsInline></video>
                        {!guestConnected && <div className="absolute text-gray-500 font-bold uppercase">{status}</div>}
                    </div>
                    <div className="director-controls p-5">
                        <h2 className="text-xl font-black text-blue-400 mb-4 uppercase text-center tracking-tighter">StreamCall PRO</h2>
                        <label className="text-blue-400 font-bold uppercase block mb-2 text-[10px]">📡 RETORNO AL INVITADO</label>
                        <select value={selectedAudio} onChange={e => setSelectedAudio(e.target.value)}>
                            {audioDevices.map(d => <option key={d.deviceId} value={d.deviceId}>{d.label || 'Mic'}</option>)}
                        </select>
                        <button className={`btn ${talkbackActive ? 'btn-red' : 'btn-blue'} mb-6`} onClick={toggleReturn} disabled={!guestConnected}>
                            {talkbackActive ? '🔴 DETENER RETORNO' : '▶️ ENVIAR RETORNO'}
                        </button>
                        <div className="h-px bg-slate-700 w-full mb-4"></div>
                        <label className="text-gray-400 font-bold uppercase block mb-2 text-[10px]">ENLACES DE SALA</label>
                        <button className="btn btn-green" onClick={()=>copyLink('obs')}>1. COPIAR LINK PARA OBS</button>
                        <button className="btn btn-blue" onClick={()=>copyLink('guest')}>2. COPIAR LINK INVITADO</button>
                        <div className="h-px bg-slate-700 w-full my-4"></div>
                        <label className="text-gray-400 font-bold uppercase block mb-2 text-[10px]">CONTROL DE TALLY</label>
                        <div className="tally-grid">
                            <button className={`t-btn ${tally==='idle'?'active-idle':''}`} onClick={()=>handleTally('idle')}>OFF</button>
                            <button className={`t-btn ${tally==='prev'?'active-prev':''}`} onClick={()=>handleTally('prev')}>PREV</button>
                            <button className={`t-btn ${tally==='live'?'active-live':''}`} onClick={()=>handleTally('live')}>AIRE</button>
                        </div>
                        <button className="btn btn-gray mt-4" onClick={()=>setCleanMode(true)}>🔲 PANTALLA LIMPIA</button>
                    </div>
                </div>
            );
        };

        // --- COMPONENTE GUEST (INVITADO) ---
        const GuestView = ({ roomName }) => {
            const [joined, setJoined] = useState(false);
            const [quality, setQuality] = useState('720');
            const [tally, setTally] = useState('idle');
            const [micMuted, setMicMuted] = useState(false);
            const [camOff, setCamOff] = useState(false);
            const [receivingVideo, setReceivingVideo] = useState(false);
            const localVideoRef = useRef(null);
            const returnMediaRef = useRef(null);
            const peer = useRef(null);
            const mqttClient = useRef(null);
            const localStream = useRef(null);

            useEffect(() => {
                if (!joined) return;
                const mq = mqtt.connect(MQTT_BROKER);
                mq.on('connect', () => mq.subscribe(`sc_tally/${roomName}`));
                mq.on('message', (t, msg) => setTally(JSON.parse(msg.toString()).state));
                
                const init = async () => {
                    try {
                        const res = { '360': [640,360], '720': [1280,720], '1080': [1920,1080] };
                        const s = await navigator.mediaDevices.getUserMedia({ 
                            video: { width: res[quality][0], height: res[quality][1], facingMode: "user" }, 
                            audio: { echoCancellation: true, noiseSuppression: true } 
                        });
                        localStream.current = s;
                        if (localVideoRef.current) localVideoRef.current.srcObject = s;
                        
                        const baseId = roomName.toUpperCase();
                        peer.current = new Peer(`sc_guest_${baseId}`, PEER_CONFIG);
                        
                        peer.current.on('open', () => {
                            // LLAMADA DIRECTA A AMBOS SIN ESPERAR
                            peer.current.call(`sc_dir_${baseId}`, localStream.current);
                            peer.current.call(`sc_obs_${baseId}`, localStream.current);
                        });

                        peer.current.on('call', (c) => {
                            c.answer(localStream.current);
                            c.on('stream', (rem) => { 
                                if (returnMediaRef.current) returnMediaRef.current.srcObject = rem; 
                                setReceivingVideo(rem.getVideoTracks().length > 0); 
                            });
                        });
                    } catch (e) { alert("Error cámara"); }
                };
                init();
                return () => { peer.current?.destroy(); mq.end(); };
            }, [joined]);

            const toggleMic = () => { if (localStream.current) { const t = localStream.current.getAudioTracks()[0]; t.enabled = !t.enabled; setMicMuted(!t.enabled); } };
            const toggleCam = () => { if (localStream.current) { const t = localStream.current.getVideoTracks()[0]; t.enabled = !t.enabled; setCamOff(!t.enabled); } };

            if (!joined) return (
                <div className="lobby-container"><div className="glass-box">
                    <h2 className="text-2xl font-black mb-4 uppercase text-white tracking-widest">SALA: {roomName}</h2>
                    <label className="text-xs text-gray-400 block text-left mb-1 uppercase font-bold">Calidad de Envío</label>
                    <select className="quality-select" value={quality} onChange={e => setQuality(e.target.value)}>
                        <option value="360">BAJA (360p)</option>
                        <option value="720">MEDIA (720p)</option>
                        <option value="1080">ALTA (1080p)</option>
                    </select>
                    <button className="btn btn-blue w-full mt-2" onClick={() => setJoined(true)}>ENTRAR A LA SALA</button>
                </div></div>
            );

            return (
                <div className={`guest-layout tally-${tally}`}>
                    <div className="guest-tally-border"></div>
                    <div className="big-tally-text">{tally === 'live' ? 'AL AIRE' : 'PREVENIDO'}</div>
                    <div className={`return-pip ${receivingVideo ? 'active' : ''}`}>
                        <video ref={returnMediaRef} autoPlay playsInline></video>
                        <div className="pip-label">PROGRAMA 👆</div>
                    </div>
                    <video ref={el => { if(el) el.srcObject = localStream.current }} className="guest-video" muted autoPlay playsInline></video>
                    <div className="guest-overlay">
                        <div className="text-[10px] font-bold text-gray-400 uppercase mr-2 tracking-widest">{roomName}</div>
                        <div className={`mic-btn ${micMuted?'off':'on'}`} onClick={toggleMic}>{micMuted ? '🔇' : '🎤'}</div>
                        <div className={`mic-btn ${camOff?'off':'on'}`} onClick={toggleCam}>{camOff ? '🚫' : '📷'}</div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mode, setMode] = useState(null); const [roomName, setRoomName] = useState('');
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                let m = params.get('mode'); let r = params.get('room');
                const isBroadcast = window.obsstudio || /vMix|OBS/i.test(navigator.userAgent);
                if (isBroadcast && r) m = 'obs';
                if (m && r) { setRoomName(r); setMode(m); if (m === 'obs') document.body.classList.add('obs-mode'); }
                else setRoomName(Math.random().toString(36).substring(2, 6).toUpperCase());
            }, []);
            if (mode === 'director') return <ReceiverView roomName={roomName} isObsMode={false} />;
            if (mode === 'obs') return <ReceiverView roomName={roomName} isObsMode={true} />;
            if (mode === 'guest') return <GuestView roomName={roomName} />;
            return (
                <div className="lobby-container"><div className="glass-box">
                    <h1 className="text-3xl font-black mb-6 uppercase text-blue-500 tracking-tighter">StreamCall PRO</h1>
                    <input value={roomName} onChange={(e) => setRoomName(e.target.value.toUpperCase())} placeholder="SALA" />
                    <button className="btn btn-blue w-full" onClick={() => window.location.href=`?mode=director&room=${roomName}`}>PANEL DIRECTOR</button>
                </div></div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
